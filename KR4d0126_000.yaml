body:
  text: 提要東堂集十巻别集類二宋臣等謹案東堂集十巻宋毛滂撰滂字澤民衢州江山人官至祠部員外郎知秀州陳振孫書錄解題載滂東堂集六巻詩四巻書簡一巻樂府二巻滂嘗知武康縣縣有東堂故以名其集也初元祐中蘇軾守杭州滂為法曹秩滿代去已行抵富陽軾聞有歌其惜分飛詞者折簡追還留連數月由此知名然其後乃出蔡氏兄弟之門蔡絛鐵圍山叢談載蔡京柄政滂上一詞甚偉麗因驟得進用王明清揮麈後錄又載滂為曾布所賞擢至館閣布南遷坐黨與得罪流落久之蔡卞鎮潤州與滂俱臨川王氏婿滂傾心事之一日家集觀池中鴛鴦卞賦詩云莫學飢鷹飽便飛滂和呈云貪戀恩波未肯飛卞妻笑曰豈非適從曾相公池中飛過來者乎滂大慙云云是其素行獧薄反覆不常至為婦人女子所譏人品殊不足重即集中所載酬答之文亦多渉請謁干祈不免脂韋淟涊之態故陳振孫謂其詩文視樂府頗不逮葢亦因其人而少之然平情而論其詩有風發泉湧之致頗為豪放不覊文亦大氣盤礴汪洋恣肆得二蘇之一鱗片甲在北宋之末要足自成一家固未可竟置之不議也謹從永樂大典蒐採裒輯釐為詩四巻文六巻仍還其十篇之舊其書簡即附入文集不復别編至所作東堂詞則毛晉已刋入六十家詞中世多有其本今亦别著于錄焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:df86c43b7d15a21392b2ebedcb6d98cc2f80c8fa035088bf000468cac2a48b5d
