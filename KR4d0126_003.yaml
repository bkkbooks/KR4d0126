body:
  text: 東堂集卷三宋毛滂撰五言律詩代人和御製上已錫宴詩賜禊追三日聞鶯囀萬年恩深重湛露氣暖入非煙睿作端知聖清尊不翅賢眼明驚既醉奎彩下雲天曲水傳觴盛皇祇布德初海波翻雅奏雲露濕華裾晴送君恩暖寒收物意舒春耕無歎息庶不負于胥原注篤公劉于胥斯原以居人民人民既輯而繁矣既聽而順矣乃宣之使出耕作而樂其事勸其功無永歎者也送夏辟疆解官北風吹徑翮凌厲欲雲奔門棒斂行色縣花消别魂進舟寒瀨澀回首亂山昏珍重操刀事余言淡可吞趙宣德生日仁飇扇佳氣暐暐自門廬閒日風波外長年霜雪餘原注趙休官今七十八矣凍醪含鑿落春意動篨䈝定有升仙骨黃精易掃除送徐次山督郵之官外臺綱紀掾先辟漢名人霜隼九秋氣風駒千里塵鄉評元自好府望復名新竹箭黃金鏃送君江水濱訪琳老題溪上小軒小檻閒風物髙僧秀肺腸隔溪通竹色開户納山光撥雪晨蔬瘦燒松午茗香淵明歸賦急聊復此徜徉登普寧寺嵗寒庵面江山之勝令人欲賦而長老因公出詩集相示作此詩謝之此老諸緣薄詩情忽漫深敲門移穩字彈指得真心松竹藏幽討溪山助苦吟解鞍聊為賦去不負登臨八月二十八日挈家泛舟游上渚詩秋色向幽處浮家聊逺尋醉來蓬鬢亂臥入蓼花深雲壑封詩物煙波留客心未應兒輩覺餘醁且勤斟和王宣義買菊栽二首秋風有好色寄在菊花團弛擔知新主臨池得細看金房迎日秀玉露作香寒獨負東籬意年來漉酒乾未見花盈把先教蜂作團孤根聊得售秀色後當看莫訝全開晚須知獨耐寒雲含墮簷日天恐露香乾闍黎從上人豫往年香火院學徒也去之天竺益求其師之說歸為邑人言之豫自江東歸見於昭慶寺喜其進學不已為作此詩世外忘家子歸來誰與游燒香如意夜茹菊鉢盂秋獨節已蕭冷諸緣應罷休渡江聞道日少為故山留去國呈蔡元度去國黃流急搔頭白髮新牛衣還卒嵗狗監定何人奏傔寧妨跛為郎正礙貧鄙文無恙否醬瓿盍相親書禪靜寺集翠堂示堂中老人琳徑山詩煙岫供寒翠風簾舞小晴短墻分竹色虛户納松聲弄筆雲窗暖煎茶玉醴輕端知孤檜月獨伴夜禪清次沈㑹宗韵故人老蕭散久客寡諧同病骨侵山雨孤帆落渚風水清應弔影坐闃想書空我亦青州闊經年不一中謝陳進士見示詩賦并以為别陳子賦可喜十詩仍好辭亦云餘事爾何纍壯夫為語浸初已漫筆峯時出竒息肩當益學葵圃未應窺趙樂道挽詩二首耆舊雕零盡歸來悲故鄉雲山橫爽氣杖履屬空牀蚤發名難沒終榮德未央芝蘭日夜長遺範在諸郎貧賤通姻好凄凉纍賞音空知典刑在誰聽短長吟飛鶴窺塘水眠牛傍柏林龜魚迎拄杖猶出畫橋隂徐守生辰徐卿二子後吉夢亦羆熊骨氣本英物文華今巨翁聊因頷燕出已覺額犀豐誰伴嵗寒色冰霜十八公宿蓮花寺頃從清獻公游今十年矣一徑通松竹入門聞夜香青燈孤照佛斜月靜歸廊未厭逢僧拙終慚涉世忙十年猶倣佛一夢自凄凉去國馬劒何妨壯琴書半不輕心通平野闊眼接衆山明老大空行李疏慵豈利名夏侯知苦學殊未勸歸耕林進士數見過又遺一詩輒以奉報夫子胡為者行吟頗自竒少年應苦學今日定何之天地空羸馬肝腸飽舊詩江邊糊口掾風雨共凄凄束裝束裝親匣劍撥火唤勞饙鴉散雞聲斷煙低野色分徘徊半樹月拍塞一山雲叫助日車上扶桑猶未聞逢故人落日仍江縣相逢下馬鞍頻憂從者病可奈故人寒老大囊書脫平生匣劒乾長年祇少睡忽漫語盤桓欲入山訪參寥預令探梅誰作東州客支公合往還想無詩外事聊輟定中閒拂石須相憩留雲欲共攀為尋梅發處先過向南山仲夏月夜懷陳西安原注陳治邑有政績不得于上位飛蓋西園夜抽毫失謝君徘徊下修竹暗淡入浮雲素彩漫仍見微芒細可分徒知此紈扇離畢未前聞十月十日訪琳道人於禪靜寺與之徘徊泉石間甚久道人云有大龍團藏亦數年食且幾盡因出刀圭許而龍軀僅餘一爪色理極蒼古又云趙清獻公嘗得須菩提畫像乃張畫壁間煎所謂龍爪以餉僕迫夜來歸坐縣之東堂見月奉寄一首道人泉石畔餉我欲盤桓見爪蒼龍古顰眉古佛寒家風真草草詩句自珊珊今夜東堂夢雲披月萬竿原注集翠堂後山勢坡陀可喜四隅修竹森然今夜月色澄皎定有清趣崇福宫雨中種柏未障侵簷日先留出殿煙雨根蚯蚓活風葉鳳凰翩直節從孤瘦寒姿定老堅君王千萬壽合作酒如泉和賈耘老有引蕞爾小邑在桑林間豚肩濁酒茍飽而已足下乃幸臨之顧無以相娛樂别未三日老僕即被病臥家至今殊未佳健得書承感寒竟未去體邇來定已寧泰否示二詩良佳屬疾一篇輒和云渴令平生病年來病更多腰仍難老折腸亦舊無他知子眠三徑逢秋欲七歌勳名郵傳爾唯日飲無何僕方伏枕呻吟中强繼此詩既自道僕意末章聊以奉廣十八翁不足云也園亭之什亦和云河陽春在否栁外小朱扉曲徑蛇應鬬危簷鳥欲飛主人同燕幕歸意屬漁磯莫待羣花笑秋風鬢緑稀原注僕年來兩鬢星星耳聵齒搖百念衰冷豈復花間人也亦為後人作狡獪爾一笑足下何時能復至此僕襆被裹糧唯日須歸去無他念也熊侍郎挽詞蚤見聲華就終違勳業尋餘忠朝露泣遺直夜臺深威落諸蠻膽恩留五嶺心從今舍人樣萬柏覆蕭森題陳用中行藏樓此樓託蕭冷莫㑹子登臨弔影漫愁獨書空誰語深簾開不盡眼雲起未休心咫尺顔淵坐髙風無古今鄭君瑞示同諸公遊定空佳什僕亦久欲與君瑞尋春衰病方窘風雨以故未果聊次韻一首佳哉五英雋並駕玉為林傾蓋分不淺好山情已深原注君瑞亦近至此春光不約略晴意恰沉吟老病未堪出詩鋒遙見侵送教長老入山秋容正搖落山意恰淒清冰徹萬緣冷雲隨兩屐輕冥鴻那復下膏火莫重明天地郵亭爾百年真倦生送僧常妙還永嘉原注妙持金剛呪為人驅鬼物有功杖策辭江寺秋途誰與偕霜風侵布衲草露濕芒鞋收鉢無餘事還鄉非俗懷金剛真有力魔避不須排無畏道人居觀音院奉寄一首松石真佳伴雲山得破顔髙人本無住倦翮自知還詩外塵緣盡齊餘齒頰閒何消一句子截斷碧溪灣曉出響應山過靜林道中奉寄琳老案宋詩紀事題作曉出定光寺曉色開霜坂飢烏啄麥畦山腰餘雪瘦天面冷雲低寒意梅花北原注靜林殿下有梅數株禪心柏子西窗前借殘月照我度前溪下渚湖春渚連天闊春風夾岸香飛花渡水急垂柳向人長逺岫分蒼紫澄波映渺茫此身萍梗爾泊處即吾鄉案此詩永樂大典原本闕佚今從武康縣志采補題餘英館故第園林改遺亭壁户新垂虹一橋月夾繡兩隄春花落俯流水鳥啼懷故人憑欄看翠竹無意數游鱗案此詩永樂大典原本闕佚今從湖州府志采補七言律詩上林內翰二首內廷吳陸善文書絶代如公可數渠科斗他年載深厚楞伽終日伴清虛濟時即展經綸業華國聊施采色餘想為君王話堯舜玉堂對罷夜何如短褐風霜可奈何懶求長袖舞陽阿九遷行輩青雲滿百謫形骸白髮多束帶壯懷渾齟齬角巾間約亦蹉跎原注某託於東都逆旅主人五六寒暑進不能追參髙妙退不能伏奧潜深兹可鄙憐者也山公有意相題目季緒無容獨詆訶次韻曹子方盾威正赫忽衰殘人意渾如水面寬觸石端來慰枯槁隨車定見濕朱丹初憂連畛秋無種豈望如雲晚可觀天遣商羊為公舞絶勝九仞見回鸞寄蔡學士陸陸微生不可論半飢半飽過朝昏春來但見瞳花亂寒退長餘鬢雪繁老愧門墻忝賓客歸來耒耜教兒孫㑹應飛墮江湖去定向離騷寄客魂師文莫君以僕治東園甚力官滿且去為賦詩以道眷然之意次韻奉答小桃繁杏何須論只要池邊竹半林不養鳬鷖憐淥淨苦留風月伴清深後人來䕃十圍木故老看移一畝隂分付庭梅管春色長官情味此花心次常山簡叔祥歸來久客鬢俱蒼漸喜無人餽五漿未免髙僧問勞苦原注至此獨三數僧自郡來故應喬木慰凄凉山中猿鶴人誰健門外蒿萊想自長為謝邦人豈吾薄要當六印繞腰黃柳軒雪夜曛黃飛雪已填門獨夜人依老柳根故遣捲簾從骨冷不妨開卷自燈昏餘英煮茗春雲動潤氣留香宿霧繁但覺詩脾兩清絶可勞騷客賦招魂書懷寄贈曾公袞宦情光景半樵漁病惰仍忘百紙書賦就祇堪供醬瓿齒殘未可釋鹽車朱藍要使辭秋斷芝菌猶當出腐餘慚愧少翁能下士馬曹知馬自應疏仁義驛中原注九月三十日謁告去郡騎驢何似賈司倉行李唯餘古錦囊秋後恰容鷹脫架春來㑹有燕投梁清時無用材雖拙白日能閒策亦長慚愧平生負三尺一成泉石欲膏肓次韻許簿游響潭回一派飛泉濕嶺雲巖花娟好尚餘春黃紬病惰誰如我碧玉寒清自照人山水窟中為俗吏簿書叢裏得詩鄰一篇寵寄髙難和萬卷端知筆有神東歸呈元度此生文字送分隂羇旅無材發噤吟鬢底星星侵晚色胸中落落負初心端知坐索長安米那復能彈單父琴投老襄陽真自棄蹇驢東去亂雲深哀程袁州坐令荆國得髦英清獻先生語不輕漢使曽觀楚風俗蜀翁未識魯書生楊林墜露隨沉魄叢玉留詩負夙情欲問典刑波浪闊遙知蘭砌五經橫郭别駕秋日行縣奉寄一首秋壑相迎故出竒便應到處小遲遲不妨簿領紛遮眼未礙嵐光秀入脾小睡寧尋兒女夢新詩定寫水雲姿舊巾墊角風流在何許杉篁暮雨時從范使君求酒方寸陶陶事不根但知力飲送朝昏無田種秫空為吏有麴成封即閉門避暑此間真有意悲秋今日得無言孔公坐上多餘瀝昜滿農家老瓦盆重來出門聊作書生詠倚馬猶能梁父吟汾水寧無注書地秦關已老棄繻心重來樵釣深相識未遍湖山擬細尋白眼何勞預人事但知要得酒船深屬者觀池檻清明泉激石立蘆叢交碧文禽並絢翛然發湖山之逺態無輦轂之浮埃杜子美云朱門之泥塗士子不見其泥塗良非是也圖書多似道家山池檻清虛不綺紈萬壑春藏三石秀五湖秋入兩蘆寒冰泉噴激珠成貫繡羽沉浮花作團誰伴玉皇香案吏光風霽月在䦨干聞諸君不裹糧遊山暮歸清坐靜林僧居相與樂以忘飢僕老病獨在見遺辱君瑞示詩盛道僧居梅竹之賞輒次韻奉答禪房何許最清深庾嶺梅邊晉竹林餉客好山勝挈榼遺豫病骨任支琴應餐秀色咽溪茗想待暗香來水沉何似拍浮從我醉夜船藉月碧千尋送巨中教授解官天公憐我欲無鄰得近芝蘭久益芬定免幼安還割席擬從東野若為雲歸鞭那有藍關雪别夢應通魯水芹强飯勉之書滿載與君千里共斯文次韻琳老中秋月玉斧修輪滅玷痕金精鑄魄凝寒清綴雲都去秋心淨囊露新添夜眼明氣接瑶臺端可御地漫銀漢定誰傾何時天竺山前路細聽煙崖墜子聲仲夏月夜懷陳西安長悵浮雲㸃太清祇今何許問天晴渾憐短夜相催下不放孤光自在明幸與髙樓通逺覽未勞殘燭更前行此心對酒蕭條在咄咄置之聊自傾上執政廊廟無塵鑑色寒私門誰啓手親關萬邦和氣君臣裏一代文章伯仲間多士揚眉詣東閣真人拱手倚南山青天白日才亭午不遣雲隨霰雪還訪鄭叔詳回得花滿盤作短詩以寄參軍肯自笑蒼顔花趁籃輿簇玉盤賸取必知叢蝶恨欵行聊許路人看娟娟靜靜春情好淡淡濃濃粧色殘已遣小蠻歌送酒故教亂插竹皮冠東堂獨坐懷琳老二首聞道年來多掩關髙情定滿渺瀰間秋風不怕清難忍曉日應分暖伴閒欲喚扁舟弄雲水已疑小閣厭溪山東堂枉把歸來賦慚愧寒空倦翮還柏爐煙冷尚餘薰老去孤城愈不羣沙上晚晴知獨往堂中秋思與誰分隔溪有伴蕭蕭竹對户無情冉冉雲南北東西均是寄定回歸鴈不應聞六月二十日舍賈耘老溪居旦起蔡成允見訪僕方蓬頭赤腳坐溪上乃用此見成允而君不以為無禮反寄詩有褒借意甚愧過情戲作一首奉報寒溪破曉喜相過不怪蓬頭尚養疴躍馬懷金君蚤晚厯階㰱血我蹉跎詩人自與塵埃逺病骨終慚粉澤多别寄釣魚船上曲要留風月伴煙蓑坤成節穆穆真人第幾天九龍扶輦下非煙定知蟾彩騰光夜聊待蟠桃得熟年國步無疆金柱健官聲有道罝賢大邦欲效封人請珍重祇園妙相仙對月栁梢地面絶微風一片寒光萬里同冰骨直疑潛裏換塵心都覺坐來空蚌胎有露珠成顆蟾窟無雲玉作宮莫怪幽人吟到曉不知清興自無窮道上口占屹屹髙山自兩邊紛紛雞鴨苦當前敗垣過竹還當道脫葉憑風欲半天定恐黃茅藏伏更呼青漢落飛鸇一寒如此空形影獨賴狐裘三十年謝郭倅見訪及榻青苔疊亂錢端知骯髒倚門邊蒿萊嵗晚荒三徑殽酒人踈問一㕓懶慢容教著帽進傳呼驚起藉糟眠分庭未覺題輿寵下士徒知公子賢建中上元以雨雪敗懸燈以國憂罷行樂僕又以老病連日在告辱師與成君見示佳章聊作一首老去追遊骨亦疲黑甜唯覺睡如飴漸差素彩弄華髮猶夢清妍侍曲眉愧甚雕樽負珠履獨餘殘雪照書帷未妨管領東風在官柳溪梅不用疑充叟九兄以書問鄱陽官况因亦問訊信來頻慰别離魂苦問官情却懶言多睡正隨蝴蝶夢相憐空愧鶺鴒原幸無俗客于書户遙想青山對縣門定是放衙能少事悠哉岸幘步槐根去國年來去國故遲遲坂上長鳴老益悲不作居山慚捷徑彊須了事學癡兒風霜冷面何能笑藜藿空腸未厭飢里巷定無楊得意朝廷合有鄭當時紅梅何處曾臨阿母池渾將絳雪㸃寒枝東墻羞頰逢誰笑南國酡顔强自持幾過風霜仍好色半呼桃杏聽羣兒青春獨養和羮味不為黃蜂飽蜜脾次韻成允寒秀亭伐蒿種竹作清深洗石鋤垣出翠紋玉節露勻新帶月苔膚雨澀細留雲四簷妍色開晴曉一畝濃隂寄夕醺陶令醉時煩客去夢魂瀟灑與誰云原注此亭舊為蒿萊之地今亭畔石乃故墻兩堵材也十二月二十六日出郊訪無畏詩禪暮歸奉寄寒郊獨往興悠哉問訊山翁破臘回犀軸冰寒苕水句衲衣雪暗錦營埃歸時煙樹鴉聲集望處溪窗山色來此意兒童終不覺閉門脫屩拂莓苔原注無畏近自杭來出吳興太守詩軸所居臨溪開小窗坐見羣山僕歸途二三里比至縣齊此山猶在望中
