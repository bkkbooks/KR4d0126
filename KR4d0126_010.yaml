body:
  text: 東堂集卷十宋毛滂撰序送邵通直序邵子罷永平監北歸告行於常所與遊者郡參軍毛某參軍廪甚薄羮藜飯糗不足以餉邵子之僕夫願從它客通謁跪起致鄭重語三四而已而漠然無餘情念與邵子遊久不能忘也將拭眥霑臉惘然見可憐之色為兒女囁嚅而邵子每見望者又不如是決知其不能爾懷抱索然顧終無可申殷勤獨念少年時飢饞健啖老頗能言哺啜事今不得已試請以此言餉邵子人不可以不飲食也凡羮胾膾脯醢醯鹽酪皆所以涵津液敷榮華心愈體胖為神明家牛羊封豕芬芳滋味紛紜其餘魚鱉兔雉蓋盡取以供祭祀奉賓客養口體今殊不然巨卿大家窮海極陸鱗介纎細毛羽微族形醜狀怪名品不録皆得以供鼎俎汙匕筯自以為珍異可口也一旦禍生齒牙嗜味得毒甘脆下咽鏌鋣在腹其次使人膚肉悶癢關膈壅鬱拘攣偃蹇嘔不得出此時雖欲還牛於俎羊豕並隨洗濯腸胃蘭蕙芼之不可得已此何故也彼於羊與牛豕誠亦有味雖瑣細怪陋能使人流涎被頥而其毒昧昧嗟乎士有常德厲行不出竒吐甘以驚世為媚悅也世視之真寡味難近則使人幾何不繾綣甘熟綢繆軟媚乎淫詖之言甘如也吉善之言淡如也甘言煒煒俾躬自瘁淡言煌煌禮義之房淡者以養甘者以喪且人切愛其身也愛之則求所以養之得其所養則名美而益榮失其所以飬則憔悴而多屯飲食者亦若是口之於味耳之於言淡者居後甘者在前理必然也亦自擇而已嗟乎定交之難知人之難養身之難今於餔餟得之邵子名家子好學問吏業過人於世見頭角寄門戶者今官日益髙四方水陸甘異當日集於卲子之庖它日下筯而食也庶幾無忘此言乎送南禪長老浩然赴雙林序今之士大夫往往能誦佛語而為之説豫方學孔子未暇求其書讀也然亦微識其意蓋無君臣父子文物禮樂以世所見為幻以虛空不可知為真得其道可使外形骸絶去聲色香味安於死生一無所貪怖喜憎大率不過如此其徒有談其説者必手如意坐髙席脂韋宛轉長聲而軟語世名闍黎又有短袴衲衣踉蹡屈強所臨几席增危而更侈傍置一拄杖其下有側行胡跽設意以問之者乃軒然而坐浪平然而答皆離絶逺去出沒渺茫忽明忽晦如風過電照不可襲而得者世名長老豫固三聽而三省之矣了不知為何等語亦不知世名闍黎長老果何如人也以是益不喜與其徒遊而浩然既為長老其不相從宜矣豫又鄙朴于人事曽不通曉間居鄉人不往來獨怪浩然見豫必喜往來為不厭倦豫孤寂寡味亦甚喜與浩然語然誠不敢以世俗所名長老輒望于浩然也浩然渾厚人神定氣平出語如決江河不可滯礙其有道之士乎孟子曰道若大路然浩然蓋嘗服儒衣冠矣豈亦嘗步趨此道耶將去豫而之它尚不豫告何也幸茍知之佛逺乎哉佛鑑大師語録序佛以無心通逹一切法而以一音演説之故法法皆心説説皆法半字滿字有離有解有假名字而無一物四句百句千萬億句乃至不可説那由他句其字有盡而義無窮始自四十二章西來而佛書遍中國能言之類無以復加如經所説山河大地皆是菩提燈發勞相譬菩提心為一大鏡而山河大地一切衆生草木根芽之類皆清淨本然中所現物故隨取隨用而其取其用皆不外吾鏡中則其能以無心通逹而一音演説字有盡而義無窮能言之類無以加豈不以此哉然佛以無言言故如刀畫水如空中鳥迹過不可尋而昧者欲求畫于水求迹于空故觀一藏教如大海普雨而欲以淺智悉數其滴至不可得則生迷悶于千萬億句計常計斷見中見邊如步屈蟲腳移後躡前終不得捨而曾不知反滴為海則千萬億句畫亡而迹失有大智人菩提逹磨具佛知見愍此世且為教所縛而來解之最初一語廓然無聖有求心了不可得者即以付之故面壁不立文字而一藏教咸露無餘佛音人音鳥音獸音一切風水百物之音是音皆説是説皆義乃至牆牖棟柱無説亦説隨其根性使各悟入如是解脫無量之衆譬五百比丘各有悟門言人人殊而佛告舍利弗以彼皆正説無揀擇也粵有佛國禪師白公天衣懷公之裔孫法雲秀公之嫡子提祖師印為一切雄而佛鑑大師惟仲又佛國之嫡子始從佛國悟庭柏義即獅子吼盡眼色界隨類拈出物皆金色而佛國不作如是言佛鑑亦不作如是解也或舉庭柏義問者則曰莫謗我師然青青滿前用亦不盡既往金山龍遊道場皇帝數遣使降香學者雲集震于江南會補之至金山師傾蓋欣然語以家弟無極宰説之宗旨夙契嘗赴初請桃園鼓山亦以補之于道有少分因出門人次集語録求為序引補之聞之昔佛一時取恆河岸一葉告諸比丘我所覺了一切諸法如大地草木為衆生説者如手中葉佛以為葉葉皆舉纍劫不盡故舉一葉使自趣入而縛於教者始葉葉而求之非祖師具佛知見則安能不立一指而盡佛之藴無有餘哉知此則如來祖無異禪也故因佛鑑語録而伸之贊雙竹贊并序政和甲午臣某蒙恩佩嘉禾章得治其民當主上以清淨臨海宇而天下無事臣某素不知吏道幸茍安之亦卒無可治者是幾與百姓相忘於千里之內獨覽觀日月淑清山林膏潤風祥露甘鳥獸魚鱉咸若守臣無功飽食閉閣自處於太和一物之數而已州之嘉興縣尉臣丁某來告曰尉舍東有竹其幹合生此國家之祥願以上聞臣某既以圖聞竊自惟念傳記所載歷代休祥蓋時有之然非若今日之盛也側聞四方所上仁木可集而為林嘉禾可斂而充廪芝秀成田黃金瑪瑙波湧而山積鳥獸雪翰素膚籠致以獻者不絶於道恭以主上德至大也其大在天地而其細不遺草木蟲魚故休氣充塞乎四維八荒之間沈浸薰蒸孕和育秀蔚為休祥殆不可以數計非若傳記所載么麼眇小而已唐叔得禾異畝同穎遂作嘉禾書主上寬明仁恕克享天心長發其祥膺受多福故風角占曰福先見曰祥今祥至如雨將書之則亦不勝書矣臣某伏覽太師魯國公蔡京奏曰臣被恩殊尤前後非一自夏涉秋瓜果之賜不可勝計內雙頭並蒂者臣謹記得李實五百六十有七瓜一百八十有三林檎七十桃四十有二皆宣和殿內禁苑所生自昔得其一二以為上瑞今盈奩實篚其衆若此非聖德感格克享上帝之心隂陽協和孰能與此臣某舞手永歎曰此禁苑所生太師被賜者如此爾而天下瑞物新新相續未易勝言也而雙竹何足道哉臣謹昧死為贊以廣其意云皇天無親災祥在德祥為福先若合符節究觀前王瑞載於史事才么麼為國大喜和氣被物今無不在物莫非祥史曷勝載聖人清淨其道如天近隱旒纊夫天何言發為至德薰為太和散為休祥諸物盛多其和惟一四海一心祥其在茲餘不足云國家忠厚堯舜性仁湛恩汪濊與物為春惟此君子雲儀玉骨徑秀有節空洞無物姿傲氷霜韻含風月沖和所被疏簡亦合蒼龍並躍丹鳳和鳴內向夷狄同體君臣江湖荒寒蕭艾相倚青鸞不遊白鷺羣飛幸列瑞物奉圖赤墀庶同瓜果托根禁籞獨立蓬山抗節白虎雲日下臨風雪莫萃願奉清間坐閲千歲天光玉色俯照寒翠夀星圖贊維石巖巖生於一拳岌峩千尺寶藏興焉蔚薈出雲磊落承天岸巾石間衮衣貂蟬德盎於背氣充神全與石壁立寧復有騫黃閣丹臺風煙接聯芝田月明獨立胎仙督郵支牀靜閲流年翠竹不改碧桃長妍春日遲遲光景蟬連五雲氤氲三台明秀樂只君子遐不眉夀又維石巖巖維川湯湯下有舟楫上有棟梁雲垂杖屨春暖節幢白鶴翔集緑毛徜徉竹堅松老石瘦山蒼羽衣丈人淵乎莫量動為夔龍靜同老莊五雲咫尺太紫圓方丈人來歸論道巖廊峩峩蒼山萬仞積秀丈人樂之惟仁者夀真人畫贊露涼風清珠星燦然虛出天籟欲舞胎仙瑶光玉骨巢葉如煙婉彼天人擷芝玉田憑欄縹眇桃陰滿前灼灼其華一笑千年雷峯法宗師真贊屹然孤高淡然樂易無營寡言自解佛意頭目非愛孰寫所棄似吾非我天地委蛻衆則仰之雷峯之裔元照律師畫贊是饘是粥自西自東吾錫非行吾鉢本空萬物稊米寄我鉢中遊戲物初南北本同吾道亦然禪律一門過者斟酌中衢置尊山空湖平風止月出在眉宇間清明崒嵂望之或然寫之已失銘中衾銘并序鄉黨三裘狐裘獨以黃配貴中色也偶得狐衾以寄東甫前輩向嘗為布衾楮衾作銘效其意為狐裘銘仍銘之曰中衾子之燕居服御有則黃衣狐裘獨貴中色天質內存可纊可絺裁以為衾何適不宜千載之下視此作式製以為衾猶黃其質晝爾是憑夕爾是寧在暑無袢處寒更溫是故名中以為益友卧起對之庶安且久涑水之清厥衾用布西山之純厥衾用楮皆嘗為銘所尚在素請列置於左右以為此中之輔是名三衾皆以德選彼錦綺紈視此宜逺墓志司法參軍毛文若墓志銘堂兄諱澥字文若王父贈工部侍郎諱德拱伯父維唐第二子早孤煢煢多病骨立若不可耐久先君曰吾兄賢不克夀其後寧當如此教畜加至及冠性寬約苦自刻削口不傷忤物稱謹厚人侍先君側言語呐呐在牙頰間事妥帖不見崖角初同居既破籍獨能共門户出入執子弟事益願先君有子涓滂雖盤盂匕筯間物必使共飽也其仕宦於東南不果與俱委治生事不問其出入多寡數猶曰澥去吾逺得無有疾病不聊飲食裘綌不具乎信信問所當得初弟某年十二嵗時疽發於背幾殆先君適在京師太夫人日夕守視之泣俟其死無奈也又當五六月大熱肉臭敗為膿血流出不可近乃日為其弟某取水手自洗濯去腐壞加藥面背汗浹雨垂無難色先君為郎恩得補子弟官即以其名上不以與涓也不得命表曰終臣身不願復遷官蘄必得又不得命他日明堂恩又不以與某請如前又不得命卒用致仕恩補郊社齋郎試法律調池州司法參軍以歸而先君有不肖子滂愚不及事弗克負荷大託使其憂勞病心神明忽忽不寧既克葬家日貧顧視形影懼死無以見先君於地下既而病良已行參軍事臨别為某言吾得續喘息齒衣冠復用自别於里巷常人惟叔父恩大實骨肉之使吾弟得長守先人田廬有稻有桑有雞有豚奉祭祀不乏給饘粥裁足仕宦不失州縣掾佐吾不過望也二月乙酉卒於參軍舍年四十一嗚呼痛哉其孤奉喪柩自池來歸用卜人言白雲村西山之地為爽塏宜葬視之果宜又南望侍郎與先君壟樹鬱然風聲相答山蜿蜿如遊龍周遭如垣墻土厚穴深兹維永寧也始娶劉氏先死生女為士人妻後娶李氏生三男皆幼三女其二許嫁矣九月庚申克藏於此實元祐三年銘曰善則內充數則早窮有祿不豐蒼蒼穹窿孰謂爾逢趙氏夫人墓志銘亡妻南陽趙氏諱英髙袓贈太子太保諱曇太保生司徒諱湘司徒生太師諱亞才太師生太子太師清獻公諱抃清獻公生於潛令諱岏娶時氏封西安縣君生夫人於潛有令聞蚤死公以夫人歸於我其歸也不及事吾母能撫我弟妹盡恩意接媪御有彞則平居修整不見惰容怠色積十年婢子不識笞罵之辱奉其母西安君孝有不果見輒使人問衣燠寒往時食客滿吾門夫人乃日為釀酒擊鮮惟恐客不至為具不腆為恨至其自奉裁一肉用乏每不繼輒捐珠璣紈縠以為客具若棄粃稗余性懶慢不喜為吏家人輩竊共笑且罵以為癡拙人夫人曰人生衣食裁足正可休君先大家殆藏萬卷其間聖賢具在君雖閉門以老終不落寞余嘗怪其薄鉛黛衣簡文繡數問所當得輒曰非不足正自苦懶爾比屬纊囊衣僅可以斂余聞仁者夀又曰鬼神禍盈夫人冝夀又無所取禍於鬼神者也嘻余厄日久矣夫人十八嵗為毛氏婦後十年而死其平生乃爾孰謂仁者必夀鬼獨禍盈乎元祐四年七月得疾立殆不復起殯於城南佛廬紹聖五年二月十七日始克葬於此以太師致仕恩賜冠帔一女許嫁宣德郎通判河州王端三男子圭玠瓌咸知學矣嗚呼痛哉是銘也庶幾以寫余悲銘曰德曜之案少君之車惟若人兮可與茹菽伏奧隱約而不癯太末之郊龍潭之湄翠藻翩翩與波委蛇若人莫興其尚似之牛氏夫人墓志銘夫人姓牛氏保寧軍節度推官南陽趙君岯之妻以元祐八年十月十五日卒於趙氏私第某適從吳中來歸往赴哭凡其家人咸來會哭至無踈戚其聲必哀盡某退而嘆曰殁者何以在人是何哭之悲也趙氏尊顯為一鄉之望太師清獻公無恙時門內百口上下肅雍有法度此亦難為婦矣夫人十五嵗歸趙氏性仁厚委隨婦道有可觀羣居與人不為纎芥雖媪御無一退言積二十年一家喜悅共語曰佳乎婦也於戲家人子當豐少時能婉娩如是至死使人有可論記而其親戚之念不衰世未多有哉夫人曾王父諱景為右正言直集賢院三司鹽鐵判官王父諱進賢開封府扶溝縣主簿贈太子中允考諱正平左朝散郎致仕朝散君自王父三世以詞學進而夫人亦能讀孟子論語寫字不類女子父母憐之擇所宜歸以節推君善故歸之節推警敏能吏其進方未央而夫人生之日迫不果待其貴命也有子十人六男子四女長子霩雋頴可愛今舉進士餘皆幼嶷能讀書此夫人素教然也一女適進士徐鋭其三尚幼後一年將以十一月丙午葬於西安縣清平鄉衣錦里童烏之原節推君臨某云以吾妻之銘纍子某故趙氏諸壻而節推丈人行也側聞夫人之善甚熟於義宜銘銘曰牛氏三世有文而禮義之氣徘徊閫內旦薰夕陶天質是懿以為清獻公家之婦而無愧者也吳氏埋銘元祐四年二月十八日居士吕博聞繼室吳氏卒五年九月二十四日葬餘干縣政新鄉焦原前事之日其子弼康詣郡司法曹毛某上謁泣再拜乞銘曰母生弼康八嵗而死後母遇之如母翁他日逺遊學見益闊踈母常提携視寒暖渴飢至於成人知問學咸母素教也今棄其孤歿大懼泯懿實得一言可信於後某平生所至喜問人物來江東聞弼康有文行既見憐其困語之曰學勤文成而厄窮乃爾蓋何以自寬始聞居士君頃進取齟齬夫人輒曰命爾了不芥蒂逮弼康三舉三罷夫人曰固有數於是乎知吳氏望其夫有道又知所以教子矣三男弼安弼康弼成而弼成夫人出也一女為士人妻世為饒之樂平人銘曰事夫撫孤嗜義如惄後婦後母想見粉澤文送鶴文并序太師魯國公取鶴於華亭將歸之天子之囿相鶴經云鶴千六百年飲而不食與鸞鳯同羣又云鶴仙人之騏驥今天子撫世清明凝神沖虛而天人自見數奏鶴數萬隻翔集魏闕上慶雲湛露之間將下與鴛鸞接武而此鶴乃鎩翮投籠爭食雞鶩賴魯公之力得同白駒之見維陪振鷺之在廷備仙人之騏驥騰飛於天衢嘉禾假守毛某作送鶴文一首鶴將去此而何之去故鄉之蒼莽謝雲海之渺瀰豈將問路於黃鵠下建章集太液矯仙雲而凌煙霏顧天居之崇絶有九虎之守關孰為之容乃得通紫禁而望赤墀惟真人握圖體道髙妙凝神清虛而撫世無為致天人之來假宛圖畫之所披浮宫殿於縹眇燦環珮之陸離霓旌絳節舞鳯僛僛若汝之類翔集則動以萬計下觚稜俯金雀而窺璇題汝獨與雞鶩而同老向湖海而棲遲賴魯公之餘力致沖天之一飛毋憂汝渴飲汝以瑶池之水毋患汝飢食汝以玉田之芝見金人之露下何繒繳之能施見天子萬年莫如汝夀上固將見汝千六百年與鸞鳯而羣棲充汝凌霄之姿毋回首於藩籬祈雪文念嵗且盡當寒而溫天雖小差人則大病豈惟病也飢將繼之姑召膚寸之雲噫欠盈尺之瑞我惟不請神無不從又某以不德久託農圃之上適東南大旱而吾境連嵗風雨時若雖三尺童子亦知神能出雲氣作雷雨若慨然有意助令活黔首者然自夏徂冬以雨雪來請者再而亟雨倐霰垂密復踈若甚不得已陽應而隂不與也人之無常不可以作巫醫神顧巫醫不若哉有始有卒其唯神乎今新宫且成舊令且去無使邑人勤前而怠後神雖不恤慚我豐碑庶幾朝暮一雪尚足追救敬羞飲食薦陳此意為湖州太守祈雪文戊寅之春旱魃盛氣寒沙寸碧俯見魚背飢蠶出筐老農釋耒誰謂秋郊蔚有卧穟驕陽憑凌荐嵗偃蹇稚稼柔桑不絶如線今誰致之雞有餘啄令雖焦勞德則涼薄噫欠飄忽風驚水立欲問此恩碧潭千尺令不敢有告我州伯伯聆而嘻六邑之民我弟我子有澤斯均是何一家東雨西晴遣吏送誠庶分餘滴薦羞芬苾將命祇栗惟我州伯令問甚休六邑千里和氣所遊藉令不禱神得無意今聞其言宜奮且喜上封請秩豈神所欲謂豫不信有如皎日謝雪文我之依神猶指有掌神之報我如谷答響我養吾民媪之負襁民反不信神獨深亮豈有雨㿩寄神之宫持券取之若探懷中翳陽為隂吹雨作雪玉樹瑶峯曉相映發未雪憂疫既雪亦憂道有凍骨吏不能裘耿耿念之奈此皸瘃扶桑忽暾氛霧澄駮令實不德神茍不怒豈俾無功坐收豐豫神其警我厥意可訂反怒為德以是愧令爵芬豆肥敢不修敬又某之息肩曾未浹月秋則不雨冬亦不雪神非容心吏有慚德蒼山之下紫潭之湄我以旱來雷電隨之窮冬不裘蒼鵝再血日午無雲暮霰朝雪封豕芳醪聊以告潔神食無羞吏亦塞責又嗟乎某之賦命竒窮與物聱牙欲效脂韋而自營終坐悃愊之無華衆所非笑而排擯神獨眷顧而欣嘉追夢想於江南識蜿蜒於水涯山團欒而木夭矯淵清泠而雲紛葩記夢遊之在目比當時而非他豈嘗為流萍與斷梗宛相值於濤波共浮沉其無際留夙好而不磨所以洗強顔之枯稿借餘潤於噓呵雖然神亦何心孰計繡裳而赤舄人茍潔意肯陋濁醪而蒼鵝獨謂儻前日之不雪人將以豫言之云何慨舉一觴以相勞豈憚殘雪之集鞾代蔣守謝雨雪文戊寅己卯吳東西州皆飢武康春繅秋穫獨無不足之色縣令毛某以龍效雨甚力上其狀刺史府某托於吳興士民上數月矣夏秋雨不破塊而冬暖復可念端憂閉閣寸雲天髙今兹聞問甚嘉屬吏以請而快雨密雪與吏俱來聞唐之貞元間龍嘗為劉汭雨矣蒼崖紫淵老於其下今復幾年邑人了不稱道刺史不獲預聞然吳興六邑武康亦刺史所治而龍之下澤曾不出境五邑之民未嘗分甘豈龍亦有職守將不過百里之地耶雖然前日之請乃復沛然答我又豈龍之蟠屈泥沙自混蠶蠋恥為狡獪變化以要巵酒豆肩耶將所不能忘情者近村比社之人時時噓呵餘潤用慰其枯稿之望耶此某不能致詰然既以惠我當永以為好八月祈晴文農夫之倚耒望嵗久矣行當磨鎌而刈燎釡而炊雨輒更敗乃事豐凶將決於隂晴之頃曩以憂烜得蘇實神所賜今復垂飽而慮飢神可不終惠乎謹羞菲薄有謁祠下又入春恆寒一雨彌月人在溝壑陸遊龜魚敗塍決圍臯野為河疾病在前飢餒在後為民之長安致此祥引咎百神求霽淹怒告龍潭封淵應廟文寂然忽恍之間憑附土木血食於世者每日有神物在也祠宇甚壯爵名甚寵儼然人望而敬之者甚衆然皆坐厭芬馨德惠不紀借有頗見異者不過能為寒暖痛癢以驚怪小人女子之心豚肩巵酒冀幸一飽而已嗚呼人神之間亦有僥幸相蒙如此者乎龍之神澤加於民甚厚自唐劉汭時已蒙惠矣汭以上聞僅許立祠而國家恩禮莫及也今則祠宫亦已鞠為茂草多歷年所前後令逢旱則席潭滸以禱既雨則與神缺然相忘神雖不以望人然負恩嫚德者在令與百姓矣今朝廷不鄙陋某前之請詔禮官疏榮號備載敕文邑人又且伐木陶瓦相爽塏以新神居矣故率僚佐詣潭滸備禮以告雖然人之有道德者或輕軒冕茹蔬飲水而不願乎膏粱山棲谷處而不願乎華屋廣厦况神淵潛而天飛變化無方顧於此三者豈所動心哉凡吏與民無以報德姑發妄想而假托世所貴者以致區區之意神其一笑許之武康謁廟文令於今蕞爾甚輕然有民有社食其廪者所畀則重神又托於令之始而血食其民則凡所以惠康斯人者豈獨在令也某不敏非時所推擇姑以資當為令一日據案涉筆蘄無負於明幽亦庶幾與神共濟百里之命敢以區區之意敬謁廷下辭諸廟文某饘粥於是一再勸耕當此無年懼上澤有壅乃終以理去咎孰任之某不自恕神實私之奉此一觴以謝不敏又某竊食此縣百神相依惟時三寒暑疵厲不作水旱不加神則厚相我厥惟惠養不至風聲不立我有愧於人神乃獲終以理去顔用有忸怩唯此尊酒來與神訣辭龍潭淵應神廟祝文某與神定有夙契三年雨㿩若車載我後欲得則傾車以出既厭則俯拾而復載以故雖民政不紀而倉廩有餘果腹既衆而禍心亦薄使強顔之人得以理去其在兹乎顧惟祠宫未完而民約已爽蓋民知令去不知神存雖然神豈有心與民較此其所知者濟物而已尚哀其愚蕩然闊略也異日雨㿩以時常若某在謹奉一巵來與神訣
