body:
  text: 東堂集卷五宋毛滂撰制龍圖閣直學士太中大夫知亳州王益柔可差知江寧府制敕江東巨屏莫極金陵惟我邇臣宜承重寄具官某夙多踐歷今為老成委以拊循庶言惟允鎮兹剽俗繄厥靖猷服此命書往其無替可承議郎直集賢院范育可權發遣鳳翔府制敕某扶風者蜀隴通秦之控也異時商賈輻輳獄市繁多故最為關中之劇郡爾能以儒學潤飾吏治而又風俗習焉故因以命汝勉服訓辭務修循績可朝議大夫守吏部尚書曽孝寬可資政殿學士知潁昌府制敕入正六聨出分近輔眷維舊弼推錫龍章具官某溫厚端方淹詳博敏早聞邦論久典治官比厭劇繁屢申情懇永惟加惠固所重違袐殿華資陪京樂土往繄坐鎮毋闕告猷可表進恢復河湟賦表臣某言臣頃以縣令守陛下民社於封禺山中日夜所以噓呵父老磨礪子弟皆仰承熙寧元豐之遺德故臣於當時簡書號令亦竊耳剽日久陛下初登納牖之法座道隱旒纊恭默不言適大臣新用事頗失經綸之意孤奉陛下仰成之恩而觖天下望臣甚惑焉明年臣當改任西入國門竊於道路聽聆風聲尚因循而踵故也小臣不知國家治體其惑益甚未幾舊德真儒更起於江湖上翔集廟廊於是其風丕變稱陛下之意慰裕陵泰陵之神明快士大夫之心治與古合惟是河湟故封棄而未復臣惑未解忠臣義士所共憤悶然又未幾湟中之地指麾而定雋功休烈無愧前日方聖謀獨運天機默啓而竒迹未暴也將士猶休馬解甲而枹鼓未鳴也臣竊聞縉紳之論老兵宿將之言咸謂狐兔穴深恃嶮守隘鎧甲犀利其衆梟雄敢死而善戰故將士不敢有輕老羌之心吞河湟之氣然天聲一臨威武紛紜湛恩汪濊鳥驚鼠竄遊魂窮山不知死所臣然後知聖人有作天應地隨關機闔開神聖出入妙乎其不可識矣矧廟堂之老帷幄之傑仰奉睿謀如手應心此豈容天下所共知也臣中謝恭惟皇帝陛下練天地之純粹攬道德之精剛行大人正己之事知童子害馬之言倚丕基於南山納衆流於東海使先帝十九年盛德大業上格於天下格於地中浹於人而外冒四夷昆蟲有命之物無不仰戴蓋自陛下夙夜追述續紹基構纍積而峻極如是也尚乃兢兢業業無自廣之色有為善不足之意故小大之臣咸懷忠良僕御侍從罔匪正人日月軌道風雨時節草木遂茂山川鬼神以寧而鳥獸魚鱉咸若也荒服君長移珍抗手稱臣闕下百姓歡忭中誠感發致治之敏尚以置郵為淹臣質之詩書考之傳記踰唐跨漢引領軒虞所以稱治者五六君而已陛下棄其糟粕收其英華接武治道如涉東西之衢超此五六君蓋已萬里矣臣本江東諸生材學行能無可算録頗嘗漁獵六藝之囿素知筆硯淺事陛下天縱聖學言成五經昭回之光下飾萬物故褒衣博帶之臣相與涵泳聖涯丹青景化而結綬金馬之門磊落相望惟臣命薄骨寒抱病溝壑草木之年亦已晼晚尚區區誦書洛陽市中徒聞有四庫之典蓋曾不及蘭臺之蠧魚者也竊聞王師掃灑湟中盡有故地功德顯著聲施甚美而大手筆之臣炳然在廷其所以鋪張論述刻玉牒藏金匱者其筆勢宜盡出班馬右方鳳鳴髙岡鶴唳太清而小蟲唧唧微鳴草間蓋時所感動而不能自巳也故昧死獻聖主恢復河湟賦謹繕寫隨表上進以聞代人謝御製詩表瓊章妙句仰煥奎文玉斚上尊俯霑濡澤既共懷郢握之貴又獨袖隋掌之明豈以臣濫被九鼎之司故常使識八珍之味垂光海宇共窺雲漢之昭回不夜臣家獨見璇源之圓折中謝伏惟皇帝陛下多能天縱盛德日新固已郛郭於五經不足喉襟於六藝訓誥追三代之典則詞章存二南之風流豈惟殘膏賸馥將沾丐於後人是謂非煙祥風當緣飾於萬物天清氣朗晝色永於上林葩正華繁春工贊於宸翰寵踰華衮之重老增布帛之溫願子孫之相傳付金石之同在伏誦膏雨之初霽益見聖神獨運之功雖云羣生之有年敢拜君臣相説之樂代人謝殿監賜對衣金帶表內監深嚴本有待賢公卿之選上恩優渥乃過意臣父子之間朝無一人之言澤自九霄而下聖主自為之奬目微臣何假於賞音茍一旦未濫於瓶罍是此生終辭於溝壑惟臣之遭遇可謂非常然時之滯淹豈無遺恨臣中謝伏念臣材非蚤就學最淺聞當百執事之間未免沾沾而自喜在九卿之列又羞陸陸而無庸每被使令了無稱可差幸未盈於百謫云何不啻於三遷念當却掃於衰門遂恐墜東山之望寧意乘良於壯嵗曾不知周南之淹超諸搢紳快如插羽此蓋伏遇皇帝陛下急欲求治每恐遺材雖俯仰太平出自聖神之獨運尚網羅多士姑備左右之美觀如臣何堪逢時乃爾身居供奉之內最為依日月之末光班隨侍從之間何但陪鵷鴻之清集人間風聲塵土之不到陛下起居飲食而預聞顧影若加華衮之榮撫心則懷薄氷之懼蓋衣裳在笥臣有涼薄不勝之慚束帶立朝臣無詳贍可觀之譽惟希古人之慎密以答上眷之周旋代宋漕司謝上表一麾出守所昜堪小壘而寡民八使分行將難副連城之重寄馳傳趨宣風之旨叩閽無望日之緣對青蒼識所部之江山見父老示當頒之德意中謝伏念臣器能甚陋風力不強空懷赤心素乏清問事主則有曾門之餘烈家傳尚藏太史之遺書豈忘激昻了無表見一昨備修書之數未幾塵持節之行亟召置於府僚旋擢居於卿列念凄冷初榮根柢春施均被于惠風顧髙華本絶階梯秋毫皆歸於帝力所以未及逡巡而退却然而深虞批抵之侵凌屬當守壘以須期乃復闔門而涉嵗曾未暖信陽之坐席遂已祇吳會之除書方其多士充庭不乏鵷鴻之翔集特恐一夫失所尚計鳬雁之去來誰為臣言自出天意惟臣際遇非人力能此蓋伏遇皇帝陛下允釐百工旁礴萬物不令盛世致有遺才姑收尺寸之長亦異尋常之寵矧驅駕豪傑俯仰升平天人所以調諧瑞應所以辨至鼐露淪軒轅之粹韶雲舞崑崙之仙凝旒太紫之間洞燭寰瀛之表恩行雨作威至電飛窮日月之所臨罔恩威之不逮既臻逺近之無事屢逢東南之有年使臣更復何為報國能宣薄效第當萬艘銜尾助陛下惠養元元一節究心免微臣因人陸陸進連理木表兆民允殖惟一德之是歸厥木惟喬當至仁之所及在木理何知而乃合見人心不約而自同玉華效祥甫被上天之雨露道山呈瑞近蒙中禁之風光逺在偏州亦霑餘澤况兹木之良異視他種而增竒獨引一枝相望八尺修條中立屹天柱之承霄兩幹旁連矯虹梁而濟涉嘗考圖書之所紀謂合海隅而為家恭惟皇帝陛下道洽無垠德齊有截開闔之妙物被於曲成覆載之均世容有異意兹表君臣一體而共理蓋符本支百世以同昌念臣有固陋之愚雖孤民社之寄惟地出太平之象自成草木之祥敢佐太史之筆端庶備升平之瑞物啓上中書侍郎啓折楊黃華僅能入於里耳髙山流水寧當嗣於賞音譬如鳳凰見而羣飛嚶鳴滄溟開而衆流歸往恭惟某官巖廊大老衣冠真儒金匱紬書獨當一字之褒貶玉堂視草逺追三代之文章至於穹廬奉對之専紫樞坐籌之密增重本朝於九鼎制勝遐方於兩楹惟天之北斗中樞應國之南宫左轄方當翼宣元化輔成人文可謂勳德並隆文武備足是何區區路傍之小吏敢進平平紙上之空言所憂唐突於璠璵非敢爭裂於綺繡藉令優假終不自量重念某才不如人志空好古鉛槧淺事昔嘗趑趄韋布半生初無表見亡羊亦何異於博塞不龜了莫及於封侯况羽翮不修合在榆枋之下語言無味誰收俎豆之間鹽車甘駑馬以同勤竹簡與蠧魚而俱老悟筆硯真取窮之具而文字乃招嫉之符徒使聲鳴益悲尚無公幹之逸氣徐思少作可悔烏用相如之浮華宜清朝數免而稀遷愧古人難進而昜退髮今短短而先化面久蒼蒼而包羞行路人得以揶揄士大夫喜於掎托此而不去何所欲為側聞遨遊上公之門竊亦棲遲下客之座雖是尊卑之異等敢希臭味之同歸况昔與諸生得共聞於綿蕝今隨庶物幸並出於陶埏正應顧主而悲鳴先喜過門而大嚼矧屈借齒牙特達之論曾不遺腹背闒茸之微惟寒谷氣遲未覺東風之解凍睇繁雲目斷但傷急景之雕年端念學殖之已荒無望儒林之擢秀日暮途逺空懷三徑之歸月明星稀妄意一枝之托謝舉主啓聞冀北之足已空尚煩收致類遼東之顙強獻盍取慚歸頗哀蹭蹬之年少借殷勤之論竊謂薦士雖古知人甚難或者好龍非真烏覩凌雲之異不然相馬失瘦莫顧負轅之良欲觀其人當問所主初或收光而未耀終有泣血以相明至如鈍頑敢纍明哲伏惟某官雅屬時望藹為辭宗開卷綆長而汲深故得百家之淵奧下筆芒寒而色正獨燦一天之星華未參髙妙之遊尚屈澄清之寄方廣洪河以容物執玄鑑而照人如魏王之瓠無堪反浮沉而得所視無鹽之貌可惡將刻畫而難妍某骯髒寡諧流落不偶幾欲請璽而治鄴本非好竽而求齊平生多竒固有定數際遇雖晚亦豈偶然鑽皮儻插以羽毛蒸朽或出其芝菌未能報德何敢辱知又植當道隅衆且指為苦李投畀爨下自寧必為良桐但思襆被而言歸何敢執裾以求鬻竊謂薦士雖古得人甚稀區區搖尾者了無可觀紛紛引手者亦何所見茍不旁借聲勢則當外務衒沽藉令黑白判於目前未免寒暖移於筆下今見取於衆人之必棄使坐據於諸君所共爭借清議未然或纍公人物之鑒亦髙風獨凛已驚渠世俗之心伏惟某官邦家舊人師帥夙望雅抱逺韻蔚為文華天子意在胸奴郎官尚淹於父老都市血流俠少京尹未害為循良誰使時和而嵗豐本出政平而訟理晚遇有依劉之幸老狂慚薦禰之文蒼驥方騰踏於夷途勢當致逺青松獨磊硌於羣木氣已凌寒乃欲分餘力於駑筋綴和氣於凍枿俾一旦軒昻於欵段或異時追配於輪囷某少頗觀書初不讀律名姓空沈於州縣年光半度於江湖未嘗知治而敢諱錦傷正如學醫而惟恐人費倦龜欲遊於北海拄笏時望於西山敢意提撕強令奮厲假以羽翰之力被之衮繡之言何異披樂安之沙終日僅收粱粟聊試拭華隂之土半夜或出光芒永懷推轂之門孰是銜環之地又弔影江湖未嘗備門牆之役借論牙頰誰當為根柢之容既不類相士而舉才又不待察言而觀色嗟乎途且逺而幾暮無乃樹雖病而亦春伏惟某官蔚為辭宗雅仗名節進止自有表識窺看不為精神行陪前席之談尚屈外臺之計問利亦仁義而已欲婢妾榮夷公之謀理財非玉帛云乎蓋寢飯昭奚恤之意故屣履以見賔客如懸衡而較錙銖甚若不材尚辱異眷重念某素著狂直無他庸能平生最耻自媒老去每發孤笑唯有鉛槧之技莫施簿領之間幸無箠楚之聲未敗弦歌之俗久將自考下下以歸去安能更共陸陸而低徊敢意恩私首及孤冷獨是豐城之光怪望者有能識之竊比周袖之良珍出則無肯售矣唯痛自洗濯將上報提撕又原注以文章可采乞朝廷甄擢揚子雲貌寢而官卑經雖玄而謂白九方歅機深而識妙馬本驪而謂黃世方共輕其書誰復獨忘其外此蓋先儒付之於悠悠者未應小子肯至於屑屑然借論齒牙淪愧肌骨伏惟某官早馳令問蔚為重人暫屈使華之南更未礙佳聲之北去無負勢驕人之氣有好古下士之風謂簿書米鹽非豪傑之標的唯文章人物真太平之丹青聊慨發以一言蘄振出於百里重念某年嵗晼晚形體支離當投筆研而荷犁鋤賣袍鞾而換蓑笠恐難待西江之水逝投老東岡之陂空託知音無從報德又僕射題目之幾何可勝東南之多士相君親舊之未及况無左右之先容寵借一言本乏半面往有市茯神而得老芋或至欲昌陽而進豨苓雖衆人之可蒙待良醫而自判今猶饗萬錢之饌擷杞菊而並羞又如作千金之裘搴芰荷而同製伏惟某官氣大經世才髙絶人馳聲象魏之都彌節湖山之會求於公論宜即近班至於出滯振淹真得古人之用意所謂承流宣化是從長者之折枝第如孤蹤誤煩雅眷某才穎不耀辭華昜零長年與世而聱牙中夜撫劍而躑躅無言弔影有愧賞音借為趙魏之老或優尚念齊秦之路未效更當鞭後蘄副挽前通問監司啓八俊分行本自簡於上意二星所向殆亦出於天心故欲賦皇華之詩必先賜清間之燕至所以不待次而用端必有過絶人之資伏惟某官間世逺猷當時秀望是獨翩翩而蚤就何容陸陸以並驅唯金鸞振鷺之遊將觀步武顧木牛流馬之事聊試緒餘某蹭蹬涸鱗獨速短羽鬢髮未老而先化田園將蕪而不歸姓名雖不序於後塵形影蓋久依於美蔭每欲追蹤丈人而獨往何敢刻畫無鹽而自媒第嘗得糟粕於斷編亦時有筆硯之淺事必當綴履請徑同兩錢之錐或許揚眉願少借盈尺之地幸讀書不咍於妻子將定價謹屬於君侯又獄市并容衆仰冬曦之愛鷹隼始擊共窺秋漢之清方人主欲觀升平之風矧使者能養忠厚之氣頃旄旌未辱蓋光彩已先恭以某官搢紳重人宗廟珍器况平畨乃屬老手正自談笑而有餘唯經綸久抱雅懷尚復卷收而未究某日暮途逺肉緩筋駑未伸堂下之一言先辱鹽車之顧獨負胸中之百紙敢羞醬瓿之須又少年好學初如蠧簡之魚晚節為貧終類太倉之鼠夀陵欲歸而步既失單父雖細而形已癯尚何可言茍幸托庇恭以某官氣並冬日詞摛春華漢使繡衣尚提三尺之法道家玉字即觀四部之書方求史筆之精魂當屬文章之司命顧江生無買名之意僅存覆瓿之餘聞韓侯有定價之聲輒纍懸衡之下又初觀除目欣屬我輩於老成逺臨傳車想見國家之忠厚伏惟某官學歷閫奧氣摩雲天囊括底藴而莫知有餘瓴建淵源而亦復不竭竊意深惟於邦計正在厚斂於人材至於飛挽之云聊發謦咳而已某生而寒氣仕也強顔空憐編簡之光隂盡寄簿書於晼晚尚不念先驅之訶罵獨仰望良醫而呻吟目力昜窮姑獻十家之縣江波無際幸容五石之尊又平粟待儉敷泉均勞雖號熙寧之新書本是治古之美意為法固善得人幾稀恭惟元符真人所以勵精至於常平使者可謂妙簡况上自二千石之吏未嘗不因緣以升沈逺雖十四州之民皆得赴訴其疾苦伏以某官文學前輩搢紳先生聰明殆出於天資議論不牽於世俗坐見人間之情偽皎如鬚眉之落鑑中立去部內之邪姦快哉鷹隼之摶雲上某少學詩禮老沈簿書弄槧磨鉛頃纍名臣之論束帶斂板今隨俗吏之羣曾不知傷錦之譏尚有志著書之事煩借牙頰當生羽翰賀蘇右丞啓丞轄天臺進陪國論賢者在位君子得輿豈特糾八座而辨六官要亦順四時而遂萬物出雲雷以下澤扶日月而麗天明詔始頒公義交允伏惟右丞言有壇宇得先公之靜剛思通神明跨伯氏而髙妙器非近用者所就必晚天欲大任者其始或勞時初嶮艱未免柔從於蒲葦心獨間暇曾不奪常於電霆杜公有應變之才裴公無左右之助顧斯文之未喪得其羽以為儀起遊道山進直青瑣發當年之涵蓄破俗儒之譏評玉堂搖毫飾王言於黼黻烏臺正色立朝士於風霜今膺夢求頗慰人望某鈍頑無比嘗塵君子之下交榮悴既殊空記先生之餘論安敢彈冠而蘄彚進且將拭目以觀太平賀右丞啓伏審光膺制命入贊政機國家用賢寰海蒙福竊謂學稱堯舜人誰無致君之心材不臯夔天莫與經世之器故雖抱經綸之學要必有王佐之材世非斯人書亦虛語天地萬里在欹器安危之中民物九州寄小鮮熟潰之內得人則置器烹魚之昜失道則挾山超海之難惟聖主有心三代之時挈升平付公六人之手寵寄者可謂重大素定者得不從容伏惟右丞當世真儒先皇遺直公輔之望少壯已然譬豫章之木耿介於林中自然有廊廟之質泰山之雲氤氲於石上無疑為霖雨之期郁乎西漢之文章顯自北門之學士後千年大都通邑尚驚史筆之精神比一時宿學老儒共戴文章之司命此蓋餘事固已絶人究其淵源未及涓滴今當盡發六經之微妙散為萬物之中和某二十年竊承下風嘗數千里願效愚計晚能際遇謬塵筆削之間今遭棄捐猶在陶鑄之內倘不從珮紳效能於鞭䇿尚當與蓑笠受賜於江湖歡喜之多拙訥難盡答曹守任中散啓伏審下車云始褰帷之初蓋已藹聽於休聲是曾不煩於老手恭以某官天資之敏士譽所賢久更練于中朝暫均勞於近服精明之力固自有餘愷悌之風正應不乏當未期以報政宜不晚而召還某久念素餐之可羞方喜嘉蔭之是托乍兹阻濶實有依歸敢望善履餘寒荐迎多祉與饒州太守辭免權幕官啓子厚蘄見權公非能朝造而夕謁建封克用韓愈不為晨入而夜歸何特蓋于強顔正復弭其狂疾至有長者之髙誼得無雅意于古人伏惟某官天付逺猷世獲重語朱轓畫戟漸倣徉其要津墨客詩人猶形模於少作下車一日奠枕萬家豈惟獄市之并容未忽米鹽之煩碎至於柬辨人物必先濶略簿書某得備屬官絶無能技案此下五字原本缺故態獨不果於間居拙異安仁之褊心了何疑于巧宦可謂支離之受粟敢為舒緩而養名况斐文無用於當時又奚逃於醬瓿顧綿力不堪于長坂姑欲避其鹽車今吏情薄如雲煙惟學癖牢於膠漆間而誦讀雜以呻吟茍無細故於胸中甘老分隂於窗下况須少日遂可解歸或假三冬俾之足用望裁如此公獨謂何到秀州謝執政啓羣材並植肆望把梓之成林短羽退飛盍投鳬雁而為伴第可江湖之歸去豈堪民社之承宣此蓋伏遇某官身運天樞手執人柄生成萬物而寒暑必信進退百工而邪正自分談笑巖廊夢想人物顧翺翔要路既盡收經術之諸儒獨牧養小民尚兼取簿書之俗吏乃俾寄身於飽暖何敢企望於功名重念某畎畝餘生門墻舊物雖蒿萊之未出然本擢於勾萌借風雲之不隨蓋荐長其卵翼受恩深矣圖報缺然悵渤海之方春旅翮先謝惜崦嵫之晼晚馬首何歸感愧既深歸投益切賀執政啓伏審孚號大廷登庸哲輔羣情久徯而忽獲和氣不召而自還在昔王佐之材或見畎畝之內至遇合之時蚤晚略異而經綸之志顛沛不移矧政路曩所周旋未幾忽收於膚寸而真祠久於涵養一旦大決於隄防百里為驚萬穴來會恭以元聖在上朝陽當中天光清明雲隂解駮付倉公以針石衆疴自除屬雨師以風霆百榖是仰伏惟某官蓍龜羣疑之信權衡萬物之平股肱主躬筋力國體立朝居豪傑之目得道本清淨之門天降大任而初乃或艱帝賚良弼而終不可圉徇身之謀常若不足經國之器乃自有餘濯痍噓寒初出立談之助破涕為笑速於置郵而傳况運動樞極以通政機掌握至公以為人柄喜及荆州之未老遂得相材賴有太原之奏存自應天啓某頃緣編削幸備官僚適傅羮之不和坐魯酒之自薄羣公未嘗與之題目諸生猶數見于排拫蘭陵此時亦自喜抱關之賤淮隂前日矧不過執戟之卑但冀未死於飢寒尚或有待於振出竊以夫子攝行魯相豈獨喜於下人公仲輔佐烈侯誠有意於進士蓋出社稷之大計不緣賔客之私恩仰惟談笑巖廊夢想人物太平之基既立勢成九簣之堅清明之象益昭力當八柱之健某當填溝壑莫望門牆但逺同於蒼生亦均依於盛福議禮改官謝執政啓大鈞播陶物無廢者細流歸往海獨容之賦么麼於萬形之間收涓滴於百川之內未云有用不使無歸所以溝壑之捐誤置文書之選素餐少日輒冒上恩白首半生僅通寸進雖獲磨光而濯色尚餘弔影以慙魂竊謂國家積德百年同風三代為其禮樂屬我君臣非若曩日第藏名物於有司必使斯人皆被教化以成俗更復逺稽於治古蓋將盡案原本有脫字於官名必得博碩之真儒庶就升平之盛典矧捐官寵因起滯留可容濫吹其間聊使糊口於是此蓋伏遇某官虛心天下康色朝廷搜羅四方之俊良陪輔一時之遺忘遂無伏死巖穴之士更空隱轔卜祝之徒譬若橫江而漁絶雲而弋顧盼有頃飛潛並收何獨在一鬱而得伸亦概見寒逺之不隔仰惟代天理物妙同嵗功安土居人力均坤載可謂魁壘萬人之傑尚乃濶略三公之尊士不待推食而解衣身可使蹈湯而赴火重念某筋駑肉緩材拙意踈一嵗寧冀于九遷十駕不能以千里況侵凌憂患之後逼仄飢寒之餘志氣已衰分無逺到語言少味事亦寡諧犬馬第識主人之門當不死于內熱雪霜或變羣木之色蘄不雕於嵗寒欲答所知請堅此意得真定倅謝執政啓薄寒中人莫借一言之暖太和蒸物忽同萬物之春急絃雖發於危機弱羽終依於大厦惟憫窮悼屈本出於至公然刮垢磨光卒成於委曲念未嘗備灑掃於下館曽不知纍題目於前旒卓然古人之賞音不待平時之識面自欣際遇衆為驚嗟恭惟某社稷元臣文章司命手運樞極實代天之四時身備股肱蓋與國而一體夢寐不忘於寒畯升平有待於丹青謂如文王之朝必有多士欲任伊尹之責所憂一夫伏念某瓠落無容齟齬難入少既乏於竒響幸猶同於卑飛弄槧磨鉛不過犬子浮華之作欵關持謁未免禰生漫滅之譏曩輒挂司空之書初不盜相君之璧遂久廢而不録亦徐察其無它然搔之不絶者良已童然殆挽之俾前者不及寸許何敢視儀之舌在正苦減仲之産空所貪盛節之清明聊寄餘生於紅腐尚乃風聲之飄墮要令雨絶於天肆其波言之蕩流不使堆出於岸方此有言而不信頗謂無因而至前不圖察魯酒之見圍聞商歌而許載料理於摧傷之後吹噓於唾罵之間假以治中稍令補外恩隱可勝於周渥人地則至於超踰遂免無歸是為過望然適當逺去疲馬顧不戀軒茍欲求便安窮猿何敢擇木况佩刀非三公之器食肉無萬里之姿端念旅翮之飄零恐逐飛蓬而轉徙借欲激昂而效力未免俯仰以隨人瞋目語難素不習大將之旗鼓束髮為學但謹守先人之琴書退則煙波釣徒之是歸仕則文學掌故為適可已獲伸其厥枉或冀用其所長竊緣眄睞之不凡輒復噴鳴而未已既取馬之按原本有闕文覬開以長途况猶泥之在鈞不使憂為棄物伏惟此意不出它門代王運判到任謝執政啓人言僅白初假臨民突色未黔亟趨度嶺謝魚鳥相安之樂涉山川甚逺之勤盡忠義之皎然雖蠻貊其行矣蠶叢絶壁既搖叱馭之鞭鶉尾寒芒又照觀風之節初謂棄捐於不畜今猶約結而無竒伏惟某官俯仰太平棲遲盛福風翔巖廟光在海隅豈特繫本朝之重輕而每纍一夫之休戚故安逺俗宜得長材某雖孤節未雕而舊學幾落雖顧平生欲有為爾然茍見用亦何以哉獨先公道而後身名須以成事肯辭禁門而改情態急欲操人儻涵濡上澤於干欄得退託微軀於欵段賀兩府啓伏覩詔書登庸哲輔國勢以重民望所歸伏惟歡慶竊以朝廷紀綱於此而維持政令根本由是以植立斟酌元氣四時待以和平爐錘衆形萬物期於暢遂故圖任裁屬鼓舞皆同恭以某官德業並隆文武備足以稷卨之筋力任堯舜之股肱方旰昃以求賢宜朝夕而納誨寧人能此殆天啓之仰惟太紫清明層隂洞徹昭景飲醴方共迎於太和沐髮晞陽幸均承於嘉惠固當益著太平之象端須畢究彌綸之方某瓠落無容齟齬難入坐不能俯仰於權幸致無辜狼狽於飢寒念十年同於積薪不充庭下之燎雖一旦棄如破甑猶當是鈞中之泥逺嚮門牆空馳魂幹但下同於黔首亦均被於洪恩賀豐待制移杭州啓伏審光奉天恩寵移藩鎮雖尚淹於外補已少慰於輿情竊謂餘杭為東南之大州太守必左右之近侍然錦營故俗半存紈綺之侈心梓墓餘風共負濤波之盛氣閲守甚夥顧民難治政寬則不勝惰驕如用鄉飲而理軍市吏急則便復反側猶驅鳥雀之屬鷹鸇唯付道周而性全不待令行而訟止伏惟某官文學前輩朝廷巨公如玄酒太羮本薄滋味惟青天白日自然清明苐見和風之顯宣莫窺浩氣之充塞棠隂聼訟不妨具足之真如紙帳安禪誰識縱橫之妙用坐馳此道行安斯人某擁腫凡材落魄逺裔少學古人之糟粕顧所言平平老投孤縣之桑麻亦自考下下念依劉之日少將借寇而天髙同湖濵欲濟之人如中流而奪舟楫喜江滸待哺之殍真大旱而望雲霓賀蘇內翰啓泥檢自天脂車就日慎選北門之舊别居東閣之嚴雅待重人曲承密命伏惟內翰承旨道本自得事無可為嘉祐之間共識鳳凰景星之瑞元豐之末益知泰山北斗之尊霜雪所餘波濤既定及見松筠之茂已緘鮫鱷之饞出入羣經熟沈浸於醲郁徘徊清禁遂黼藻於王言陳義甚髙獨立不懼頃得州於第一由所請之再三惟上之深念圖賢如公之不忘致主鴛鸞盛集仍是銀臺之舊遊山水餘姸定入玉堂之清夢固不為賦詩以觀餘事蓋且將問政而求讜言爛爛日星發光芒於筆下溫溫布帛散和氣於人間乃所望於尊儒實分權於宰相中外僉允今古獨難某與世數竒登門最後思收能於鉛槧薄借論於齒牙參术桂芝願備疢疴之用柘枸枳棘固難生長其間雖升斗足以活魚非江湖莫之容瓠惟公逺大專我始終上眷雖隆柬之猶為未用羣生欲遂安石得不同憂蘄快輿情當究大任赴任與湖守學士啓一丘雲水逝將植杖而藝百里溪山又俾戴星而出蓋未知操刀而使幾何不頓纓而呈恃大賢為之依歸將末路忘其蹭蹬伏惟某官思走萬象氣吞羣英上則當處廟廊次亦宜綰華近稍淹出守行促歸裝姑寄一尊之風流長助兩溪之煙月某天資不敏人事多竒蚤衰而疾病侵凌未老而齒髮搖墮割雞非善寧繼武城之音封侯不貪願識荆州之面即搖竿而去國將斂板以望塵欣幸之懷尺書不盡代王守到任謝楊馮二漕啓初分州寄尚偷嵗月之寬間未滿戍期遂去田廬而匆遽雖簿書之亂眼喜江山之可人情既安之事或濟矣然莫副編民之素望所欣從使者之多賢某官髙誼自將善名日起智識絶於流輩不勞豫奪於十州議論公以是非自足臧否其羣吏逮指顧之餘事猶餽給于羡財某竊望門墻重拘城鑰方布宣于上澤使周知法令之寬賖雖歸賴於下風敢小忽米鹽之煩數尚圖面罄頓覺心搖伏望益慎夏以加餐當對時而受福上胡倅啓某官德懷雅俗望重本朝佩刀光鋩顧不煩於投刃題輿榮問亦誰可以並驅惟湖山清逺之鄉有嵗月優遊之樂某天資不敏人事多竒蚤衰而疾病侵凌未老而齒髮搖墮是行既迫於糊口餘光猶托於庇身即理柂於波濤行望塵於旦暮孤衷欣幸片紙莫窮到秀州謝監司啓湖海再遷不繫有無之數簿書百謫但招尸素之慙政應斂翼於故枝尚復強顔於末路已荷優容而不逐更加推挽以使前自惟棲遲莫副期待伏惟提刑某官器局博裕風猷峻清雅將氷鑒之明喜為人物之論假以青黃而成飾要令黑白之殊流顧噞喁之鱗聊欣得水恨虺尵之足徒費加鞭得替謝監司啓往昔子男之職本繫風化之盛衰逮今親民之官但隨胥吏而俯仰強顔折腰則衆矣申眉明目者誰乎方其冕笏不澄至與雞鶩爭食蓋古人風流之已逺而末路名節之浸衰但可鄙憐何足振起所賴諸公之多可尚俾小子之包羞伏惟某官直道以行恕心是用郎醉且加掩覆丞聾或在優存遂如曠官亦得理去更借齒牙之論曲成卵翼之私然平原之士千人下客未為無用矧叔度之波萬頃小物不勞并容重念某學殖已荒鬢髮早化每困禮俗之嬰縳便欲狂顧而頓纓可勝簿書之窘囚何異扶服而入槖了無善政去屬遺民况求恩愛以浹肌膚僅免膏液之潤箠楚自非庇護而有素安得罷去而無它今鶴書不招而自行牛衣屢泣而復止雖聞士不在野敢覬白駒之維久嗟鳥屢窺籠喜同黃鵠之舉疲戀之意菀結可言
