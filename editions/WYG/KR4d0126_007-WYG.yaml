body:
  text: 東堂集巻七宋毛滂撰書上察訪書某頃與富人同里巷度其囊橐之物可富十世他日某宦游而歸裁三歳爾蕭然環堵烏過不止問其鄰則曰富人無良子而役事其門者非復父祖時客某為之慨然因知十世之富不可恃顧人如何耳匹夫編户之民其勢力固微淺易竭然百室之君萬家之侯千乗之主其成敗之理亦未嘗不在人也桓彛初過江謂周顗曰我以中州多故比來求全活而寡弱若此將何以濟憂懼不樂往見王導極談世事還謂顗曰向見管夷吾無復憂矣誠如此不有君子其能國乎晉重耳亡國之公子也其從者皆霸王之佐則基天下者可無人乎大司農之錢不足為賦武庫之兵不足為利金城天府不足為高深日出萬里不足為廣逺得人則興失人則亡理必然也故乗衆勢以為車御衆智以為馬雖幽野險途則無由惑矣儻宰相不下士郡守不俛眉而天子玉懸十二雖虚心明目亦何自而知之茍無其人則十世之富不可不慮也故曰士者國之重器工欲善其事必先利其器爾馬不伏􅇫不可以趨道士不素養不可以經國恭以聖主方馳騖唐虞折節三代春施電斷無得而名其佩紫懐黄朱丹其轂者皆先朝望人一時名勝士也故六印磊落駢組流離雖然昇平之風亦豈無遺䇿骨鯁之臣猶未訖義槩琬琰之士猶半就煨塵玉闗之西尚屬鞬而鳥驚游士長者所以吟嘯而扼腕而聖主方思政明堂訪道宣室廟堂之上非却客而不納顧隠轔卜祝藏器屠保者正自匿景収光深閉固拒莫可鈎致爾某屬者薄游京師嘗獻書闕下論取士為急且曰願陛下設天網以該之頓八紘以掩之雖曰丘園耿介之秀方且與猿鳥為伍而逺方寒畯往往沈於下僚給事厮役朝廷當遣郎官御史風采為天下想見者巡行風俗因不逺千里羅而致之書奏不報某亦去為東諸侯負弩吏去年之官側聞閣下乗軺握節出國東門下汴浮淮入于呉東西州面見長老子弟為上陳徳義示好惡深汰珪符妙簡銅墨所以慰安元元便利百姓之道甚備意東南數千里之間秀民佳吏往往間出如南金大貝陸離道傍閣下一引手可盡取之今果已爛然盈篋櫝乎閣下暴露車騎幾半天下亦良苦矣某竊為閣下計無過於得人而閣下為朝廷計度亦不出於此苻堅云晉氏平呉利在二陸今破漢南獲士裁一人半苻堅蠻陬之黠爾崛强兵戈之間猶知得士為貴况我明聖時耶某嘗讀雋不疑傳知暴勝之為賢使者何則勝之衣繡持斧威振州郡乃素聞不疑賢請與相見不疑冠進賢冠帶櫑具劍環玦褒衣博帶盛服至門上謁門下欲使解劒不疑曰劒者君子武備所以衛身不可解請退吏白勝之勝之開閣延請躧履起迎不疑據地而言為吏太剛則折太柔則廢勝之敬納其戒又表薦之不疑遂立名迹卒為賢京兆嗟乎勝之賢於大將軍霍光逺矣吏民當見大將軍者皆露索去刀兵兩吏扶持蕭望之以不肯往謁獨不除用向使勝之必欲解劒則不疑之去不可挽而來矣韓朝宗為採訪使約與孟浩然俱至京師欲薦諸朝㑹故人至劇飲歡甚或曰君與韓朝宗約浩然叱曰業已飲遑恤其他卒不赴朝宗怒辭行浩然不悔也士之自好者内必有所恃而樂者達不達正自初無增損而急賢之心在韓而不在孟韓公顧得一賢者充使事為不可失爾故貴有所屈賤有所信此上下相求之道當如是伏惟察訪户部閣下名節自將氣畧經世穿穴古今咀嚼英華有暴公敬客之心無韓公怒去之色雖然曽不知登門上謁之人有足以煩閣下躧履而迎納之堦陛者乎某早衰多病流落不偶嘗趑趄於筆硯淺事前世之理亂古人之是非亦講其大方矣若夫論都邑之壯觀鋪郊廟之縟儀頌聖賢之相得以至蘇李之餘風沈宋之遺韻雖不敢自以為涉其流抑不肯謂不可以進也前日傳車過呉江旁邑令皆得以職事詣節下受約束某獨以病臥家忽忽乆不平顧有平時所作無用之言欲以唐突宗匠未能也邇來病小間輒収拾蕪纇無慮三數十篇并嘗進聖徳頌一篇専人奉書投獻方今以經術見優者布在廊廟某非敢以自名希與諸君均茵慿也或者使郭隗自周往劇辛自趙往鄒衍自齊往爾異時乗朝車處國士揖讓於人主前皆閣下客顧豈厭多乎哉况閣下所以答主知為國計者無出於此某頃為上陳取士之䇿既不報胷臆約結乆無所告語比聞閣下之風輒殺青千里少見梗槩然平日竊先生之餘論反覆古人紙上之語盖有深於此者異時茍得委質門下願繼此以進區區惟裁察幸甚上時相書某聞仁義之塗詩書之府有氣也泠然而清煒然而光璀璨而徜徉中之者能使其言炳然而成章不知此果何氣也然鐘鼓膏粱之地綺􅃭紈袴之間迎之則釋然散取之則漠然空獨山林枯槁之士餓夫逐客覉旅之時乃得之至與之冩孤憤道阨窮發物理之精微論古今之成敗俯仰上下隨其筆端亹亹令人不能自休異哉此果何氣也中之者無乃反為病癖不幸乎雖然清廟之歌玉牒之文其所以黼藻徳音丹青盛節者是必薰醲涵浸於此氣者也至是亦能使人離疏釋蹻凌厲清浮故結綬金馬之庭髙議石渠之上是氣也葢常與人並遊矣追觀往古此氣未甞不爛熳陸離於其間所謂聲音以揚之詩書以光之葢出乎此也凡詩書六藝之文特其氣之最為純粹光明者班固曰唐虞三代詩書所及世有典籍雖堯舜之盛必有典謨之篇然後揚名於後世冠徳於百王故曰巍巍乎其有成功煥乎其有文章噫􅐵此豈治世所當乏也則其中於人果以為病癖不幸乎又豈得繫乎時有用否哉其不用也得無直為時之不幸邪所以周之士也貴秦之士也賤貴賤時也士何預焉此氣端處乎貴賤之間爾周衰勃勃然出於夫子之徒其末也謬悠於莊周之間往而之孟軻則浩然而醇深又往而之司馬遷班固揚雄則高妙而精確又往而之韓愈桞宗元軰皆宏肆而雅健卒使其人與世齟齬爵位不躋是所謂中此氣者無乃為病癖不幸乎天下治安王者所以告厥成功明示徳意渙揚休烈也藏之金匱石室所以表裏詩書皆廊廟之器王佐之才豈特長使懐鉛提槧游談供奉充翰墨之苑而已昔人懐負湮鬰其采色不得耀於當時則膏馥必将貽於後世故述往事思来者用垂空文以自見此孤憤離騷潜夫之論所以作也某江東諸生少小無所好唯不幸嗜啗古人糟粕饞饜無節鬰積成塊今疾證頗類中此氣者然沈吟痞結莫見起色念欲捷歩深林潜舟丘壑觀魚鳥以發興覧江山而為助援琴以賡汾亭之操杜門而續茂陵之書用此除治刮散而出之庶幾潜塊之能已也恭念主上方嚮意儒學公卿大夫彬彬起而舉者出矣儻猶隠於簾肆之間臥於巖石之下顧豈一旦折簡可致之哉譬如塲師之養木也雖欲為棟梁材然必自拱把而養之欲致干雲蔽日之幹者常徙之於葱青毫末之時至其落落十圍盤踞偃蹇則豈有可移之理哉人材正復在於素養也今士之處隠約間俄忽絶塵而起可使追㕘高妙者必有人焉此造物者當先識而早定也唐太宗謂房公曰公為僕射當為朕廣耳目訪賢才比聞閱牒訟日數百豈暇求偉人哉明主所以求宰相之意非房公何足聞此言且公孫𢎞獨何人也能起客館開東閣以延天下賢士後人至為唏嘘不已又為馬廏車庫奴婢室豈士之不足計較有無如是哉恭惟主上以堯舜之資垂衣法座乃登相公於朝而天下以稷契之道責望於相公甚厚藉令丙魏可作當使順下風而立房杜復能張目將不得仰視也盖豈不暇為公孫𢎞事乎顧如某輩素不為當時所推擇相公未嘗聞其姓名何從得充下館序後塵也悠悠此身流落江漢歌悲風送落日自托於魚鳥蕭散之羣肆為愁獨可憐之語將以呻吟其病癖而散憤懣爾又日求蕪城廢壠亂山絶岸驚魂出涕之地叫呼古人而弔其不遇也又竊自念廟堂方俛眉天下士名一藝者皆見省錄何獨某不自激昻如是故時時投筆拊髀而歎未免以古人望人爾左太沖欲賦三都自以所見不博求為秘書郎使某幸而得窺四部之書益聞所未聞則豈特用以資為賦而已謹獻舊詩文一編并去年所奏聖徳頌一編不敢繁也譬之度材於匠氏大木為杗細木為桷要之所用不容於私意至必欲成屋室者無有可棄之材也唯相公留意幸甚又上時相書秦圍邯鄲使平原君求救合縱與楚約與門下食客有勇力文武備具者二十人偕得十九人門下有毛遂者自贊於平原君曰願君即以遂備員而行平原君以為不能然竟與之偕十九人相與目笑之未發也平原君與楚合縱言其利害日出而言日中不決毛遂按劒歴階而上卒使楚王唯唯奉社稷從而使趙重於九鼎大吕封常清讀書多所該究然孤貧年過三十未有名高仙芝為都知兵馬使常出軍奏傔從二十餘人衣褠鮮明常清慨然投牒請預常清素瘠又跛仙芝陋其貌不納明日復至不得已竄名傔中仙芝擊達奚有功常清於幕中作露布仙芝取讀皆非意所出遂知名嗟乎平原君高仙芝可謂不知人矣亦幾失二子然此二人抗顔為自媒語雖苦擯不怍至不容自巳者顧豈高士所能堪忍然其中固有所恃勢必發之如茹物不下必吐之乃已爾嗚呼人不昜知如許向使平原君高仙芝終謝二子不以納門下亦可痛惜哉雖然為平原君等計則幾有失士之譏以二子自媒豈韞匵之道乎諸葛孔眀躬畊壠畝徐庶謂先主曰諸葛孔明臥龍也將軍豈願見之乎先主曰君與俱來庶曰此人可就見不可屈致也將軍宜枉駕顧之由是先主遂詣亮凢三往乃見謝安石寓居㑹稽無處世意除尚書郎瑯琊王友並不起吏部尚書范汪舉為吏部郎中以書拒絶之孔明安石皆人傑也世豈易得哉借令今日復有孔明雖先主在上其往不三正不可一見顧可屈致哉至於君命屢至安石門曾不能必起况一范汪欲以郎招之耶此二君下視毛遂輩何翅奴𨽻矣恭以聖主夢想賢士欲損勲名以屬之相公坐執人柄天下士升沈寄相公牙頰某盖嘗伏相公之門矣當時門外之馬駸駸不絶如行蟻謁入少後即坐客館之外更少後即坐屏外屋霤下最末至則露立於東西之衢俟命雖踐揚已高至號一時望人者未嘗不俛理色於閽人然此皆相公之客也某度之雖累千萬人無諸葛孔明謝安石無疑也千萬人中藉令有毛遂封常清則左右未有所稱頌相公未有所聞又見其瘠且跛得脱呵罵幸矣相公不以某為狂且妄發請得畢其說相公鼎食廟堂之上四年於兹矣文武之士拔之芻牧之中表之公卿之上者幾人隠居之士搜之石穴之中降言詞厚書幣以身下之者幾人十室之邑必有忠信况今天下萬里皆在相公圖維中乎茍必俟親見如崔祐所云者則天下士有不幸不出於親舊之間奈何聖主道隠旒纊虛心無作以聰明屬之相公而相公端居廟堂之上乃以聞聽寄在天下今雖目離婁耳師曠數百步之外則不能得其形聲矧閉其目掩其耳耶某頃託於都城逆旅主人甚乆主人之居適當府門孔道見車馬之客至相公門外者月嘗十五日相公許通者三數月之間盖無一二焉相公以為天下士不足計有無無益於治亂無庸復來則已或曰治天下不可乏士如病必操藥飢必得食則雖有毛遂封常清輩且猶失之况欲致孔明安石之流相公豈謂不下堂盡得天下賢否如鬚眉落鑑中吾固了然見之然其才固已盡用其不用者皆無分可采抑朝廷之士固自有餘不應外求耶亦相公平居所約與共功名者今未盡致青雲耶不然則何為杜來轅千里之外欲獨以一身任天下之責乎秦應侯以簀中餘息載而之秦一見昭王逐穰侯高陵華陽涇陽君於門外如驅雞爾應侯自以為五帝三代之事百家之說吾既知之衆口之辨吾皆摧之而蔡澤以羇旅入秦長揖應侯而奪其位此何故哉蔡澤固賤且疎應侯雖尊寵然澤為應侯談則理有必然者也相公道徳純備功施甚美日夜發於心衝於口詔於行事者皆致君堯舜之術豈敢期於辨士争雄哉雖然進為天下利亦當念退有百世名徒以為應侯卒不見蔡澤意天下之口皆可摧以此言之士口亦可畏未可輕也天下便可謂無人哉相公平時盈耳者皆乞憐軟媚語此如優人妾婦顧何所短長相公徳業過人者彼何足以窺較徒生長相公輕士之心如此天下治安之日乆雖有竒才國士正自碌碌無所表見况相公有草芥天下士心耶雖鄉里自好者豈肯為相公出哉凡士相慕於遺編斷簡之中猶慨想其人千里之外至有同時相傾至老死聲光不相接者何則力不能相致也獨相公能得天下士反棄之不取昔秦使者往觀楚之寳器召昭奚恤而問焉對曰國之寳器在賢臣今譬有南金大貝横於道側相公過而不取後人必取之此當國者所争不可棄也韓愈云未嘗求之不可謂下無其人相公何惜捐階下寸尺之地使四方賔客得望清光竭志慮度亦不出立談間無所逃輕重於懸衡之下能者提撕而進之不能者亦當不待揮而却矣異時腰金拖紫服冕乗軒皆有美名竒節以照映天下來世後之人指目曰此某時宰相某人客也顧不偉歟某日暮流落人粗涉文墨淺事沾沾持此求售於人以故每談謝安石諸葛孔明輒赧然汗發姑引毛遂封常清以自助不已鄙而可憐哉伏惟相公不深拒之幸甚上鎮南節度吕吉甫書朱泙漫學屠龍於支離益殫千金之家三年技成而無所用其巧某讀漆園吏書至此輒臨風大叫呼朱泙漫追罵之曰子學屠龍而破家若是胡不以子所能移之屠狗之肆求歸子所亡千金家顧不快哉吾觀鼔刀市門者皆瓠肥而鷙猛談笑無活物慷慨射厚利其志滿而神洋洋也子不早聞吾言其愚無復小瘳矣言未卒有客排闥而入鉏鋙之氣幾滿大澤手薦鸞刀睨某而言曰我朱泙漫之徒也子談何為某以杖叩其脛又罵曰泙漫以愚既困於無用而死孰意復有子乎按自此以下至鑿坏而遁一叚永樂大典本誤入於上時相書中而上時相書何氣也以下一叚及追觀往古以下一段又誤入於此今按其文理舛錯的然悉為改正屠龍雖難能盖亦技耳烏足深信而厚自貴珍且守之以不移反招窮以賈困如此世之學周公孔子之道者猶學屠龍技也使吾徒亦深信而力守吾師之説不幾與若俱殆乎以其獨能悔而改之故不終困爾嘗試與子數其一二古人有饋粟而拒者今則飢寒是憂有結纓而死者今則志昜氣亂有逆鱗而諫者今則譴禍是虞有鑿坏而遁者今則富貴宜慕有埋輪而不行者今則搏噬當空有小生三公而卿五郎者今則强禦宜畏有負二宜去强之不能留者今則百謫不肯已有不肯露索挾持而自引出者今則俛理色以望閽人凡此八者皆吾道之所與也然學之輒能使之槁項黄馘委骨溝壑游魂鬼區豈特亡千金之家葢有甚於屠龍者耶學者知其然因能悔而改之尚恐為吾道之罪人也不敢以人自居故與猫争柔與狐争媚與鳬鷖争上下脅肩而笑搖尾而乞憐盡反其所難昜以所昜長劒華纓按轡天衢處列東第譬之移龍於狗亦前溷而後利乎客仰而視屋若不聞某察客非常也乃謝曰蕭然蓬蓽幸見光臨無足以相娯樂者然自封禺而東走不百里有巨浸焉澶漫汪洋旁通朝夕之池馮夷之所都陽侯之所宅鴟夷魂魄之所澎渤怫鬱而慿陵者也試與客搖竿而往弭節而望揮手以招碣石之朝煙逆目以送之罘之歸鴈豈不使人投棄恬怠輸冩淟濁分决狐疑發皇耳目也哉客乃攘袂而興曰盍往觀之毋留行某又告之曰客所聞者江水耳未嘗得聞江水之主人也主人於此水適堪濯足而已良不能為客詳道胷中之閎闊者姑言其畧客豈有意欲知主人乎非四非八在舜為六當堯為十盖嘗父老邴魏折衝兩楹也勲在鐘鼎而身寄江湖是事姑置吾側聞主人好士不衰食客滿座沃飴薪蠟醢且羮之而以餔客者皆取於馮夷之都龍門之下試與子從饔人饍夫乞大鈎巨緡五十犗以為餌蹲乎㑹稽投竿東海幸其奮尾撥刺迎而食之者取以試子之技離而腊之不獨可獻於主人助食客也自淛江以東蒼梧以北莫不厭其肉則子之技不幾小試矣而千金之家庶可復乎况主人餔客是急子技須而不可後者子儻去主人門則屠狗之肆矣言窮某竊自慨曰嗟乎某能一說振人顧不能自振耶故輒奉鄙文兩編去屠龍之術不逺又竊自笑怪能罵人而不能自罵然舍此則亦無他技矣妄意主人亦捐大鈎巨緡五十犗而賜之將假道冰夷之都投竿龍門之下爾謹屬干將以為筆越砥以為研淬之墨池之清泉退而敬待主人之命惟留意幸甚上中書舍人書某有取窮之事二少時從鄉先生受經先生出諸儒新書數十巻教曰必誦此後當有名且得美官某退而誦之如先生言十日不出户然其文皆前世所未嘗經道而去古離絶逺甚懵然若有物填其膺廢巻欲睡懣不復省異日於破簏中得西漢時人所著作又屈原宋玉離騷詞及韓愈文章亦數卷試取讀之若與故人素所驩者語心甚好之以故日夜擕持益熟其語矣毎意欲有言不幸遂為衆所咻他日先生曰取爾所為文來既見罵以抵地曰是何聱牙崛强薄滋味如許此不足汙吾醬瓿况欲備有司之選耶然某猶挾其所有從諸生求舉進士往輒黜焉遂大悔坐念先生語將棄所好而從之然年過不可復學矣後以飢寒將出而仕竊自謀曰古人真欺我往以不聽先生語故至此今當從搢紳長老早得要津者問計或聞某言笑曰是無難也不過能磬折卑拜側行危坐强顔而笑造請不避寒暑問疾必嘗溺呼卿必郎好音者進鳴琴好佩者進玉環爾用此自媒取青紫如拾地芥退而深念引鏡窺形則白眼强項蓬頭而可憎又拜起舒遲轉喉觸諱欲勉為笑者言若施芳澤於嫫母竟不能妍也坐此二窮棲遲末路側聞某官座下名滿海内氣吞羣豪學無所不窺量無所不受浮名外物聊見戲劇真境妙意自有歸宿某東南寒逺人童而弄筆研今白髪紛如也言出口為諸儒所非笑竊自比之古鐘篆鼎雖於世無所用之然典刑尚有可考或庶幾為好古者所収至於平生偃蹇可憎之態正當取窮於天下然怒鼃有氣古人猶或式之今欲求好古可撼以氣者將以某二窮累之自度無以過座下者某聞函牛之鼎以烹雞多汁則淡而不可食少汁則熬而不可熟竊聞座下食客千人日膾十牛小人請以備一鼎於饔夫以拂拭前日敗鷄之辱如何上曽太尉書某生長江湖間平居時不望州郭門不與冠纓士游獨與鳴榔持竿者日相尋於蘆隂水曲終日所與晤語其志慮不出蓑笠下嘗記古人有釣道二其語不獨可人意似亦可羞于王公云投綸餌迎而吸之者此陽鱎魚肉薄而味淡或往或來或食或不食此魴魚爾肉厚而味美某竊意太尉亦食魚矣其早晚登萬錢之厨參五鼎之味者魴魚乎陽鱎魚乎欲陽鱎則迎餌而昜取必欲魴魚則有時不食不來則太尉亦必求之歟某悠悠天地間背餌而馳為陽鱎所笑者也平居喜讀古人紙上語涉世雖疎粗有肺腸頃亦有所感發而至此既又悔而自止以故平生心所敬畏如太尉未果見也雖然太尉以天下自任而四方人物猶在眉睫間至於門下十倍之客而以朝夕見者未必皆太尉所賢也某為兒童年見祖父客道天下儒宗文師則必自太尉兄弟之學行如望泰山北斗無時不精明岌嶪者某讀唐漢書見當時大臣出於書生者或齪齪無竒節至於質厚少文者往往闇於大道有為上所筋力國之光輝如太尉顧可多得耶今天子明聖求治之意不減先皇帝時然治原有未究之䇿窮途有稱屈之士言路無不撓之氣而太尉圖回之術又尚鬱而未専此天下觖望也某碌碌不為時所推擇乆懐欲言之意將吐而復吞乃終不能自已今欲獻書天子之陛書成而讀之反自笑故又去其犯分逆耳難聽之語十八九所存裁一二細事皆鄙夫之常談某又重不幸不能為近世新美之文故言出口輒為諸儒所非笑獨願以其副一凂視聽太尉顧以為何如儻可教願委質門下然其骯髒可憎人也世之脂韋自營者固難合正不得不憤鳴於執䇿之下爾某已買舟旦暮將東歸適感寒伏枕不能躬候典謁太尉幸而與之進則某庶幾小人之疾旦暮少間願一望精光於堂廡之下未見顔色而言古人所不取雖然願太尉不求某於禮俗之間幸甚上豐待制書筆硯之為賈售具乆矣士平日以文章自頡頏一旦窮不料理將餌聲名釣爵位彼未嘗不如售飴蜜於小兒莫不哆口而流涎者文章止如此亦不翅彈棊六博之事已士束髪殫思游神於韋編斷簡之間不知華軒食肉之為豐不知環堵飲水之為約持天機守良貴意甚勇決凡世之所可憎喜皆不足以感移其心意而後聖賢之心見則烏之啞啞鵲之唶唶寒暑燥濕莫變其聲矣道根於心見於面盎於背施行四體也逮其發於言詞則橫出旁縱慿凌造物開闔鬼神千變萬化復歸於一如日星之麗天如草木之敏地如百川橫流卒歸於海學者學此則將以是貴以是賤以是生以是死而吾之所學固毎如是也後人漁獵前作穿窬妙道咀嚼英華遂登文章之籙不以為戲劇則姑以為市爾如韓退之柳宗元輩或然不亦鄙而可憐哉伏惟閣下多聞守約為道日損目不徇物而氣經天下今也請為鄙人一發醯鷄之覆敢問夫子曰疾沒世而名不稱焉以為夫子之道徒取沒世名如前所謂餌名聲釣爵位者歟則揚雄曰梁齊趙楚之君非不富且貴也惡乎成名則是剖符而封析珪而爵位為通侯處列東第非名之謂矣豈有徳必有名如有表必有影乎今將處隂以息影又於夫子之道何如耶豈亦初無增損哉某嘗問道先覺云可以貴可以賤可以約可以散某將以此樂以忘憂與百年相終始雖不見知而不悔盖未嘗有意於文字間也以故涉筆寡味閣下聞道最先是有以振我輒獻舊詩文一編皆應事俗下語雖欲以此釣名聲與一時名人文士争價是猶聽白雪之音觀淥水之節而東野巴人輒叩盆拊瓴於其間無乃嗤鄙益著乎雖然顧有深於此者以告閣下然中欲告而忘之矣上韓尚書書太史公云士之宦游至於丞相封侯真命也多有聖賢之才困戹不振者甚衆某讀天下書多矣觀前世盛衰之迹未有不由當時大臣為之興廢自東西漢至今其人已不可勝數考其起居狀凜凜可觀者一代不過三數人而已何其少哉天與其命而不知愛惜獨吝其才而若争銖兩此又何意邪有丞相之命者獨天知之有丞相之才者則人亦知之某毎自恨生之日最晚當忠獻公在朝廷時某猶襁負於乳媪手中盖不及識也然公為丞相不獨天知之人亦知之以故某雖不識後亦知之矣祖宗八世之業天下凡閲幾相而人共知之者又何少也公之去斯人已乆士君子及識公者亦已不多然深山窮谷婦人女子小夫賤𨽻皆如昨日溺而公援以手前日囚而公贖之以驂寒而公減衣饑而公輟食又人人若生死肉骨於公者既已思公而不可見輒曰吾相有子在庶幾一日行公意以恵吾屬天下豈惟知公又知公子如是自古聖賢之才固少有子者又加少漢唯韋少翁能繼父相位封侯而守正持重不及父賢為可恨爾側聞閣下以王佐之才而升大僚雖未至宰相天下號為寛厚長者真不減忠獻公今國家可為大治矣然民小有不快於縣官法或一夫自致於溝壑輒懟曰吾相忠獻公有子在奈何逺去君側不助聖主作昇平為我曹飽飯安眠地乎竊聞先帝賢閣下而未遑大用雖然世已許閣下必用乆矣今天子聖徳充塞天地嗣位之初未言而人信之乃還閣下於朝某見邑人聞閣下造朝皆喜自旁邑來者又皆喜此人於閣下無所私也無所私者喜則知天下皆喜矣天子方呼吸三代之風黔首日夜引領以觀新政閣下雖未至宰相然太宰掌建邦之六典以佐王理邦國考之於古可以聞政矣竊意閣下守正持重無少翁之恨使天下拭目復見忠獻公佐上之時某小人也何足以知其他又流落不振無階朝廷獨幸時和歳豐行與樵夫牧豎受賜於長林豐草之間爾謹獻舊詩文一編因道天下喜懟意以責望於閣下甚狂妄也唐突尊威待罪皇恐上詹司業運使書某氏之廷有列鐘鼓甚盛者衆客紛紛造之聆歌起樂作輙相與撫手嘆曰佳乎聲也退而據案以食羮胾雜進又曰佳乎味也某氏之主人喜曰是客果知聲與味某聞之竊從先生長者問曰聲與味果盡於是乎客將無溺於音而害於飢渴者乎先生長者曰聽激楚之節漁陽之摻聲非聲矣異時聞下俚延露亦能蕩其思者甚衆聞朱弦疏越則惟恐欲卧此溺於音云爾烏覩其知聲食熊蹯之臑豢豹之胎味非味矣異時對小蟲水草尚有嗜之不已者試與之太羮𤣥酒則必覆器而不食此害於飢渴云爾烏覩其識味故方其憛悇癢心流涎被頤之時處於中者無所守交於外者有以奪之於是時求至音正味得無大謬乎世或曰如是為佳聲如是為佳味將未可知也豈唯聲與味如此士有結髪從學屈首授經而他日茫然求濟乎道者鮮矣亦何以至此哉往日所用心者非為道故也彼有人焉頡頏儒林方以為學休顯則後進生望其采色想其鏗振摳衣負笈翕然從之矣顧豈知聖人之道果在是而不謬否耶一旦齟齬跌不復振則門生弟子相與諱所學而更求其師盖方其從之非所喜諱而謝去非所憎彼區區之心直求市而已揚子雲無恙時觀其書者欲取以覆醬瓿嗟乎使子雲於其時有卿相位學者必翕然從之弟子豈獨蕭然一侯芭哉班生云親見揚子雲祿位容貌不能動人故輕其書審如是則世皆曰某公也某侯也學不詭聖人其道可師其書可傳後世某謂此言特未定爾楚人有烹猴而召鄰人以為狗羮也而甘之後聞其猴也據地而吐之盡瀉其食邯鄲有出新曲者托之李竒諸人皆傳之後知其非皆棄其曲今日甘者他日未必不吐今日學者他日未必不棄此貴名而不求其實彼以謂聲與味者亦强名爾猶貴學而不求其道今日為師者未必明日不罵而去之雖然子雲著書將載而傳之後世君子於時人皆忽之獨桓譚以為必傳而卒傳如譚意要之必有知者顧不應以此望於衆人爾伏惟某公搢紳標的詞章司命富貴不入於心古今不易於意妍􅎀衆作定有𤣥鑑至於登車攬轡之行觀風問俗之事此特轉丸覆手爾某忍窮不自勇決投老於簿書間茍為升斗計舊學荒落無分可采今成編而獻左右亦禮俗故事爾是烏足比數哉獨胷中有所約結不可為俗人道者慨然臨紙不能自休閣下駕言徳音滋味道腴盖有日矣亦將何以詔之干凟尊威不任皇恐上曾太尉書竊謂天地覆載萬物刻雕衆形造物於此宜亦甚勞矣然其廣博而無端深厚而不測其於物亦漠然若未嘗有心者而所以動所以植所榮所悴所以大小方圓曲直貴賤厚薄亦未嘗不歸其所以然於造物是何宜勞而莫之勞耶豈因其才而達之未嘗作意於其間故甚簡而無勞若此故曰天之生物因其材而篤焉故栽者培之傾者覆之牛因其能力則使之魁然有任重之軀馬因其能驤則使之昻然有致逺之足楩柟豫章因其修直合抱則使之有棟梁之材穀可飽則使治飢水可潤則使巳渴醯之酸醝之醎飴之甘薑桂之辛各因其性使之有調羮之味木擁腫者棄石碔砆者賤草稂莠者除蟲毒螫者殺然纎悉紛紜不可一一而疏之彼造物者將運其心術於纎悉紛紜之間得無錯亂謬悠殫神竭精至於委頓而其功不紀乎惟其因之則不言而聽不勞而定豈惟於物如是至於人亦然其材阿衡也則使為輔相其才穿窬也則使為盗賊其質鶴鳴而鳳觀也則使人敬其貌狼貪而羊狠也則使人惡造物者將何心於其間哉亦因之而已雖然盖未嘗無反是而不可以理考者顧豈天地之心乎恭以垂衣求治之主必資代天理物之臣昇平之基於是乎在其所以進退百官揄揚側陋亦將因其材而篤耶舜之所用二十有二人因之之謂也彼二十二人者兹事姑置聊以西漢之君得人之盛者言之漢興六十年之際董仲舒公孫𢎞倪寛以儒雅進石建石慶以篤行進汲黯卜式以質直進韓安國鄭當時以推賢進趙禹張湯以定令進司馬遷相如以文章進東方朔枚臯以滑稽進嚴助朱買臣以應對進唐都洛下閎以歴數進李延年以協律進桑𢎞羊以運籌進張騫蘇武以奉使進衛青霍去病以將率進霍光金日磾以受遺進凡此二十七人官高祿厚聲施甚美而天下之士不敢起而與之争此譬之持㦸以攻城執鏡以照形天下莫不稱是使得㦸以刈葵得鏡以盖巵則世亦必非之矣異時亦有如蕭望之為抱闗禰正平為鼔吏封常清為傔田仁任安為舍人養馬孫臏為刑徒此輩在當時欲自比於竈下養上車不落者盖不可致是非所謂因其材而篤焉之謂也伏惟樞宻太尉以天下之器抱將相之具負匡圖之䇿坐西樞乗東維功烈甚盛聖主方馳騖唐虞俯仰昇平多士充朝唯器是適其上書北闕者皆曉當世要務曳裾東閣者必屬四方之竒才如某齪齪無可算錄又所言皆鄙夫常談無分可采雖然車下甚悲之歌江南未招之魂隠居不嫁之士窮途沈沒之人金玉抵於沙礫珪璧碎之泥塗當栽而不培非傾而輒覆者豈有如某區區之言者乎願以累太尉代天理物之意某側聞天子屬太尉以重大而太尉亦頗收拾人材為國家長逺計某之言天下之言也願太尉毋以人廢言幸甚謹獻鄙文一篇此不足道聊可觀其志之所在爾
