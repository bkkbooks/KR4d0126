body:
  text: 東堂集巻九宋毛滂撰記湖州武康縣學記元符三年新天子即位大赦天下且曰應祠廟損者以係省錢修之武康縣令毛某吿監司曰縣有學㡬廢獨先聖文宣王殿廬在亦不庇風雨而縣之浮圖道士居二十有六咸華壯異常而文宣王之居如此甚不稱天子尊徳樂道嚮意儒學之意與士大夫所以造次顛沛不忘先王者請亟奉詔他日提㸃刑獄使者檄縣曰當出轉運司錢如詔意他日又奉轉運判官檄曰給八萬錢縣令當董其事學於是成矣毛某曰夫子生後老子五十三年夫子卒又五百四十九年浮圖法入中國彼老子浮圖所談皆道也夫子廼獨以二人所談者周以宫墻數仞鐍而不出彼立户外者無見也以為道之妙處盡在老子浮圖爾道難知知之難言言之難以曉人觀老子浮圖譬如善游者徃而之市褰路人裾曰吾嘗蹈海而造其淵其下乃珊瑚扶疎珠貝璀璨龍吟而蛟舞且洋洋也若豈知之乎當共徃而觀之彼儻告人曰溟海之上風雲濤波之變怪如許舟楫鳬鵠之去來如許則人藉令不習海庶㡬徃而觀焉至語其淵微忽恍莫測則非善游者世且安能盡知之故言未竟而聞者意已沉溺瞀亂矣二人以道之淵微車載囷倒而肆羅列也欲使經其門者皆滿槖而歸烏在其能滿槖哉惟夫子之道如中衢致尊過者斟酌多少不同各得其宜故夫子有知之而不言者老子言之於前浮圖言之於後聞其語者㡬何不沉溺瞀亂乎然夫子沒老子浮圖亦已去人間久天下像而祠之如前昨日豈以其道常在邪自天子之都逮州縣為學各一春秋祠夫子於學嵗率不過再祠又學之廢者常十七八丹青憑附之質託於橈棟腐桷之下㫁甃敗垣之間諸生衣布褐羮藜藿口不絶吟於六藝之文百家之說然道雖加修身益困而無憀者亦嘗十七八而天下不以為夫子之道不行自冠昏喪祭射御鄉飲戰陳聽獄朝覲燕私凡人所當為者一出於夫子之道國所以治家所以安人所以為人物所以為物凡必出於禮樂刑政間而無一不得宜者則曰夫子之道云爾不如是則曰非夫子之道學不學祠不祠不論也至於學老子浮圖之法則不然彼蓋豈能盡知其師之說徒以為當作深簷大屋金容碧貎張皇怪誕以自尊嚴爾故入其門四顧皆繡楹綺井金鋪而珠罘罳光炯凌亂眩人目睛動移心魄故鄙夫庸人踧踖生敬認為神竒又極世之侈奉養具殫滋味日夜祠之且以腯其徒一嵗之間雖百家之縣亦屢費千金而後其道行茍不如是則其徒且相弔以戚曰道不行矣然亦卒不行於士君子間惟夫子道雖出繩樞甕牖中亦必行故囘居陋巷飲水曲肱不害庶㡬於聖人子貢結駟連騎負終身之恥於原憲漆園吏有言六合之外聖人存而勿論此又安知非所以深論者乎夫子葢嘗曰參乎吾道一以貫之此所謂六合之外皆未始出夫子户内爾將有不論而喻者亦開戸而受之彼老子浮圖又安能離絶而逺去耶獨語其所不及則夫子之道忠恕而已如行千里者問途於人或曰自此而往途則是也而不能以達千里告人或至或不至顧其行如何爾逮其不問而知不行而至以游乎四海之外此非可以求於庠序之中圖書之間雖夫子親為其弟子言也亦不能傾盡故均於聞一而賜則知二囬則知十自十而百而萬聖人之道寧有既乎雖然自萬而返與一俱亡則聖人之道不可以口舌爭矣故曰不見而章不動而變無為而成者則余不敢以言知夫子亦不敢以不言知夫子矣言與不言皆不足以知夫子况求於寝宫偶像之間乎武康地褊小寡民衣縫掖者五六人焉作浮圖氏廬者突兀相望夫子乃居陋屋下蕭瑟徒四壁風雨所經過也余慨然念老子浮圖之廬列於天下者綺紛而櫛比因極道其所以然如此余聞武康防風氏故國其專車之骨既已盡於螻蟻今其俗易於服馴以能養桑柘善眎蠶眠食狀為材父兄鮮以夫子之道詔其子弟余念上負天子所以丁寧化民成俗之意此余所當憂而學不可不作也舊學在縣東前縣令遷遺像而廢其居凡十六年春秋奠菜皆露立茂草中踐牛羊之跡嗟乎自唐晉間此地固多名勝士如孟東野沈休文輩璨然相望余覧觀其山水時得佳處朝雰夕霏自有英華意東野輩數子無恙時咀嚥以自鮮榮其肝膈之積聚既已蔚然又欲以其餘餼後人而未有多取之者何也學以元符三年秋九月增建建中靖國元年夏四月畢工故像甚凡不足以棲神明亦咸用改作所謂堯頭禹身華冠象珮望之儼然也為屋宇二十一間不侈不陋稱縣之廣狹也開户鈎簾無敗意物獨長澗分碧遥峰送青光風霽月共臨几案能為人洗肝膈之淟涊發肺腑之瑰竒使其吐而為言富於南金大貝真諸生之竒貨山水之闤闠也余與客俯仰乆之因勞諸生曰學良苦矣而貧若是今有竒貨可拾而取諸生豈有意乎編簡蓋資財爾筆研盖駔儈爾厚其資財習其駔儈皷篋而入其價不三倍乎客有言於座者吾将捐資財謝駔儈屏竒貨食於茍簡之田立於不貸之圃盡棄文侯之土梗如何言未竟予倚户而吟下俯流水有舟出葦間漁於余側者得一頳尾而棄其罣䍡余顧客曰無多言矣學亦若是㑹當為碑因載於其末云建中靖國元年四月初五日記雙石堂記大丞相韓魏公客齊安孫賁公素為衢州始至盡壊州治屏障逹其隠蔽而重門洞開麗譙棨㦸嚴其前山光野色棲其背公髙明人心猶隘之欲更為便座見吏民布條敎未有所也他日步至城西隅披䝉茸入榛莽有得意處焉公曰當在是州南韶光園有清冷堂壊命徙其材請於部使者曰願助我一堂之費不日工畢顧未有名而㕔事下土勢坡陁篠木蕭森公以問人衆皆曰此冡爾相傳有碑其文云五百年後當有刺史為吾守墓以故前後守皆敬而不敢慢公曰審如是耶端可去命取鍤欲去之左右大恐私竊語云禍不旋踵矣寧犯公顔必留冡言甚力終不許至闔府叩頭遮公痛道所以不可去冡意公曰事真偽未可知吾不敢以為無冡獨天子命吏古所謂二千石屬任甚重則環吾封千里人無賢不肖而尊至社稷細至豚魚吾一切得主之今乃旦旦坐廷為人守冡耶藉令土中有賢者骨尚得以禮法去就儻冥頑不可告語此則愚鬼爾為鬼而又愚良可逐不然則徒積土爾去一撮之土用數夫之力復何惜哉衆知其理不可奪而止公即使具棺衾設飲食用浮圖氏法将遷之髙原手為文躬自祭曰遷之為是則或為民福茍不當鬼神意則太守請受禍不他人及也其文陳義甚髙讀之悚人魂魄而况於鬼耶至斸土深一丈二尺初無他異獨得二石峯長五六尺許而大木之根蟠踞其下衆疑始定石上有刺史季彀題識云乾符五年五月三日安於此押衙徐諷龍山起砦處得二石又刺史慎知禮題云開寳七年十月二日重壘峩眉山於㕔事前於郡齋文㑹閣移季公之石安置於此慎刺史距季公凡九十七年孫公之破此冡也去慎知禮又一百二十一年矣自彀而至今凡二百一十八年不知人以為冡者特㡬年而難破之疑一旦遇公以戯笑而釋之是豈亦有數乎公顧二石笑曰吾得堂名矣使遷致新堂下翠隂覆葢蒼然人立而苔膚堅瘦雲根潤活屹相顧嚮如釋沉埋之恨而有負主人盼睞之色公乃為書告福建轉運判官文勛安國曰吾當以雙石名吾堂君有篆名請為我書之今所謂雙石堂也嗟乎天下可疑事豈獨此冡耶今人固有蠟言而梔貎鳯鳴而鷙翰葢冡其表者亦纍纍爾至使之熒惑耳目感移心意茍一日與公相值將不知所以自喜矣公才噐過絶於人而愽識强記辭氣愿欵為吏以敢擊行毎簿書堆案賔客環坐肴酒前陳鐘鼔雜奏初不妨笑歌而政術可紀至夜分客往往坐睡公眸子瞭然逼人此豈可學也衢在東南窮僻處未嘗識天下偉人而公秀眉明目風度凝逺臨事果敢出人意外里巷相驚以為異政既而皆安樂之然此特公胷中之小小者爾國人初聞公來諸豪望風氣索竊自戒曰豈往年孫陽翟耶是善屈人我不自戢公不置我士大夫又曰此韓魏公客敎授書記耶其人仁而好士可撼以義庻幾吾國有瘳乎後皆如所料公頃為陽翟名聲藉甚裕陵召對延和将以為御史公為上談經術論天下事無囬撓上頗知公為韓丞相客意甚嘉之詔留京師乆不得辭公亦杜門謝逺權勢人或曉以當見大丞相者公笑曰御史可從人匄乎以故不果用他日雖屢試公以事而益有能名更復坎􅇄於時而了無纎累逺棄此邦識者介介不快為朝廷惜人材而人固疑公之不樂也殊不知公方且謹簿領親米鹽下與丞掾分勞苦其餘力尚能治亭榭賦詩飲酒與賔客相娛樂而眉間乃無一㸃流落之色馬援云凡人為貴當使可賤異時知公能不驕富貴人也衢號山水清逺地多修竹前人獨不治臺觀為登覽地目之所到裁藩牆間爾自公為此堂鈎簾開牖而望已心舒目衍忽焉如騎氣御風飄浮上騰肆無留礙堂面羣山狂峯秀嶺翔舞排踏來赴座隅雨𤾉慘舒各有竒態繚垣開囿下瞰萬家桃蹊栁巷朱碧髙下佩寒溪之清深帯長城之蜿蜒自其下望之欄楯宛轉簾額飛動日炫羅紈風落笑語殆不類人間世也堂為重屋而三檻中檻種竹便娟葳蕤泠然來風煙梢雨籜偃仰氷雪故以為雪竹軒西檻種菊圑欒葱蒨氣並蘭蕙懐芳春畦擢秀露砌故以為露菊軒東檻種栁春姿濯濯風態欝􅉱而低徊綺寮婆娑玉甃故以為風栁軒西軒之下有山焉槎牙岪欝蒼稜孤秀蓋土中所得木根也對山結茅為庵短窻低檻竹栢幽好如山僧野人之居向冡之未去人皆稽首過其傍不知其下特二石一木根爾公鍤置於此以助㳺適而徃時稽首者反得摩拂而狎玩之於是羣疑始亡故以為破疑庵使庵中之人抱神收視寂然凝虚不將不迎應而不藏則盡天下之疑不足破也庵外一亭古木扶踈𤣥䕃耽耽又掲為喬木亭翼亭面堂有臺而屋方楹曲檻中置碁局坐其上者翛然追童子之仙風輕曜靈之急節葢所謂棊榭也並榭而西垣勢凌厲而欝有佳木廼亭其上可以望空濶散滯礙故以為能賦亭葢將廣崔侯欝怒之思成陸生瀏亮之説又所以待列大夫也堂之初構欲除地立木下得柱礎六與今廣袤不差毫髪乃知此地之勝前人葢嘗得之豈中間因循圮壊蕪為穢墟而狐虺鳥䑕得以為家遂不復為人賞識耶抑佳致所在地靈固自藏靳固必竢其人而付之耶滕王閣天下偉觀得三王而名益傳如庾元規南樓謝安石東山皆因其人以不朽故至今好事者想見其處柳子厚作茅山亭記云美不自美因人而彰蘭亭不遭右軍則清湍修竹蕪没於空山矣韓退之記宴喜亭則云其丘曰竢徳之丘蔽於古而顯於今有竢徳之道也噫􅐵此堂也當知其與南樓東山蘭亭宴喜及夫滕王之閣争不朽名矣他日客有升堂而坐援僕手而起曰嘻甚矣公之貪也夫以千里之疆其山川之雄秀原隰之廣麗室居之輪奂蟲魚草木之茂暢旦氣之清明夜象之光怪公乃籠於一堂之上攬於几席之間將盡有之而厚自潤澤春在檻東秋在檻西冬在檻北而南風時來徑入襟袖雖造物之歴四時而僅有者公又據其㑹鈎致而并取之甚矣公之貪也或曰公之貪復有過於此者世或脂韋為柔公則頡頏而貪勇世或突梯為利公則洗濯而貪㢘世或剋核為薄公則愷悌而貪仁世或僥倖思進公則逡巡而貪退甚矣公之貪也僕告客曰公能貪而不能守喜得而好費前所謂山川原隰室屋蟲魚草木與夫晝夜之氣四時之物公不過一研墨渉筆則瀾飜滿紙盡用而無餘至所為亷勇仁退固已散於此邦之人浹於士大夫之心而不自愛惜僕試從容求公於破疑庵中則索然隠几攬鬚而長嘯顧僕與客曰雙石之勝槩請以餉客往矣吾方營吾私客與僕愀然而嘆曰公所謂假道於仁託宿於義我曹平日所窺皆公杖屨外事爾盖未嘗見公也昔杜子羙從李白髙適過汴州酒酣登吹臺慷慨懐古至使人莫測者何也葢自知吾之身適徃適來須臾變滅俯仰百世交一臂則無可懐者况光景易散而無迹之留耶此堂决非公懐抱中物矣異時登堂而思則風烈猶可想也儻求公之跡於庵中則公殆不可見矣聊記其畧以附三衢故事紹聖三年二月二十五日饒州州學進士題名記漢博士夏侯勝每講授嘗謂諸生曰士病不明經術經術茍明其取青紫如俛拾地芥學經不明不如歸耕僕初意古今取爵位致登顯亦視吾材如何爾將未必盡用經術至讀霍光傳觀其立誼秉志一謦欬繫國家安危卒輔㓜主為時阿衡可謂社稷之臣矣然以不學無術闇於大體身死肉未寒而顛覆隨之乃知雖有光之材茍不學未免於闇人不可以無學如是况方且以此進取者哉天下郡邑皆有學校而廢興在守令鄱學自范文正公出守病其當闤闠相東湖得佳處將遷之被召不果以屬張太守中間既新復弊其後先師更窘風雨矣熈寜末後范太守始易其圮桷腐瓦逮姜使君下車陋者新隘者廣其經營之意有古人之遺風敎官陳君巨中作記甚詳近考祖宗以來鄱之士人由此學以聞道出其道之餘為文章干有司取科第為世聞人每絡繹相望也他日葢有佩金曳紫朱丹其轂以歸者耆老見之猶復指似云此吾學舍諸生爾天子好爵厚祿不輕與人今諸生書笥近在腹中何當廢之暴其蓄積决能炳然可觀其不為夏侯見棄則爵祿真地芥爾巨中嘗上書言浮屠之弊引義雅正天子嘉之自縣令得此官葢將羽翼吾夫子之道以行其志僕嘗謂國家使人如使器為器必有模範模範不善則雖成器不可用其能為器之累如此以故人材猶器爾今教授造作人材官也不為人材之累者幾人乎巨中道足為人師宜不媿此語使異時鄱陽多士葢自子厚之門出元祐五年春既刻學記又刻教授題名記又刻進士登科姓名而大其碑葢又以待諸生云三衢毛某為作進士題名記湖州武康縣淵應廟記雷君不出裝不復渡揚子而西者五年於兹惟欝華君駕六螭銜火自燭餘烈烜然下曝斗分呉人不幾腊其胔藁其骼雲不蓋山泉不濡井東阡西陌塵翩翩也聞嘉禾郡最劇如著爐炭上武康東出不百里距嘉禾近聞其田里蕭條屋散雀鼠而魚游錡釡武康四逹比鄰逺輙不過三四十里比嵗聞東西南北境徃往輕其賦獨武康輸縣官如平時雖然嵗未嘗不閔雨一無雨輙走羣望又為西竺乾法以請卒無雨縣長老云直縣西八里有響應山而龍居其山之下潭水之中盍往請焉余披圖牒又得之云唐縣令劉汭嘗請雨如願欲即馳詣請之未出山而雨他日又請或行半途雨或返舍未越門限雨以故苗垂死輙活且遂秀以實也他日無雪又往請焉如雨之信因上其􅃺於州又上郡刺史且致書諸公間曰龍棲吾邑甚恵東南無黔突維疲骸厲首紛相枕籍而我邑有遺啄以分鷄鶩縣官賦且辦醫師括藥囊無以呻吟叩門者朝廷當何以報之願亟以上聞州伯遣主簿送中牢醴酒來曰吾城無雪縣令致吾意於龍幸分我一尺雪即日往告如伯言徹牲雲物見雪意逡巡霰集瓦溝下如跳珠其夕大風飄忽蓬勃號且東南去如犇萬馬馳千乘車如鎧而荷戈者相前後錚錚也明日聞吳興城濛􅟎雪中矣元符二年十二月部刺史上聞書下春官有司請曰祠廟當旌封者先賜廟額五月勑書下賜廟額曰淵應然初無有廟也邑人䖍上恩即共出錢財作屋二十許間堂潭潭也廡翼翼也墻屹然門煥然壯哉侯伯之居乎雨𤾉之變天耶人耶有數乎適然乎抑有召致者乎浩浩蒼蒼上果有帝居龍果役於帝者乎將帝尸雨𤾉或者龍得専之班固書曰政失於此變見於彼猶景之象形響之應聲雨𤾉之變或見於治世固言豈皆然耶然豈獨固云爾先儒之言皆爾也一人吁嗟王政為虧所謂政者州邑皆有政朝廷雖治而州邑不治其變將自及所不治者於以累其民乎易曰天地以順動則日月不過而四時不忒審如是則風雨温寒儻有小異亦天自不順何預人事而所謂常雨常𤾉又何自而致之意人事蓋天事爾天雖不可以晤語然帝不言而居其中視焉惟人聴焉惟人則人與天果相因矣豈自天作者皆人自人作者皆天天與人若是者亦莫知其然耶雖然王天下者不罪嵗一夫不獲則曰時予之辜嗚呼躍馬肉食者紛如也皆王者所以殷勤屬一夫者矣雨𤾉茍不諧于時凝旒一堂之上四顧萬里所與彌綸而輔相者誠當念此漢丞相丙吉道逢牛喘問之此果能任其職而知所以當憂歟孝婦死東海旱其罪有在矣或曰若是子繆將有此雨乎嗟乎余非敢有也葦洲竹嶼之間牧兒釣父與令相依者少於鳬鵠上之澤汪濊易滿予不敢使之壅而不流庻㡬穰穰滿家者在此或曰浩浩蒼蒼上果有帝雨𤾉當自帝出於龍何有而子之言夸若是哉余聞雲從龍且曰龍雨師也是帝欲其雲行雨施而下澤焉則龍當任其職龍不任則帝不澤矣嘻豈特龍哉乘朝車食太倉者皆龍若也彼有龍名而職不任者其出不為人禍則反為身殃身在孔甲之世而夏徳衰漦流厲王之庭而周祚去喜睡則珠亡於頷薄逰則射中其目有龍油然流帝之澤如淵應者乎然聞龍居鈞天帝居上下星辰呼嘘隂陽薄蓬萊羞崑崙而不即其茫洋窮乎𤣥間奴驅列缺而𨽻走箕伯宜其一噓而宇内濕乃悒悒於漻澥間菜畦麥隴之下朝噓暮呵僅足相濡者其稼曽不滿眥豈龍之類至多帝畀其地或褊小輙不能究其用歟彼眄睞層霄涵泳朝夕之池者或反與旱魃接殷勤之驩歟余嘗至淮海上四望渺然但見鰌鱓出没聞有龍而不果見時見篙師賈客過輙祝而祀之曰豆肥酒香錢財多有龍其福我竟去千里余問其所當祝云有龍恃其居毎輙出狡獪見怪神則狼狽波瀾顛倒日月裂㠶摺柂覆舟如葉垂涎閃舌牽其人嘗其血以自肥腯故不可不祝然不聞有能出膏澤者余亦頗怪世所傳歳大旱祀龍而雨者多在湫潭間未有聞禱於淮海之上豈篙師賈客所云者特鰍鱓之雄彼其曝陸梁而含脂韋能媚於帝以取容退而挾其寵以夸魚蟲雖龍亦為之逡巡引却如此耶淵應雖載圖牒其初廟貌無有血食鮮至簫鼔不作獨飲玉浸之紺寒庇雲璧之蒼秀負杉檜之偃蹇友煙霞之容與而已其所自養者約而施人者常倍蓰余每至潭上徒想見其蕭颯踈瘦寂寞無營以老也廟成父老請記嵗月余餬口父老上無所潤澤其子弟而慙惶於龍者涉筆慨然又繫以詩建中靖國元年正月十五日紫㣲郁紛閶闔九門孰司帝澤有臣蜿蜿曝鬐扶桑礪角崐崘鱗翼一奮溟海傾盆孰為其家珠宫貝闕洶湧萬里蕩雲沃日孰尸其間鰌鱓出没云胡不歸淹泊咫尺其歸非艱朝發夕至伏類蠶蠋起涵天地天飛淵潜浮沉皆戲於穆淵應光發乆翳潭山得色羣望抱媿突兀新宫薦椒奠桂聊穰爾家豚蹄非計十雨五風永相豈弟連雲觀記元祐七年夏六月利州修清風樓為連雲觀秋七月太守王公以書赴鄱陽告某曰始吾於此旦日據几簿領如髮正須爬梳又當為民吏道主恩曉國禁而問所疾苦赴其願欲若吾有負於此人衆且持券而取責必償之乃已蓋未暇游觀事也頃之民不數至吾庭司空城旦之書束於髙閣晨起從容聊涉筆報期㑹而已反私自慨憐吾君㳺意太平治道貴清浄四方黔首日以寧嘉此不教而定吾老矣竊二千石異時約結欲自表見者今乃了無可効殆飽食而嬉矣既日無事時步城上得與江山接殷勤始怪此樓􅋻陋聊葺而新之今晧旰百尺上薄光景俯瞰風雨簷牙含空雲氣呑吐朝隮南山而歸宿柱礎此吾以名連雲者也兩隅别為更衣之次將從賔客徘徊其上以樂之然未有記幸以屬子可乎某書復公云公之惇大渾涵人莫覩其畔岸者今豈欲小見於此觀也哉有濟物之性無塵氛之攖惟雲是名此豈直張其崇髙而已觸石而出膚寸而合不崇朝而徧雨乎天下者此泰山之雲也故君子體雲雷之象而見經綸之業得志則加乎民其斂而未用也又能使人憔悴枯槁渇而望之則君子於世亦何能已此其有為之氣當浩然而川瀦淒然而雲作勃欝胷次茍出之膚寸崇朝其雨乎豈直此觀之上蜿蟬逶迤繡文錦章獨無心而徜徉乎雖然聊寓意此時以寄巻舒亦何適而不自如耶此公不素見語者某竊能料之以暴於人至於登覽之樂風物之秀獨想見其處而斯文不可以髣髴然聞其東則項籍之烏江試求其平生喑啞叱咤之氣垓下悲慨之音則已漂為驚濤紛為薄霧濛滅無所矣風急水寒葦花淒晩豈亦有艤船渡口如當年亭長輩乎聞其北則孫權之故都帶甲百萬江漢為池紫髯英發驅駕豪傑豈自知不四傳而奪之晉又奪之宋齊梁陳如拉枯然彼晉而下樂未畢也哀又繼之俯仰六朝無可把玩嗟乎世人直為物之逆旅爾其來不可圉其去不可止一世百為忽然而已公乃今日登此遐想而長思亦適然也葢方將躊躇方将四顧付是非於亡羊歸萬物於一馬乎昔羊叔子登峴山謂從事鄒湛曰自有宇宙而有此山登此逺望如我與卿輩多矣皆湮滅無聞使人悲傷嗟乎羊叔子豈特畢一世為物逆旅耶方將以身為長廊甲第為便座燕寢日夜為主而錮留之又將數百年累虚空以應門引魂魄而守之此亦惑歟庾亮為武昌諸佐殷浩之徒乘秋夜往共登南樓俄而不覺亮至諸人將起避之亮徐曰諸君少住老子於此興復不淺便據胡床與浩等談詠公豈亦有客如武昌之人乎當天空月明夜氣縹緲斗酒相屬撫缶而歌客主可以頹然相忘矣既以書復公又以為記郢州新修縣尉司記九品官視縣尉為最賤九州之地郢當僻陋州城北百步許尉舍在焉老屋十餘間腐黒撓折遇雨水行堂室中冠巾皆濕蛙蛤爬沙出没梱間與人為忤毎大風至其上索索有聲坌入如揚篩眯人目不得開屋下之人疑將壓焉尉最賤故無一錢力可繕完便與嵗月因循益老而增朽以壊也予以貧得為尉不敢擇地故鄉水陸四千里乃不知嶮且逺郡憐其眠食於雨𤾉間也得錢五萬四千尉舎始完予東吳野人無適時才用非所宜仕於此時者故日恐招罪悔尉舍既成自為之記且具隻雞斗酒以落之因自曉曰桂可食故伐漆可用故割予愚幸無用於時從下士之列而又昜於去就平日學聖人之道將進而行將退而藏亦猶食柤梨橘柚爾其味相反而皆可於口予不知孰為可不可也楚江之漘有舟有楫使予得南浮瀟湘觀洞庭夷猶於瀰漫演迤間東望瀫江揺竿鼓栧而逝忽焉以清予憂良自幸哉入語妻子曰汝曹姑複被以待元豐七年六月一日湖州銅山無畏庵記銅山無畏禪師維琳作庵以無畏名之求記於予吾先聖人有言君子有三畏畏天命畏大人畏聖人之言嗟乎吾儒之多畏如是禪師獨傲然無所畏至以此自名猶未能已又以名其庵人聞禪師名者皆竦然曰禪師異人耶能無畏如是予獨知師不能無畏也其畏殆有甚於吾徒凡人耳目之所適口之所甘四肢之所安吾聖人苐為之節文而弗禁也在禪師之道一切禁之斥滋味如去鴆毒屏顔色如避死仇絶聲音如止詬詈舍安逸如解倒懸葢凡人所為者一切當鋤治洗濯離絶逺去疾走逃匿而不敢却顧至終身不復一念及之然後為比丘之行粗備甚矣其多畏也禪師日食唯飯一盂冬一裘夏一葛渴則飲水而已試以人之所常為者禪師為之則必矍然變色曰不可是則雖起居飲食莫非禪師所畏者又何名無畏耶雖然此予陋甚所期禪師者淺索禪師初學之地形數之内爾予聞伯昏無人曰夫至人上闚青天下潜黄泉揮斥八極神氣不變也是其人萬物一府死生無變於已如聲過垣無有留礙此豈所謂無所畏者耶禪師之道豈在是乎禪師云我諸佛之智内充眀了决定故對外緣而無恐也此四通名無所畏者我是以名之予告禪師曰無所畏未若無無所畏我無所畏未若使無畏於我莊生書云登髙不慄入水不濡入火不熱此則我無所畏矣入獸不亂羣入鳥不亂行此則無所畏我矣茍至於此物我之畏兩忘無我無物無畏是真無所畏耶銅山古寺林麓蒼秀旦暮之態風月借助隂晴之容雲煙潤色不接人境自立標勝禪師喜作詩甚自力日夜哦其間痛自雕琢肝脾欲以氣葢古作者想見其盤礴自得時葢亦無所畏矣致和元年八月十五日行藏樓記宋陽里華子中年病忘其妻以居産之半請方於魯儒生生已之華子既悟乃大怒黜妻罰子操戈逐儒生欲追須臾之忘不可復得此病爾猶茫然遺耳目蔑思慮况至人去健羡黜聰明其中了然㤀之哉視吾身㗳焉空虛渾淪其亦何思何慮而行藏之别如屈伸臂爾天以是非哀樂獨啗賢者乆矣前人老死嘗不得盡棄其餘漫不復收散之山川溪谷托於雲煙雨𤾉更以厭飽後人世有人焉材厚而命薄學莫行其志仕莫究其用至有沉埋而不振放逐而不復心煩意亂乃時登髙樓上層臺寄逺目㪚幽懐㧞劍而悲歌捋鬚而遐想傷今之不可晤語懐徃昔而悢悢也則山川溪谷之情雲煙雨𤾉之色空濛瀰迤見古人之餘悲留徙倚而發悽愴殆揮不可去已益使人撫物色以自憐感時節而永懐向使華子猶病必能登臨而忘使去健羡黜聰眀者於此當不悲以笑而卒亦不知其所笑因忽兼忘人之悲此能無得䘮矣豈自知行藏之多岐哉巨中陳君即教授舍為樓號行藏引客坐其上顧謂僕曰杜參謀詩嘗有此今以名吾樓子盍記之時日暮天寒僕支闌干而徬徨目送過鳥翛然絶湖湖西獨黄蒿古城雨濕枯樹想見此老亂髪垂耳零雪霑鬚目注橡栗歩追狙公其阨窮流落之態於一倚樓頃周視山川谿谷盡付其悲葢將以遺後人使驚世故之多累悼浮名之不竟嗟良辰之晼晚也巨中氣禀特異如孤峯絶岸為文章筆勢聳㧞上使以經術教江東子弟又使養以安閒益自進於道其日夜所以學吾夫子者當於進退存亡可以不疑是豈不沛然足乎已而無待於外者潜雖伏矣亦孔之昭顧廼倚樓忘愁獨放意於山川谿谷以追當年之餘悲乎不然特戲為此名與詩人墨客長為勝槩爾自得齋記僕頃過餘干令飯有客下座氣貎魁岸望之甚偉令云簿君尚書宋公之孫尚書公文學前輩有顯名於時僕以不及識為甚恨喜見其孫也時起與君語云公子習富貴家主簿官卑廪薄未免於寒饑今視君鼻間栩栩然君之用心獨奈何君曰我不敢出吾分以求餘就非我力而取悶爾他日又過僕見語曰簿舍頃壊今新傍構齋居以自休陳圖書植竹樹出則充吾職而已間而歸解束帶從賔客彈碁飲酒便輙終日漫不知其他於兹三年矣衷實自得之子為我記其説僕告以天池之魚化而為鵬怒而飛其翼若垂天之雲摶扶揺而上者九萬里而蜩與鷽鳩斥鷃笑之此局於大而不能小彼蜩與鷽鳩斥鷃者自足於數仭而無所用大也故不得不笑之言者嘗語僕以道云充塞天地大而無餘隠於毫末小而不迫其在人也可以貴可以賤可以約可以㪚惟人所之今將絶雲氣負青天則鵬不得争前翺翔乎蓬蒿之間則蜩與鷽鳩斥鷃且相比也為鵬也為蜩也與鷽鳩斥鷃也何適不宜而與道徘徊斯自得之全乎君効一官方翔徉乎蓬蒿之間葢能自得於小矣然亦何必自為小廓而大之正亦為之而已君子素其位而行不願乎其外素富貴行乎富貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉君請記甚勤僕於同僚何敢自愛雖然常聞前人有言學不可已或云人不可以無學君芽茁詞林而遺翹可拾意當敏以培之俾終不落于以益求其自得之意則中庸之義見而後庶㡬知君子所自得者不既大歟顧僕云云何益聊為君記嵗月而已書來盛道齋中佳致僕有官守不得往觀以書於此文也
