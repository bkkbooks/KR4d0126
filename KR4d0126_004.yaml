body:
  text: 東堂集卷四宋毛滂撰七言律詩次韻方明叔見贈法書亂眼極牛毛卒業何時愧李翺好在先生無燥濕老來秀句絶孤髙不知蹭蹬沉鸞枳却念疏慵似馬曹誰薦薛公經行著折腰江縣豈殊褒曹使君舍夜飲歸步月出城山色如畫作詩一首寄曹西曹滿百第相聞東閣招延氣自春雞肋天教辭怒臂牛心公與慰饞唇酒紅欲去風吹頰山碧來迎月滿身步入柏隂清夜急敲門惟有鶴譍人對雪二首玉京咫尺不應疑龍鳳交橫舞屢僛素色可能粧粉並真香直到齒牙知珠樓先曉月未落瑶草自春天亦私千里一裘誰有樣鄒郎吹律為薰之空庭白鳳舞毰毸撲帟窺簾去却回栁絮似將春色到梅梢不認月華來輕盈舞殿三千女縹眇飛天十二臺定有仙人來種玉藍田歸計少徘徊桐君山邑人呼為小金山桐君所廬也塔廟新嚴跡半空山前山後但孫桐樓臺影壓浮天浪鐘鼓聲隨過岸風定有龍宮在深碧初疑海市變青紅衆醫不識人間病遺籙誰知藥石功代人和孟羽東野多窮輒自鳴半生雲水共將迎朝廷纎悉收遺老筆勢巉巖壓後生天上恩袍新草色道傍詩句古鐘聲出秦壯思磨鋒鍔欲破劉郎五字城生日案題有脫字要作人間浩蕩春便應三日對東君萬牛早汗十圍木百榖終甘一寸雲天下公侯端有種日邊鴻雁不離羣寶爐善頌區區爾何似君陳德似薰代館職應詔和元夕太平樂事及黎元桂月蘭燈照有年景焰煌煌浮魏闕清光穆穆抱堯天皇明爥逺輝星斗睿唱宣和勝管絃十二明珠供照乘夜光飛出九重淵送朱朝夫過江北愛君如竹可無君君去吾歸麋鹿羣他日漫同千里月明朝相望一江雲餘尊尚得須㬰語新句那能欵曲聞人到寄書應不識花間但覓醉參軍送遐舉解德清縣章吏最年來三再書野梅官栁映歸途不容車下牛將犢猶說桑間雉領雛萬里摩霄看鵠舉一城臥轍作兒呱東鄰病骨誰料理十駕相追肯少須和孫守三月二十七日開宴繡段遮簷玉刻樽揚州春色最先醺落花風起舞茵捲秀嶺烟生媚黛分酥面錦靴輕轉雪粉吭牙板細留雲要他桃李長依舊不借東君借冦君次韻曾公袞翩翩公子蚤知名詩句年來特地清客館可應堪倒屣蕪編曾不纍懸衡南飛倦翮都無興北道主人終有情想見緑疏前夜雨跳珠甃玉伴吟聲縣境不雨數遣比丘禱佛於廟祀龍於社皆不雨聞龍居響潭水中往潭湄刑鵝而祀之初崖月微明有風颯然動衣袂祀竟雲物出雨態生已而遂雨然嵗豐時和蓋造物者之力而龍之惠也至前此不雨乃令之無狀所召爾縣之諸儒反為歌詩以雨歸令甚無謂聊作一詩奉報自酌椒漿酹紫淵步虛聲徹羽衣翩原注祀日先遣道士作步虛聲祓除不祥壇心月冷刑鵝俎雨腳風搖浴狶天原注雨書云河中雲如浴狶乃雨百里飽看紅䆉稏一杯輕愧黑蜿蜒韋編漫記經綸事老對雲雷却惘然縣境不雨禱響潭得之明日一龜出潭水上取以歸縣齊諸進士有詩因作一首崖雲送雨一村凉千頃扶踈緑穎香白馬誰將河伯命緇車先趣大夫裝老來未覺巢蓮近逺去惟知曳尾忙趂我還山先辟穀林間日月伴君長孫使君約觀燈以病不果往以詩見强次韻和酬羅綺山前捲斾風夜游車馬畫圖中落梅已恨青春減投轄那憂碧酒空座上精明唯定國原注公爽健過人深夜對客不少見倦容眼中耐久秖元同原注來詩道苕霅舊遊而故人之意惓惓不衰勤呼為惜蓮燈爛多病猶貪芋火紅燈夕當三日而罷今至四日五日國人尚紛然出遊勢不可禁天既雨仍作小晴老稚皆有閒暇不迫之色千兵所至歡呼隨之此前未有也聞使君復為人强出聊作小詩記一時之事廉纎飛雨為誰休爛漫懸燈總未收自是一年無歎息不妨五夕得嬉游後車鶯燕春聲軟前騎熊羆夜氣遒兩對紅紗三百炬插花攜酒趂遨頭定光梅開僕以病未能往觀亦緣此辭閭丘之約今辱示詩走答一首七里梅花自一村縣樓目斷暮雲深玉人為弄昆溪笛塵榻空橫單父琴知有春心傳庾嶺可無雪興在山隂金鞍簇馬何時到試聽東堂逼仄吟伯駿同官以僕禱雨龍湫屢效百里荐嵗熙和官曹無事作詩見寵輒次韻奉酬一首荐嵗熙和屬臥龍得分閒暇與君同春筐縷雪衾裯足午甑吹珠頰輔豐蜥蜴興雲誰汝信商羊舞雨自言功州人欲識餘霙雪寄與飛廉百里風原注武康去州城百里前日大風折木隨即見雪乃禱龍之明日也代張蘭送太守電轉雙旌雨結愁水流行色過芳洲賸風殘月誰交取别酒離歌且駐留千里溪山記詩伯一年鶯燕識遨頭朝天不作含香伴為想林間春意幽代張菊去年出郭麥風秋憶共兒童迓細侯煙雨一溪行色動管絃千里頌聲留斷魂南浦橫離恨注目東山想舊遊西檻露團春不管抱叢寒蝶伴清愁王治中招余飲丹陽劉公雪苑英公在座主人俾余坐中席僧居左道居右衆賓列坐兩傍曰道之所在也余敢當此哉為詩以謝之宇宙中間道最大禪仙並立儒為尊誰將幻怪驚愚俗總向虛空認法門此土猶知名教重昔人尚有典刑存愧豫晚陋羞前哲願以鄉盟齒弟昆原注此後無論教只序齒和巨中游芝山俗狀塵容欲養成猶慚岫幌不吾扄任慵讀律知難入忍睡看山輒暫醒蘭茁有時應吐秀茗根無味强通靈朝霞夕菊全堪飽肯紿侏儒學嵗星次韻答琳老雲水肝腸要掃除筆頭費盡淡工夫居山應免逢京兆過我聊當見子虛夜臥春蒲諸念冷晚吟秋漢一峯孤打包來作臨卭客車騎雖無亦甚都奉送徑山無畏老人謁吳興蔣使君無畏能作詩寫字去徑山五年遨遊江南以歸遂過僕於此聊館之旁寺老屋三數間而已當坐名山勝剎大佛事而此非所宜安也一生凛凛伴龍湫末後飄飄逐置郵老屋相安真喣沫扁舟獨往亦浮漚晴沙照影支離晚寒研磨煙骨董秋八月驚潮翻口角鈴齊說似古裴休送參寥遊京師青鞋布襪腳騰騰行住湖山自滿膺朝日已升天晧旰秋風猶弄鬢鬅鬙道逢京尹聊須避坐列諸王儻可登認取參寥泉上月緑煙開處在觚稜次韻琳老夢魂夜夜釣魚臺懷抱何當亦好開竹日一窗窺我病溪風三里送詩來天花散滅雙瞳冷香燼蕭寒萬相灰欲與道人遊物外故山情在首重回徑山無畏老人從旁郡來解包武康觀音院昨日訪别云當走錢塘吳興二郡謁林豐二主人僕怪其枯槁淡薄士當無求於世反從事於王公門墻下老人知僕意因云二公有道士我佛所謂大長者輩今佛長城在彼我當歸之僕是其說作詩以餉其行老人常掛瘞鶴銘於座右自言得其行筆法又苦吟名於士大夫間屢過僕東堂飯每稱吾家飯美以故併載詩中海上仙人為守關杖頭風月冷金鐶秖緣長者曽傾蓋不為諸侯故出山瘞鶴字勤衫袖黑敲門詩苦鬢毛斑歸來一鉢東堂飯自有溪雲作伴閒僕罷官東歸過杭州寓六游堂而樓閣倚空江山在目僕甚樂之無畏老師自武康送客至此過僕於此堂之上留飯終日頃僕作武康令居縣之東堂每與師飯於堂上數稱東堂飯美每食輒兼人别十數年飯猶健也然師於世故泊然了無芥蒂獨於東堂故人若不能忘情者亦復可怪戲作詩一首其末併道所懷道人送客過林扄先識穿雲拄杖聲內苑深居無一念東堂久闊尚餘情且欣能善將軍飯未怪頻翻吏部羮小住家風殊不惡一江明月看潮生原注內苑老師新作彌勒殿橋名僧惠澄從余學詩花開花落古東溪賸馥殘膏今在誰後世那能接光焰上人聊復問藩籬散花髙座真無事乞食空腸僅不飢急喚清風下佳樹盡吹塵土出詩脾上元夜翠輦遙窺日角豐陽光浮喜散雲同原注十四日微雪海山不動雙龍矯天信頻頒一鶴通胡越照臨清景內唐虞消息笑聲中六街鼓舞誰能强三尺兒童識帝功五言絶句過靜林寺用琳老韻作四絶句空庭不見人烏啄僧臺食林深露未晞微風漏花瀝且來東堂日相值栁橋西癡鶯弔落花全學嬌兒啼橙花亦娟娟照水弄清白孤香少人知黃蜂自為客寒溪祇數尺炯炯涵晴空寄目誰與論翠荇牽春風春詞日催紅􅦆鞢雪放緑䝉茸莫向東郊去王春在九重雲母春冰薄氍毺曉氣暾尚垂宵旰意加惠及元元雪盡牙籖暖藝生竹簡香夜分猶樂此定喜日舒長精華初結紐璧水再逢春杞梓扶疏見君王自作新雲避南山曉天回北斗春榮光生八彩壽色兩嶙峋君恩破寒色天笑覺春回先暖延和栁曾無羯鼓催瑞日暉暉上非煙冉冉收晴川蠶可浴翠瀲荇初流柏酒勤稱壽椒塗蚤却寒靜無遊樂事殊闊濯龍歡曉光開繡幄晴色上金除初進春衣窄猶應浣濯餘庶草將蕃廡羣隂自退消遲遲杏梁日長照紫宸朝八風調養力九地發生深共被年豐賜誰知日昃心睍睆黃鸝出參差紫燕飛君仁罿罻闊惠及羽毛微粉壁椒花馥瑶叉彩燕翩東風呼唤得隨意作春妍日養千花氣風和百和香君王自仁壽柏葉更稱觴寶厯垂無極璿璣轉未央繡楹膏露潤玉殿紫芝香穆穆清光外蔥蔥佳氣中雲天看斗柄寰海受和風玉甃蘭封麝瑶池栁養金宸章先造化摛藻自春林夏夜毒暑彌三伏微凉起二更月窗風竹亂煙渚露荷傾案此詩從宋詩紀事采補七言絶句遊石橋寄郭庭晦亂峯攢劍護清幽萬壑雲煙暮不收欲就詩壇借旗鼓為君爭取一橋秋偶成二首隨風出岫不知歸身落黃塵夢翠微本亦無心膚寸事故山却合自由飛此生弱草寄輕塵辜負南山笋蕨春好去桃花破浪暖清風明月不辜人琳老送瑶花數葉云作香燒氣甚清馥璀璨誰將玉作春天魔故惱老詩人金爐送在東堂手便有清香通四鄰德清五兄寄清茶玉角蒼堅已照人冰肝寒潔更無塵鳳凰雨露生珍草不比榛蕪亦漫春送茶琳老道人詩思前溪水流出山來亦自清謾寄鳳凰臺畔雪不妨竹裏潤琴聲競渡風斾悠悠水薄船浪花翻覆自搖天汨羅誰復追忠義爭快兒郎一棹先石校書按書使者過蕭閒但恐韋編有蠧干豈識郝公藏萬卷平生檢校費心官雨中採石菖蒲皂蓋銅章久汙人青鞋布襪亦生塵今朝獨向秋雲裏幻出林泉自在身濺濺小水碧逶迤叢菊寒深蔓翠垂採得菖蒲未歸去滿身煙雨立多時秋雲作伴更誰俱頗慣登山不用扶笑怪河陽種花手杖藜破雨覔菖蒲碧澗潺潺珮玦鏘錦苔織翠護昌陽玉真新洗羅裙帶流出仙雲水亦香小雨䝉茸濕槿花臥雲雞犬是誰家老人為指青崖路童子能尋碧玉芽原注時問路田父亦攜小童採藥聞琳老欲入山今少雨想未成行奉寄一絶野僧報我泉新白此老居庵山更清雨澀故應須小住雲寒端未出相迎題貴溪翠顔亭二首寒聲著葉冥冥雨晚色遮山冉冉雲且喜翠顔長好在水邉小住可無君船中自帶紅泥竈亭上親煎白乳泉唯有溪山知此意水風吹面晚蕭然贈程㢲山人十年貧賤欲如餳愧客殷勤話此生試與宋君尋卜肆長安東市雨新晴許子遇示二絶句見索亂道因次韻奉酬苦吟正在郊寒處原注孟郊乃邑人露草秋蟲亦共悲過我聊當煮彭越不須苦覓外孫詞筆頭風月無多子盡是前人追琢餘豈有聲名到溫李僅能楚些屬三閭正月三日游證道寺水畔山前蹭蹬身三年魚鳥許為鄰臨當解組槐隂下更看酴醿一夜春題上元雪作題證道寺故嵗嬋娟獨自來今年更喚玉妃陪要知霽色本無際端放眼中雲霧開和鄭叔詳送竹笋渭川春色到龍孫漸養侵雲百尺根可惜斸來陪脫粟葛陂留得看騰騫某獲造司空府得至便座見文禽五六夷猶曲池上意甚得所慨然有感於衷戲作二絶句許近清池養羽儀恩波穩暖自忘歸長依竹石供瀟灑不學蒼鷹飽便飛幾年不解向滄洲矰繳曽傷質轉幽端倚主人憐采色要隨鵷鷺濯清流石頥山虎跑泉久泄不食僕至山中為浚治而去自洗苔膚一尺寒烏菟那復此蹣跚不妨為我照毛髮正可與人鑑肺肝頃劉子先學士守姑蘇嘗寄洞庭春酒得為西湖十日之醉今流落於此但覺村醪可憎戲作一首奉寄吳天用使君舍人劉郎曾寄洞庭春小暖西湖十日貧老去餔糟無揀擇髙風空愧汨羅人偶得佳酒分寄陳巨中南嶽夫人緑酒春近來未及玉膏醇穆生不許聊須强他日瀛洲是故人春詞春逐東風行地上德隨和氣散寰區聖人中正觀天下道本無言教已孚冰銷玉液鳬鷖喜日暖宜春草木長忠厚家風傳八葉太平光景接三王好生恰對發生時寬大恩流渙汗飛雷雨解成僵枿動蓼蕭詩就逺人歸天光地氣與年新不覺人間一物陳初令雷霆端有信舊餘霰雪敢無垠仙桃欲拂朝真臉禁柳忙催望幸眉不㑹君王春思别杏花菖葉在農時冰開御水龍鱗細日照宮梅麝炷烘欲看人間花灼灼不妨葛藟共春風誕敷文德金鈴振盡納熙河玉律諧御柳宮梅動春意朝來黃鳥亦喈喈玉殿重簾捲水晶椒花柏葉聖人清千春萬嵗承明主長聽雲韶歌管聲雪才盈尺雲隂解風不鳴條雨塊完春力急催冬事退君王寬政不恆寒君心與物為春久喚得春風破臘回天近自應通信息梅花不用犯寒來春色年年染御溝鴨頭輕緑弄花柔今年春到崑崙上九折委蛇舞翠蚪截肪初見昭華玉刀出昆吾寶籀開天助君王敷大喜安排春色探先來御溝梅柳寒猶噤芳草池塘暖尚微玉色怡融何事喜一年苔緑遍圜扉宮漏遲遲不受催出花光景漸徘徊萬方日日春臺上不道東風恰始來雕雲燎馥沉香暖綵勝風翩玉燕寒天上春光來咫尺瓊花瑶草遍䦨干瑣窗朱户無寒到長似春光日日來自是螽斯載風什可煩簫磬祀髙禖靧面桃花有意開光風轉蕙日徘徊昭陽天近知春早玉琯東風破雪來日射觚稜氣鬱葱露華猶冷玉芙蓉瑣窗朱户春光暖珠蘂瓊花無數重臘寒辟昜沉香火春意侵尋玉琯灰隂德承天專靜厚發生有助到根荄風來太液冰先泮日照延和柳未知翠輦不緣花事出行看荇帶緑參差某視田至福慶院唐向履道歸衢與之追路于此邑中學士成能師與劉知常汝明莫若師文咸用古士服肩籃輿從僕遊秋盡一日穀既登場郊行十五里間見牛背兒皆有厭雞黍色時近境稍有以穀不粒聞而天乃獨以穰穰滿家遺五邑民豈造物者哀令治亡狀姑用一飽蓋其慚面耶遂與諸君飲酒于翠屏軒煮茶于秀巘亭賦詩以相娛樂今日天寒霜下四山蒼然盧橘始花五人舉白相屬口不道人間事孰知僕乃沉埋簿領中人也欄干倚盡赤旃檀盧橘花開秀巘寒㑹取虛庵留客意小窗踈日上蒲團蔡天逸以詩寄梅詩至梅不至應念蕭寒槁木身殷勤分寄嶺頭春冰肌玉骨終安在賴有清詩為寫真罷官次常山寄鄭叔詳閒身已置參軍幘歸路仍推處士車石室散仙當醉起試傳消息過煙霞與鄭叔詳飲石橋山喜得青州好從事共登畢卓拍浮船雲煙已借一千日山鳥不須驚醉眠見戲案此題疑有脫字薄命何須問大來時時廢卷秖孤咍故園松竹空荒徑可勝淵明一賦催欲訪天柱山闍黎寄一絶句三年不到上人家目斷晨煙與暮霞急遣寄聲堂下水便來洗眼看天花琳老惠麩乾走筆奉寄何人彈鋏苦思魚食肉而飛亦任渠誰見東堂病居士山僧乞食亦分餘汲水禪靜琳老寄詩因次韻奉寄雲腳濤頭氣自寒了無閒夢到蒲團翠庵只在東堂裡底下揚眉直下看原注來詩云甌面乳花誰共看因以奉戲跋李伯時醉僧圖道人三昧一壺中筆下驚蛇怖小童日日松間好消息酒香先過野橋風訪琳老聞出赴供賔頭應供未還家聊借僧窗自㸃茶此意不須相見說已知秋色付蘋花别歸雲庵端老何年敗衲裹虛空雪雁煙鳬不受籠未信歸雲便端的一船明月四邊風寒食日過翠峯塔院示法海道人雲煙七級赤旃檀龍護金函佛骨寒問訊道人春到否瑞香花謝倚欄干原注塔院欄檻外植瑞香僕至已零落無幾子溫以詩將菊本見遺數日適病伏枕今少間戲作三絶句以報破煙涵雨得春叢想見當年老范公多病未須求茗草此詩渾欲愈頭風原注南人作菊茶以治頭風盡鋤芳草春應怪初種黃花秋未知花外種松松外竹漸無蝴蝶到東籬更作天隨求枸杞試從子美覓黃精但知一飽輕方文不為秋毫要眼明春曉東臯紛綺水潺潺翠拂官橋柳欲眠出谷黃鶯終好在辭風紅樹稍蕭然酴醿春曉與誰芳自是新來雨露香燕子覓巢終軟媚楊花滿路尚顛忙爐香燼冷夾衣寒雨過園林翠作團剩得風光何處著紅薔薇搭小欄干池塘緑淨了無塵造化裁餘十日春月樹清深語鶗鴂幾時歸去亦謾人二月二十八日禱雨龍湫折腰五斗自難堪每為斯人食不甘赤地黃埃迷澤國老龍飲血亦分甘過淨林杏花下微見曉色籃輿度水犯雲巢拂面垂楊翠欲交春睡穩人殊未覺半分曉色到花梢過吳淞江參軍身外秖圖書獨與吳江分不疏歸去他年當辟穀懶隨波浪覓鱸魚題琳老所攜二蘇書帖道人此書欲在眼扁舟一宿亦隨身霽月光風開玉軸千年髣佛見斯人和孫守回首長城臥落霞雲開桂影過昏鴉不須更要千紅翠醉眼燈前已亂花散藥過東湖戲作絶句寄陳巨中誰為蒼生起病癯參軍藥裹欲何如湖東道義為針石不用先生肘後書次韻王宣義見過夜飲四絶空琴誰為奏南風坐看幽香走篆紅定卜糟丘度餘日此生那復問蓍叢凄風落日酒家天何事囊中長一錢快見渴虹橫酒户歸須殘月上吟韉崔郎傲兀見孤羆筆勢縱橫欲發竒賦就何人知犬子杯深自喜對鵝兒肯為張卿貴作奴不嫌喚客手攜壺全勝一葉唯茶竈未負黃公賣酒壚靈芝觀上人房植紫竹一本覆屋其上以庇朝日顧雨露所不及也疑其當憔悴枯槁反蔚然徑秀為作一絶句階前紫玉似人長可怪龍孫久未驤第放煙梢出簷去此君初不畏風霜訪孟令不遇扶病尋君君未歸添香應惹踏門衣東風未破桃花萼雪壓餘英蝶亂飛常山孫令見過僕未起孫題壁而去作絶句寄之醉鄉冉冉夢游閒一夜凉風唤未還可是應門無稚子雙鳬仙去定誰攀門外初為羅雀地壁間偶見換鵝書忽然興盡何由揖擬遣長鬚致鯉魚夾道老槐分曉色出樓寒鼓報衙聲解牛敏手仍投暇夢蝶閒身尚未驚送茶宋大監鳳凰山畔雨前春玉骨雲腴絶可人寄與青雲欲仙客一甌相映兩無塵玉兔甌中霜月色照公問路廣寒宮絶勝自酌寒窗下睡減悲添愁事叢響潭水面平鋪映碧空夜深明月照龍宮猿啼未響潭先響一樹花開兩樹紅遊翠峯寺隔墻楊柳舞腰斜傍砌鵝梨玉作花此地風光誰管領小詩收入長官家案以上二詩從宋詩紀事采補晝寢石頤寺何人支枕古邯鄲孤卧僧房四面山故遣白雲遮谷口不教幽夢落人間按浙江通志增
