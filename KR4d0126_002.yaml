body:
  text: 東堂集巻二宋毛滂撰七言古詩十二月十二日雪晴成允蔡君扁舟携詩見臨次韻奉答蔡子下筆生濤瀾少時往往思湧泉便當自作五鳯樓畫楹刻桷皆蠻牋昨日千秋橋畔雪楊花蝴蝶相聫翩徑喚紅粧弄春色千壺快倒萬錦纒那知蔡子足踐地栁車送客已復延揺竿孤唱頗自得閉門髙卧初誰賢幸來餉子小樓日共㸔簷影移殘年東堂夜寒劔有氣北窻晝静琴無弦髙門懸薄固踈矣所憂餓虎猶須鞭齒揺目眵懶自薦豈復珠貝如懸編仙人玉樹儻相待只擬醉拍洪崖肩堯舜之事不足驚肯為兒女癡自憐故山鶴帳久不往白雲封户端應全吏卒無令守叔夜弟子何妨嘲孝先伯倫天地席幕爾何處六翮猶爭前平生小吏輕子美未害故人踈浩然子今風霰動短褐豈乏錦繡裁長篇東堂那記城旦語唯有詩律曽家傳墨香紙滑霜兔勁明牕妙意常空圓客來指似寜信此自知食蜜甜中邊李白於宣州謝朓樓餞别校書叔雲一首十二月初六日夜獨坐松齋懐抱良不佳飲少輙醉庭下梅兩株月色皎然倚樹㣲吟偶誦李白此詩有㑹予意者次其韻追和一首棄我去者昨日之日不可留醉我心者今日之日多煩憂秋風吹鴈渡汾水斜陽隨客下西樓苑邊麒麟守白骨半夜安能保明發小蠻為酌流霞春醉倚梅花滿懐月暗香吹逺月欲流松聲百尺喚清愁早掛銅章老槐下短蓑獨速上漁舟孫使君見招以不茹葷得醉因過南禪老飯小休庵中作此詩寄之城南病客食不足日與天隨爭把菊饑腸昨作細泉響豈識韭虀并豆粥五州自有定逺侯虎頭燕頷飛食肉門前麴封何足道酒出兵厨㵼春瀑康成温偉秀兩眉何啻五斛當一斛席中珍句出半酣但驚墨逕通羣玉不知清風静掃脾徒見秋電寒揺目相君脱粟好名爾何用留侯歸辟榖我今枯槁固其分尚有閒氣蟠空腹侯當下士屈體貎屢喚不來仍不逐羊臑魚尾癡不食却覔山僧煑寒蔌敢煩龎生要栗里欲謝楊公向䟽屬午庵聊拂偃月牀卧聼春飇過修竹秋雨杜門久之比晴一出前村歸聞陸令見過奉寄一首子桑閉門十日雨何人裹飯相勞苦忽窺晴色入踈簾徑向孤村尋老圃不知雙鳬念雲水欲下雀羅風送起未容倒屣見王孫豈是揚鎚嫚公子長安秋雨乃復來山隂夜雪仍空囘他時乘興幸告我請掃門前紅葉堆新酒熟奉懐曹使君水沙卧甕青綀羃浮蛆欲上真珠泣濛漫崑山清露零洗下雲腴和玉汁小槽决决秋泉語老盆艶艶春光濕不妨力飲薦寒英只憂秋老金膚澀先生何翅七不堪袍鞾裹縛肩骭急醉鄉禮法稍寛閒倒著接䍦猶許入南樓老子冰雪腸咳唾珠璣紛可拾未許王郎見短歌原注曹公自識面裁見三絶句已容趙壹唯長揖原注頃來歸未及謁而公折簡先至云第著帽進勿拘俗禮邇來鈴齋作禪觀錦瑟間多山玉立原注公昨日得簡云郡齋極岑寂寡味欲留一斗向呉興何日南樓和月吸立秋日破曉入山携枕簟睡於禪静庵中作詩一首西風初起無人鄉雲深萬籟含清商山容便與新秋凈稻花已作豐年香斷蟬抱栁咽殘月卧霞排霧通朝陽過橋寺影出踈木入户竹色來低墻蒲團紙帳兩寂寞獨有老檜磨風霜東堂老子喜睡人來借一榻樂未央含風漣漪開玉脊小屏晩緑横瀟湘夢寒支枕風入髪過眼冉冉茶烟蒼紅薇花隂煑玉醴滿甌飛雪置我旁平生世味總如水老大縱健肝膈凉翛然此意不可道卧看石竹凝孤芳出都寄二蘇滂去年冬去田里而西歴春度夏出闗已秋逆旅酸苦節物感人此詩書一時所遇之事以自見寄獻内翰舍人蘇公伏惟一覽幸甚近年好語開蹙額廊廟主人還稷契諸公彚進民所懐左必提之右乃挈善隨類舉皆可觀野無遺賢静巖穴石梁有客少讀書神接前人望風烈志與時違可奈何居賤好髙謀已拙此身悠悠日江海弔影行吟事酸噎揣摩胸臆作西游不成興起慚豪傑賈生慟哭初亦疑十年自覺流清血三書不用即山林將前復却何從决無因名姓累呉公咫尺天光阻羅列志士惜日誠可憐每恨平津當老節子雲年少行所為今出秦關獨疲苶郭門囓臂良感人仲卿蓄縮翻傷别叩關自鬻雖矜張掃門願見猶摧折炙手門前車馬多排肩屢進不得徹近來索米却求田結綬彈冠非所觖更令胸臆從誰開一刺懐歸定漫滅檻虎饑饞尾漫揺水盡海鯨當蟻垤誰能忍恥寄我顔妻笑嫂欺安用舌北山記憶破臘來逺水扁舟兩愁絶雲重山寒暝不開孤帆夜落嚴陵雪雷山老桐凍弦斷不作南風相煖熱一劔星昏共形影每恐龍寒呵古鐵孟甞無炭暖置身杜雖有指不得結可憐危肩聳及耳浩歌能復彌清冽呉山忽見梅花謝天助陽春生筆下近簷呵欠面發紅故絮賣錢不須借賣錢買船更欲西墻頭立燕留新泥新開湖南接淮水楚山翠入天低迷細風平日兩媚好嫩黄梢轉隋楊堤河名已清色未改减盡狂湍濁猶在東風正和水面穗恃頼夷猶百無殆欎欎葱葱見帝臺祥烟瑞霧真佳哉元都道士種桃手露浥風吹今總開山翠柔紅亦得色鬬妍意不相低徊遊蜂上下逐蝴蝶蜜脾未飽爭喧豗幽谷黄鸝出晴昊喬木㡬遷枝葉老避寒何處過雪霜依舊飛來語音好少年走馬紅塵道繡勒錦縁金絡腦窈窕花隨寳盌飛暝旋風吹玉山倒可憐窮巷無芳菲良辰不得開懐抱閉門曝背借餘暄猶得爬搔驅虱蚤逡廵迷目風沙顛已報新花去如掃乘離執衡又一時萬物從新炎帝造栁線漸長成畏日苦菜秀時蚯蚓出烟綃霧縠自直錢故葛綻聫遮肘膝凌人頒氷下霄漢誰信朱門自無汗蔗漿酪粉瑪瑙盤牙牀角簟光凌亂石梁孤客賃屋居坐恐炊中忽麋爛蚊虻噆膚俛聼爾何苦羣鳴恣喧玩生嫌蒿艾昏淚眥寧强摑撘酸吟腕墻隂壁隙又出蝎潜致小毒猶錐鑚巫師祝痛已復遭術非驅除真亦漫聼鷄起坐難飽眠庻寛煩促須清旦進不知名仍退却既來亦好歸不惡羲和鞭御向西行出門感此梧桐落淡月孤烟侵曉昏小雨凄風動㝠寞且欣編簡堪巻舒那知羞澀憂垂槖鐘鼓聲沉北斗髙白日漸逺傾葵藿楚歌忽斷隔黄蘆已見金山髙磊落須臾崩車天上行長幡亂舞喧簷鐸蒼穹白浪兩低昻黑蛟黄虬森噴薄開帆挿櫓六鼇驚男兒信命方自若呉音嘲哳來船近共憐逺客逃溝壑鳥勌知還羽翮垂修竹茂林欣有託故山茅屋良幽深清泉瀏瀏石鑿鑿蕨薇雖老芋栗甜拾穗行歌亦云樂買竿釣魚誰更哀貰酒滌噐人應謔士通五經取青紫請謝夏侯烏有此㨗徑須知自有塗枉誦陳編腐牙齒潼關坐息感二鳥耿耿此心聊復爾敢嗟與兄共槽櫪但苦酸醎異便美擬希鋸利効細黠天與鈍頑難力砥五斗充饑未有時却藏手板投耘耔曩聞下惠恬小官頗怪少游甘掾史曼倩俄驚備大臣李渤諌官呼不起古人去就良不同剛成亦足稱男子嗚呼乘時正阨窮悵望臨食空投匕豐山蒲牢鏗有聲霜氣感發非擊棰昌黎誘勵方循循廣文薫炙皆名士宋之善鳴挺有公願助下風脣口哆當時一到匠石前至今人或疑把梓大厦未完公勿忘可惜空山終朽死燒桐願獻太古音處囊請試從今始燭光有餘真可待無損公明公勿愛呈蔡内翰鄙夫十年江海客岸草汀鷗隨步屧稍收晩景付長竿河伯供魚慰彈鋏烟雲不鎻北闕心飛出亂山青萬疊束書却入國東門觚稜瑞日明書笈蹇驢破曉踏春泥誰家暖氣生牙頰門前賔客鄙可憐紛如寒蠶饑望葉主人㸔屋客看地士氣蕭條無一捻邇年恰得玉堂家名在執鞭猶煒燁玉堂丈人廊廟資寳帯垂魚光遶脅棣萼青春自一門璇題白日常三接側聞好士禮作羅纎鱗弱翮歸漁獵蹉跎嵗晚曳裾人半彫鬢緑仍隨牒澗溪幽菜儻可羞試雜萬錢聊一筴病中獨坐千秋橋畔桑麻村槐隂覆砌緑映門關門誰覔病居士掩書不讀愔不言明牕養石作幽伴蒼骨孤痩棲秋痕瀟湘洞庭入眼界念隨魚鳥蘆花根端知此想無是處聊遣幻變驅昏煩請言居士往少壯烹羊炰羔酒拍盆離騷百過亦徑醉萬事形影如空尊襄陽老孟識此意數憑楚些招其魂秖今流落口吻燥病乃乘間排吾閽病多諸念反衰冷念冷却覺丹田温此田不應供喜怒外物稂莠那可存誅稂去莠要及早俗慮可吐不可吞鷄犬相聞太古末居士中有五畝園舒遲不稱子男服要須結佩紉芳蓀友龍姪來别留詩次韻樵青煎茶青竹裏汝欲過門鵲先喜我家千里凌風駒豈比虺隤鞭不起我亦西游倦始歸久闊相望老白眉歸家且與阿戎語長吟未覺長康癡雨急烟寒波𣺌茫念汝束書辭故鄉歸時先驅煩蜀令却過竹間尋漫郎登聞鼔詩九重赤塗髙如天四海黔首紛於蝝衆蝝望天若無路區區有意常能宣乃知聼卑四聰逹萬里呻笑如郵傳朝陽門外登聞鼔鼓下章飛如急雨一聲直墮勾陳中誰言天門嚴九虎江南小吏無技能鼓間餬口何云補僕饑馬瘦曉徐行官曹下馬初無營解衣小睡須臾散鼓亦十日無一聲疑非官家設鼓意細問乃復知人情文昌相公眼如月坐見萬里分毫髪蒼生痛癢吾一身與汝一家無楚越有求徑投家丈人鼓面蛛塵寄蕭兀亦何道業冠臯䕫民得由之初不知平生胸中醫國法盡變黄馘為秀眉力進唐虞作元氣酲醲病酒何勞治端知聼訟破癥爾洞見五藏聊决之造化昇平唯一筆弼成堯舜垂衣日墨客詩人慕響來朱草嘉禾時一出登聞終日何所聞但聼清風頌聲溢江南小吏未歸山乞與居山相似閒半饑終未免索米飽飯亦復勝抱闗鼓稀有聲吏竊食媿此無用毛髪斑隋隄冩懐寄上右丞前年買符入函谷歸來柴車仍露宿似聞石室陳圗書敢累山公為題目蒼梧祗覺波浪髙尺澤那知鱗尾禿已將倦翮謝風雲便擬閒身寄松竹何庸復來良自嗤聊當爾耳誰能卜生長寒鄉非挾炭老去剛膓徒仰屋此日可惜那敢輕流年已徂無計逐淮山可人長好色隨潮入落裁瞬息隋堤官栁今許長前年雪裏曽相識尚有寒蜩抱殘葉晩風凄瑟真相逼斜陽更在柂樓明孤烟已轉榆灣黑濁流奔猛似欺人前去髙桅萬牛力但令寸進殊不惡行或止之那可測朝廷無階亦何往想見䕫龍在君側取士端須㧞十五除吏何妨論八百為郎二世疑有命自著一生能㡬屐定知此意不在多久從筆研安能擲太常掌故本下才未怪間闗難射䇿仲翁陸陸元先售却令小苑東門後人生有志將毋同異時善舞輸長袖此去誰家借蹇驢偪仄終看飯山瘦平生讀書過百紙本是烟波釣徒爾筆牀茶竈輕鼎鐘雨笠烟蓑傲朱紫如今却著從事衫猶喜無材堪鼓吏自從束帯對小兒久妨痛飲追名士㑹須出處今勇决進仍不合當休矣試來乞公五十犗投竿往覔任公子豈特區區守鮒鯢更與侯生向温水比得貍一枚所過輙馥然有香時時翳蘭叢下而引其鼻若能自擇其所處貍之族最多獨牛尾食之可口江西亦呼為玉面然彼以甘肥遭烹而此獨以能香為人所貴非衆貍可望也為作此詩一首春山得貍軀脅細蒼頭抱携香着袂叢蘭宻處曲庇身狐䑕何疑相睥睨定非青丘阿紫家恐是中臺飡栢裔太真妃子紫繡囊一生長伴瑞龍香石竹花開浴殿暖何時馨郁棲珠璫秖今弭耳空山内時下山腰出雲背弄香淺草已襲人試雜江蘺為君佩兒童手摩初不惡狐貍貎似安能輩糟中玉面甘人頥何食而肥蒸不悔東堂老子有香縁百和烟間囘盻睞相從真亦得所哉便呼銅鴨為爾配和郭倅見寄折節何須萬夫後蟹螯居左杯居右先生老醜誰使然天孫安能司唾嘔尚無一字得三縑何如賣之不龜手與公正自一家人公家日月余扄牖每得新詩如見公風流好在靈和栁題輿那聼仲舉辭宣室應懐賈生久當年竹馬定不乏舊雨墊巾無恙否我今信手任飜羮誰解苦心杯置肘㸔公雋翮當在前笑我勞驅空晚朽東山掩鼻直可人庸肯囁嚅論不偶檻中揺尾未必然試㸔於莵薄欄吼次韻奉酬蔡成允蔡子詩鋒新發硎曉壓吾境横長城玉闗食肉何足計飯山日午吟膚清叩門念子憂吻燥銀瓶急燎蒼蠅聲雲龍為子起風腋要使飛將身趫輕原注秦系與劉長卿善以詩相贈答權徳輿云長卿自以為五言長城秦系以偏師攻之今成允以詩雄於呉興者也僕今日方與客煎大龍團成允適至遂共啜之對雪作詩未竟曹使君寄聲招飲因成篇以寄東風欲辭閶闔殿未向百花枝上見先拂瑶臺玉蘂叢聫翩時落玲瓏片水晶宫中清曉寒蝴蝶窺簾輕瞑旋素光冷逼翠雲裘元氷暗結青光研詩成玉屑帯氷書興隨月繞清溪徧兔園老筆生陽春墨葩不待㣲和扇明朝當見郢中吟雕樽快覆鵝黄面劉秀才明仲當赴禮部試從縣令毛某乞詩聊作一首君不見廣文博士老鄭䖍才名四十寒無氊又不見漢陽計吏趙明叔文章不如一囊錢胷中道腴五味足外雖枯槁中芳鮮不妨止有書一束索米未肯侏儒賢平生固用筆耕爾行發墨頴收豐年㑹當少見㑹稽綬勿嗟已賣瑯琊田次韻曹子方對雪以詩見招觀燈栁外東風旗影轉身逺鳴珂心想見碧瓦朱樓不夜城走馬挿花春一片錦靴玉帯簇金鞍囘雪驚鴻都轉旋我書細字對短檠油盡燈昏月窺研那知研節有七盤但課舊書須百徧病骨煩招媿後車新詩乞與書團扇明年相望隠侯鄉猶共碧霄端正面對巖桂一首寄曹使君玉階桂影秋綽約天風為捲浮雲幕嬋娟醉眠水晶殿老蟾不守餘花落蒼巖忽生雲月裔仙芬凄冷真珠萼娟娟石畔為誰妍香露著人清入膜夜深碎月寒相就酴醿却作傷春瘦弄雪仙人淡紵衣烟裙不著鴛鴦繡眼中寒香同誰惜冷吟徑召梅花魄小蠻為洗玻瓈船晩來秋甕葡萄碧久客平生故人同偪仄近者不見雲泥隔男兒命好百不憂封侯起第如戯劇我癡正亦坐命窮眼暗頭童守書䇿風吹破屋雪入懐獨與蝸牛夜爭席舊雨人來今不來唯有五窮充上客人生覊旅誰過我欲歸豈惜還鄉幘腹中鬱勃不耐事何用使人輕跛瘠登山未厭日月流掩闗但恐功名廹讀書豈從升斗計勞生却為精神惜不能與君爭上車主人未必如車澤但煩東風送帆脚揺竿鼓枻三江碧僕性懶慢喜睡而吏事亦早休因得遂其欲琳老數語僕曰當屈伸步趨以散欎滯乃以詩送白术或云餌术能長生絶榖致神仙茍未至尚能耐寒暑其骨健輕難老儻然則僕異時芒屨布裘步尋此老於徑山之上爾先生曉開城旦書坐與老農相囁嚅槐隂翠圓吏已散歸來下簾手撚鬚胸中百紙無處使静㸔窮逹如呼盧身閒睡飽亦不惡何用一躍驚駘駑去年鑿池築潛玉清夜明月掛碧蘆先生獨吟亦徑醉誰見露鶴寒相呼徑山老人笑踈懶云當運動如户樞朝來此老意不已溪寺破雨遺天蘇原注术一名天蘇紫房鴈觜擢烟縷細根蚯蚓蟠苔膚茯苓雖老避芳液原注陶隠居賚术煎啓曰芳踰玉液團參已貴慙雲珠原注庾肩吾啟曰競爽雲珠爭竒氷玉先生領意手自植衣袂馥馥侵蘼蕪原注香草也古人以藏衣中從今抱甕十日往欲將後健酬前劬何時一飽翳鳯凰緱山月夜聼笙竽長吟往覔五色麟翩然那復煩雙鳬坐看白駒變古今浮漚流電皆須臾此語險怪儻未然引年聊與昌陽俱不須仙人九節杖他年要與猱爭途凌霄峯頭覔此老登山過水安用扶陪曹使君飲郭别乘舍夜歸奉寄金波灔灔棃花玉原注是夜飲噐春色兩枝嬌映肉原注當筵見牡丹兩枝夜堂鸎燕落梁塵秋簾風露昏銀燭勌客歸來半白頭舊約參差兩黄菊新年斗酒亦徑醉道舊驩然能五六御史家兒反温克風前玉樹何由俗上客凛凛八尺身秀在兩眉詩在腹醒狂司𨽻醉奈何猛雨瀾飜無軟熱不嫌呼酒反勸君要看春空雲郁郁原注時主數强人酒明朝寧辭一日病清時未可三閭獨倒冠落佩郭南門長庚晱晱山簇簇囘頭一笑墮𣺌茫卧聼桐魚喚僧粥曹使君置酒石橋山用肉字韻作詩見招不果往復用前韻奉寄玻璃瓶中新壓玉趨膾腥脣脯麟肉紫絲步障破烟霏飴鼎灼炊千蠟燭山英餼公却薄相木蘭墜露和秋菊此公骨秀氣欲仙石室名深三十六端知仁祖有勝致豈比彦倫徙雋俗速收熊軾屏旌牙細步雲梯上巖腹局畔雖無斧柯爛林間恐有蟠桃熟素書自愧無因縁蕙路難陪踏芬郁南山食蕨得我専東山擕妓唯公獨他年丘壑定參差小留莫遣歸心簇相對行厨洗玉盤松花自煑顔家粥謝人分寄宻雲大小團宻雲不雨西郊黑小龍蜿蜒出朝夕原注池名中有濯枝三日霖可洗流金千里赤大龍雨足意貎閒萬里澤流纔一息無心自為百榖仰變化風雲聊戯劇一杯洗心未足言㸔瀁滄溟太空濕大月已圓當久照小月未滿哉生魄雨龍出此雲月間背負青天擁霄碧豈惟大旱有雲霓解作豐年雪花白黄綾袋子天上來本是閩山早春色金盤珠露猶浥封瓊房玉芝記相識朱門日上三槐梢大官初頒萬錢食松風忽響第一泉乳花徐開練波立我公胷中氷雪明不受一塵乘間入寧煩多飲氣自清乞餘賤客猶能及此客覊賤亦喜茶老葉唯知煎若澀藜羮粟飯每稱是九天雲腴詎應得舊聞作匙用黄金擊拂要須金有力家貧㸃茶秪匕筯可是鬬茶還鬬墨東歸得此希世珍真同被褐而懐璧筆牀茶竈下三江欲寄殘年向泉石砂缾煑湯青竹林㑹有玉川來作客東風辭原注代人作生日凍雲不凝層氷活阿香推車上空闊龍蛇夢驚鱗甲暖霰雪影斷清光奪玉帝手持發生機馳召東風俾廻斡東風駕言正月頭先驅持律吹九州勞苦萬物抱憔悴嘘呵太和如汗流草根暖回土膏動僵冷盡起寒威收習習熈熈逺相屬原隰龍鱗吹小緑韶光漸深人不知但見新新自相續珠璣零露日繽紛要助東風力作春向使不來慰枯槁正應合抱皆樵薪眼明初破𤣥冥黑咄嗟萬物囘顔色何但桃李著榮華未遺兔葵并燕麥萬物之命懸東風誰云蘭臺敢爭雄披襟受之不容易羣公不有歸我公我公人英國尚父代天與天通肺腑䕫龍土苴直唾棄有作自令物鼓舞為時生公豈非天身任重大寧偶然氣壓千官山不動徳行四海春無邊東風功成看萬彚雨露涵濡寧惜費我公經綸亦如春惠養元元作元氣萬口祝公如一辭願公顔朱髪常黟那知東風共無邊年年㑹與青春期上曽樞宻燕齊日暮客不歸新豐主人豈相知不須買絲繡平原不用黄金鑄子期㑹當酸鹹有同好主簿且須歸祭竈請見臨川太尉公此語難為俗人道我公悦士甘如肉萬錢供客飯脱粟讀書始堪屬大事誰論少文織薄曲眼㸔齊相不六尺太史猶忻事鞭䇿胷中端正在眸子巖電兩瞳秋漢碧致君堯舜不足驚升平本付公輩人西郊濃雲含雨色可勝枯槁懐陽春門前賔客馬如蟻誰是我公天下士趦趄欲進仍厚顔紛紛無乃遼東豕蹇驢破帽棲塵坌曳裾最晩空餘恨草奏猶堪試傔人無令歸作潛夫論元度生日臨安有山挿圓紫公家松楸當峻峙子胥濤江相向流秦望横前為案几衆言北山絶雄勝世當公相貴莫比那知上帝賚良弼嶽靈孕秀初萌此有山如是固有人兹雖人為亦天理公生尚少抱經綸前無䕫龍何獨似胷中五經通聖人筆端三代尊天子富貴相尋蚤厭餘功名自㑹非所喜惟天五福不可求與公俱生亦久矣生日壽公寧免俗强復囁嚅空可鄙矧我何物可厚公世味都如一杯水古人白髪痛掃除强飯黄精力能爾公飡道腴睟在面何待草木堅髪齒願公廊廟等山林安樂百年無此彼非公自壽盖壽人坐㸔同老陶唐氏端如八柱屹青蒼共承峻極何時已隋堤採蕈老夫少時性豪侈頗復慨想諸公子家徒四壁不自憐客來笑呼客且止牧羊幸得時擊鮮種秫足救缾罍恥萍虀豆粥何足數紅粱雀黍屢登七老來百呼無一諾空瓢但酌三江水侍祠何功費太倉月賜萬錢良過矣秋採菊英春採薺嵗月無憂三百指西湖兩年相慰藉東風為長蓴絲紫年來吏滿官有程退無可耕那得已曉猿夜鶴謝游從筆牀茶竈供行李異時浮家淮海上魚鰕舟量賤無比白魚截玉數尺長本不論錢數魴鯉祇今寸鱗乃許價無魚自應相貴爾謂當此行且空飯彈鋏而歌遶淮市誰知一飽不足慮造物尚得相料理榆堤雨潤風力和老楊出菌鶵駢觜輪囷長芽長雲葉磊落小叢攅玉蘂呼兒採掇歸自烹不遣辛酸亂清美五芝風味均茵憑八珍品目當奴婢不貪俎豆逐駑馬肯同腥羶怒螻蟻君看五鼎或殺身未如老楊饑足恃後逢枯朽慎勿薪太和蒸之有如此早春女夷爭名亦早計凌寒破臘囘春意不待梅花送消息細風平日先妍媚野塘氷魚翻暖緑官橋烟栁揺寒翠佳人青鬢耐時節彩幡初貼宜春字唯有朱顔不我留嵗月翩翩定容易栁車載窮安肯行若華翳日何當試憶昨狂心逐蝴蝶踏月追春藉花睡如今佩犢老東岡杏花菖葉催田事眼看風光搔白頭斜陽抱來空多思師文莫君以詩從僕求字顧非所長聊作一篇姑慰其厚意而已廣文無氊風撼頰凍坐慈恩書柿葉乞米珍題矯龍鳯望粥嬌兒鬧鵝鴨不須歐家管城子鏤象雕犀作袍帢娥眉曼睩初丰容一笑自粲非寳靨當時臨池亦苦矣烟蒼雨暗漫襟袷㡬何白骨變黄泥安用玉軸留華篋要當約略記姓名作底碑傍坐疲苶我今姓名亦懶記几硯塵埃卧羊鬛君詩求字得我驚索金懸磬真所乏歸田當賦覔桃詩豈有來禽青李帖上湖守余行老先生吟文煩頰舌未免諸生笑於列䟦前㚄後誰使然只有名多磨不滅燕公䇿髙思精壯筆下辭華爛文纈岳陽少屈何足云自喜江山助清絶墨畦筆逕久榛蕪道山初識今文伯鳯凰池畔未歸身水晶宫裏重遊客讀書不知已㡬世汲古長餘綆千尺莫貪雲水供醉吟尚有典章須粉澤防風山前癡病吏自笑著書𤣥尚白蓬頭承甖十年事過眼法書今霧隔那知流落得依慿天與虺隤寛轡䇿汀洲白蘋春㡬許江南日落汀洲古風光無恙似當時猶與溪山相媚嫵昔人苦吟終不盡秪今餘秀當勤取阿房賦客舊主人試數文章猶第五題雷峯塔南山小景錢塘門外西湖西萬松深處古招提孤塔昻昻據要㑹湖光灔灔明巖扉道人安禪日卓午寺外湖船沸簫鼓静者習静厭紛喧游者趨歡窮旦暮非喧非寂彼何人孤山詩朋良獨清世間名利不到耳長與梅花作主盟嗟我於此無一得曽向峯前留行跡天涯暮景盍歸來坐對此圖三太息寄程漕風流三老今無有明珠雙璧公其後長安初見紫微人山陽途識生風手同時蜀秀共差遲今日呉餓付忠厚呉餓欲飽談笑了要使嘉禾出稂莠紫薇賔客多雲霄誰數諸侯牛馬走黄金單盡㑹屠龍白髪鬅鬙成畫狗絳衣玉具無處覔將軍縱在大夫取公歸願作水衡丞敢厭督郵辭五斗寄曹使君幕中墨客隨車後架上牙籖遮坐右唯留筆研乃自鐍豈惜車茵容吏嘔青霞老去雲海深舊遊尚見飜濤手寄聲秀句風入懐坐念清標月當牖天公厚我過穆生何止饜韓仍飫栁請同韶濩公勿疑老馬由來識途久近縁嗜酒識聖賢已付長酣無可否公當紫綬日垂腰我已秃襟時見肘慕公澄撓等清濁歎我雕汚終糞朽詩從子建豈易親句語懐英那肯偶清風自已入公脾我如惡木何勞吼
