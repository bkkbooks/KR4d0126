body:
  text: 東堂集卷六宋毛滂撰書謝舉主彭提刑書某昔者聞之執事薦某為職官撫心獨驚赧然汗發夫京西數十州之地吏之有才能者正應不少而執事薦章固亦有限一二年間題目將有所未盡今不以急賢為務亦何取於某不敏也某讀書至惟帝其難之知人則哲論語至舉爾所知爾所不知人其舍諸竊悲夫才之難人之不易知也舉者誠未必知之知之者又未必能舉也嗟乎公議日替矣薦舉之事蓋已收為私恩人之所私者寧復計其才不才耶當今監司至於郡守皆得以吏之能否言於朝而黜陟之其間以類相求者豈盡可觀耶况一日奪於權勢移於故舊乎此有識自好之士咸重於去就也今權門懷書上謁之人以奴自居有所挾持而來卒為門生座主上下無復分辨亦可醜也孟子謂觀逺臣者以其所主觀近臣者以其所為主孔子曰君子難進而易退則進退自不可茍前人有言貴視其所舉富視其所與貧視其所取此相擇之道也今天下薦舉之路廓然朝廷求賢如不及某亦私怪得人為未盛十室之邑必有忠信也意其主黜陟者未盡無過耳某不敏於事無他技能為夀張尉一年雖同僚皆落寞相視未嘗許為識字人望姓名掛部使者之齒牙不其難哉又朴野自信不能戴不肖之容搖尾乞憐於人又非有才名賢行可以取大人君子之知蓋亦見踈而難合也平日非公事則閉門讀書困睡渴飲甘以沒沒薦舉之路絶望久矣不意執事提撕收拾欲使出於泥滓沈埋之中不知感激之發矣雖然出於伯樂之廏者必良馬藏於卞和之櫝者必美玉游於大人君子之門者必卓犖瓌竒之士如某者朴遬不足數馬之駑駘玉之碔砆爾此大人君子雖排逐而棄之可也伏惟執事以文章名天下第一而開懷好士不以富貴自大然惟其善故能舉其類此某所不宜出門下也或者商榷人物將拔十得五則某也幸置於取舍之間郢之僻陋士之才可以有為者不至吏安於因循茍簡上下之習以為便某月得俸十二千祿粟三石自念不敢茍飽待去以故忘其拙踈慨然欲將區區有為於百里之地而羣嘲衆罵去有餘嫌執事且薦以居官為能竊怪執事何所聞而得此言也某少年時狂狷好功名不量才謂富貴可俯拾以得今方守死苫凷日惟病憂志氣雕落無復聊賴矣所謂雖對一美衣遇一盛饌尚當泣想風樹悲思無窮而某顧有他望哉先人弊廬藏書數千卷聖賢具在杜門謝客聊以永日所謂富貴貧賤一切付之造物矣願執事勿求某以必取富貴為門下之報求某以讀書自勉期於少過不為知巳之辱以畢其身為善人此某素期不負於執事者如此執事以為如何上陸侍郎書學道如食羮酸鹹當自知不可以語不食人作文如時世粧妍醜不求其質而惟粧之求此未足以識其真雖然道不以文傳將孰傳之傳道者特未嘗有意於文耳及乎成文正自善也顧如食羮然亦當食者知味也某結髮從學二十年間見為東家丘之言者且多變矣頃時細字厚冊豐碑大版出一時文章爛然滿目某雖未果曉會然見觀者皆有不可企及之色相視慨曰文不當如是乎異時老書生新用亦各立標裁學者覽其筆勢又曰為文正用如此某於是乎疑焉道果在兹乎不在兹乎將作者無意於明道而學者惟文是求乎昔秦伯嫁其女於晉公子文衣之媵七十人至晉晉人愛其媵而賤其女此可謂嫁妾未可謂善嫁女也學者將以明道道未明而文以蓋之此秦伯嫁女之謂也伏惟某官沈酣六經穿穴百家吐道為言須㬰成之此天下學者所共仰而不以時所用舍為去就也某願朝聞道而夕死之人爾不願以文章鉛華自媚於世然少而學之老不覺悟閣下頗哀其志幸分一杯羮使知酸鹹且洗其粧而出其質然後庶幾是非乃定嗟乎身逺地寒何足有犬馬之報於門牆下徒區區抱此心而已上蘇內翰書內翰先生閣下飢者甘食渴者甘飲是未得飲食之正飢渴害之也今之學類於是某請試為先生言之夫學亦不一也蓋有樂其實者有好其名者有學以為道者有學以為利者利而後學則亦無所不至矣人莫不飲食鮮能知味為其以飢渴害之則何以異乎利之害於學故凡可以釣爵位而不失於利之所在者雖之楊之墨之佛之老皆為可學是猶凡可以飽滿於飢渴者皆為可以飲食本朝以文章聳動搢紳之伍者天下最知有歐陽文忠公中間先生父子兄弟懷才抱道吐秀發竒又相鳴於翰墨之囿如長江大河浩無畔岸崇嵓峭壁萬仞崛起此天下所以目駭耳回而披靡於下風也為兒童者記誦先生之言能論撰者盜竊先生之意視先生以為規矩繩墨未有以方圓曲直逃者也熙寧間作新斯文而丞相以經術文章為一代之儒宗天下始知有王氏學灝灝乎其猶海也其執經下座摳衣受業者如百川歸之海於是百家之言陳弊腐爛學士大夫見必嘔而唾之嗚呼一旦取覆醬瓿矣當時歷金門上玉堂紆青拖紫朱丹其轂者一出王氏之學而已先生以為彼真有以知王氏乎其心誠樂其所學而好之乎不二十年間天子出丞相不用也其議論益雕落而文亦就弊矣主上新即位諸公以耆舊得召合於朝廷間其老儒宿學平日宛舌同聲而湮鬱不快者一旦開其約結順風而疾呼應者蓋已如響而王氏之學又將覆醬瓿矣先生以為學士大夫今日從先生游者為誰何是皆前日規矩繩墨於先生者也然王氏之說殆亦滿其腹中蓋亦中間叛先生而去者耳自先生兄弟入朝某由二浙歷淮泗至於京師有服儒衣冠者某必問之今公卿大夫以經術文章進者誰為能必曰不出先生兄弟宜誰師必曰宜師先生兄弟先生以為彼真有以知先生乎其心誠樂先生之所學而好之乎先生之名滿天下雖漁樵之人里巷之兒童馬醫厮役之徒深山窮谷之妾婦莫不能道也是天下所共知也某以為其人之所以真知先生者非天下所共知也王氏之學固未必人人知而好之蓋將以為進取之階宫室之奉妻孥之養餔啜之具耳此某所以病今之學者為利蓋如此而已矣某少知讀書頑然朴魯聞道甚淺然其所學則周公仲尼之道非進取之道也古人今人前輩後輩某不知孰重孰輕從其是者而已伏惟內翰先生道德根於心華於文章實於事業其已著見者四方之人所能共談其深而未發者純乎淵然某又安足識其一二而稱頌之某行槖甚貧特所載經史足用幸不乏先生之文每一發帙其經於目如文繡歷於耳如鐘鼓誦於口如膏粱知其如是之美也終未足以知其所以為美故將學視於離婁學聽於師曠學味於易牙然後可以盡知先生之言如文繡如鐘鼓如膏粱之美然三人者不可得而見則將何以盡知先生之言乎先生亦將坐觀其聾瞽不靈而蒙於衆人乎又豈哀其心勤志篤將提其耳刮其目礪其齒使踈暢廓達其聰明而昭然有得於先生者大異於衆人則先生亦何愧於孟子之三樂謹獻雜詩文一編惟先生哀其意而幸教之再答蘇子瞻書仲夏毒熱伏惟內翰先生台候起居萬福昨晚得所賜台翰伏讀百過輝光之密溫其儼然如在眉睫念假借過情識者疑而不服韓文公以文章自振一代觀諸權門豪士如僕𨽻焉瞪然不顧而頗能誘厲後進先生豈所謂欲誘而致於是歟孤衷佩服厚賜愧慚汗發人有過龍首之山獲堅白溫潤之石碌碌然異於尋常之石也自疑為連城垂棘之寶出之里巷之愚人方且與惑焉更求玉工相之夫然後玉石辨矣為玉工而要必能知玉顧豈易得哉此楚王時非無當其名者而卞和卒以兩足異處泣盡繼之以血也某向學孤陋頗復荒落於憂患間今儒宗文師磊落相望而某三千里懷其所得陳腐無味之言徑獻先生之門者不可謂之無意也以故自比於龍首山得石之人期先生為深知玉者今先生將掩口胡盧而笑之則某以為石將教以華篋十重緹巾十襲而珍藏之得五城之都而後許其一觀則某以為玉其信於先生者坦然不疑如此亦將曉其無意以未辨難分之石欲遽張皇於夜光之側也先生教曰品目髙下蓋付之衆口某竊惑之西漢時有揚子雲聖人之徒後世學孔子者蓋嘗想見其人於千載然當時深知子雲者不過侯芭桓談輩二三子耳則其道理純疵品目髙下果不在衆口伯牙失鍾子期至於絶絃破琴騏驥之馬伯樂回目而顧然後知其為超逺之足則琴之妙音不在衆耳馬之駿骨不在衆目為甚明矣某也不敏其未巳之學他日之能否請今日從先生而定某又嘗讀傳記見古人相汲引之事頗不一於此亦不能無疑欲終言之則近於屑屑急人之知以故不敢復一二數也先生之居燕息游閒之處樹石茂密之間當有鮒鯢蝦蛭邂逅於泠然之池先生策杖閒暇注目逍遙遂小物之適以起逺思必擘粒引泉覆以薀藻蒲荇觀其浮沈洋洋自足於杯勺之微而心恱之尚宜知有橫海之鱣吞舟之鯨跬步而絶於天池七澤之陸幸而至於水必能作飄風之淜湃卷飛雲之蔚薈鼓鬛奮鬐於浮天浴日之浪變化一息回復萬里也今泥沙敗其鱗鬛螻蟻集其背腹其已涸之沫又不足以自濡有人力能行舟於陸者偶當其前魚不能人言猶頭掉尾頓冀其人一出行舟之力而致於水乃姑睥睨而過之曰非渤澥之濤滄溟之波無能活此豫何能為豫何能為殊不知有行舟之力為可以必致於滄溟渤澥間而活之也當是時欲要策杖注目之顧希擘粒引泉之惠以夷猶於蕰藻蒲荇間曾不如池中物區區此言惟某之狂愚不知習人事者能發惟天下士夫所責望如先生者可聞此言附蘇軾薦狀翰林學士朝奉郎知制誥兼侍讀臣蘇軾右臣伏覩新授饒州司法參軍毛滂文詞雅健有超世之韻氣節端厲無徇人之意及臣嘗見其所作文論騷詞與聞其議論皆於時可用今保舉堪充文章典麗可備著述科如蒙朝廷擢用後不如所舉甘伏朝典不辭謹録奏上傅侍郎求志文書某竊謂唐之諸儒以能文名而直筆確論信後世以不疑者孰如韓退之退之銘人之墓五十八非盡達官貴人也書其善而已張圎一法曹掾爾無甚過人事其死也妻俾奴抱嬰兒從退之乞銘遂得銘此君子樂道人之善故舊不遺如此其盛也某罪孽餘日不早從先人於地下今墓草七變霜露矣而遺烈未傳往者走京師求閣下一言以表於世蓋嘗面可既已多歷年所數奉書輒不報某適擕諸孤之江南求升斗以活絡以簡書如首羈銜欲復至門下不可得也痛念金陵之舊謦咳可記而翰墨未乾賢者所為必表裏今昨當使人無少可疑者則前日之厚人也豈至於今而卒薄哉韓退之與人交榮悴不移非獨退之如此古賢人正如此爾某平日所知傅公為天下賢者可以義相責望今而求滿所欲者不過如此此亦閣下平日所不吝者某雖貧賤不如人顧且效嬰兒之請知閣下未有以絶之也伏惟閣下朝廷夙望天下至公退無悶容進無矜色方坐廟堂陪國論海隅之人瘠欲得肥凍欲得溫固必有以應其求况一濡筆書人之善以寵故人之魂何靳而重不與也栁公權以書自名當時公卿大臣碑版不得公權手筆人以為不孝况其言賢於公權之筆者耶閣下立孝治之朝以忠厚自將必以此道覺斯民肯使某因之有不孝之名哉情意哀迫干冒台嚴卑情不勝悲懼之至與曹司勳書昨匆匆草答未盡愚衷某騃滯不涉經學不工詞章然天與所能獨在識文字之形狀一見輒知其妍陋此譬之善觀畫者手未必能畫也每以自信如此故於士大夫間聞其言往往欲敬而反生嫚心前日乞亡妻之銘於左右初亦疑其非分所當得將往而不出者數四既而念之古今惟文墨事不可妄以屬人某不幸天與此能使得詆訶於諸儒之間以取嫌罵蓋紛紛矣然彼殊不知蕪惡之敗人意惟恐所見不妍也如遭臭必掩鼻至得芬馨則奮袖張懷而招之獨患其不來爾以故某之於公既自忘其賤又忘公之貴惟文之妍是貪乃徑欲奮袖而招之攘而納之懷也不知乃有犯分之戾公觀盜欲取金玉必入富人之室雖髙其垣墉嚴其守備韓盧欲搏枹鼓屢驚猶當徑前不顧而繩樞草舍懸磬之室其入雖良易顧何所得哉今公雖深閉牢拒攝緘縢固扃鐍而某之為盜心固已有定計矣儻公以某不肖修已之不亮名譽之不立又妻子素賤不宜得髙文或者以師帥之尊不應私其民而與之周旋則非某所知也過此則何嫌之深耶某甚貧先人有不腆之田不足以給饘粥是豈有栁子厚論王參元之嫌哉韓退之銘人之墓五十八豈皆退之自喜為之銘者耶將不能靳巳之所能拒人之善意爾張圎死妻俾奴抱嬰兒乞銘遂得銘公學退之者也某且效嬰兒之請公忍絶之乎欲詣門下昨夜忽傷風不能出又口不能略盡梗概謹遣人奉書左右必冀哀之答汪發秀才書汪君足下僕用子弟入官天資椎陋不自敢與進士齒然又竊好此名頗願學焉每取其文章讀之百過反悶然不樂因不得窺其淺深故僕所學了無用於時為諸儒非笑足下乃幸臨之又辱書見譽此豈陽浮好言將反暴其短於學士大夫耶雖然亦異矣僕頃三四見足下文章初甚喜久復為足下不快何哉不幸以僕能識之爾僕能識之則獨於古可用足下方進取不求用於今而求於古非計之得也愛惜足下美才日冀相見講去此病今反惠然見訪繆欲益求僕文觀之此欲引年而進豨苓知足下未有以却老也文章細事爾無補於世之治亂無增損於人之賢不肖有天下者専用此求人材悲夫非先王之意也足下茍欲拾科第馳聲譽則進士之學激昂有餘矣茍思退欲善身進欲澤民則先王之言具在亦更思其意而已文章真細事哉二事皆非僕所有甚懼無以報足下然講學之間儻欲寄心目舒心意僕有玩好之言如古鐘篆鼎可賞而不可用當為足下羅列於座隅矣區區惟幸察上監司書原注為響應龍求爵號某竊謂上之愛民甚於慈母之念子凡可以免其子於疾病飢寒者無不為四方萬里上不可以自擕拊其民也故屬於吏必曰寒者裘飢者粥暍者扇敗羣者去之其治無狀不能如上意而民乃無聊則部使者察之言於上曰可逐今日言明日逐矣茍幸稱職百姓安於田里有以活妻子養夀命則部使者又察其所以然當深言屢言不一言而止則上之爵將無所愛惜然上屬部使者亦當不問其長者家兒不知其寒微逺裔亦曰賢不肖之辨吾職當如是爾且吏廪於上廬於上厮役於上茍稱上使令則責報於上又即無厭今武康縣響應山碧玉潭有龍焉能為上出雨暘風雷變化五穀收飢致豐破厲導和所以惠寧斯人甚厚而於上非有廪廬厮役之思也亦適當幽澗寒谷僻陋岨深之地雖載圖牒世莫知之獨山僧野人脫粟寒漿往相敬戴爾某縣令也以旱潦故數為其民以請雖賴以濟千萬人之命然身賤言輕不能為言於朝廷使潛德久鬱幽光永閉可為歎息伏惟部使者任刺舉職為上憂民之疾病寒飢當亦如慈母念其子今龍於民有厚德不止於裘寒粥餒扇暍而已呼吸隂陽開閉日月實豐凶所歸宿而民命所依憑又在使者所部其賢於能吏不翅十倍獨坐沈沒幽澗寒谷之間其勢不得逞而衆目亦以此易之此不可不察而有言也且祭法德施於民則祀之以死勤事以勞定國能禦大災能捍大患則祀之亦何庸必取名山大川乎所謂刺舉吏之賢不肖亦何知其地勢族望或髙且寒顧治狀如何爾嗟乎某所過郡縣田野間見祠宫峻奐者甚衆詰其神則無名氏在人口耳然簫鼓牛酒日至其庭不絶也問之則曰曩窘雨而得霽望雲而下澤蓋謁水旱者有適與雨𤾉相值遂邂逅滿欲雖他日復禱則不能更得然人既已神之矣異時竊號為寵素餐不靈徒土木塊然之質彼烏有羞愧之心寧得以義理相責望耶豈如此潭之龍無響不答哉凡興雨者龍之職龍既不失職矣而所托潭山又名響應而能應之如響是豈惟不愧其職亦不羞其地矣與竊號而食冒華屋而居淫昏不靈謬托人上者甚異惜其所依隘所施約爾異時辭湫潭謝魚蝦顧眄層雲掀舞百川蜿蜒萬里則其施豈不大且廣乎然是山秀拔蒼潤而竒石虎踞老樹虯矯枕清泠之淵附孤絶之岸而暮煙朝霞自相映發如欲俯而照其影如將下而濯其趾正是人間佳處四顧亂山乍髙乍低皆黃茅白葦嶮頑闒茸雖上矗霄半徒纍土耳未可與是山爭勝也則龍之居雖約蓋已善擇其所處矣某屬者祭畢徘徊潭上頗有所感不覺狂言之發惟閣下以主上憂人之心為先又以刺舉自任為一言於朝意上亦何愛封爵之虛名耶猶惓惓於人如許使知朝廷有尊寵意當不陸陸如土木偶塊然竊食而已將有儉嵗不入吾境而武康世世不識飢色閣下之賜邑人不甚溥與上監司乞修縣學書天下事有可恨者二古以為是而今以為非法以為不可而人以為可何則夫子論次詩書修起禮樂以素王之功充塞天地其道蓋與王化相為終始故自三代皆有學官自非焚詩書坑學士學不可廢也周魯侯歌於詩人蜀文翁贊於太史范武子鍾離意之徒或至用私錢作廟史臣書之以為美談朝廷廣厲學官之路詔刺史縣令嵗時祀孔子如典禮一州雖數縣縣必有學宫此豈特謹杞事而已哉鄉之秀民服方領習矩步委蛇乎其中學先王之言以待上聞養君子器直須時用爾雖一畝之地而禮樂法度自此而出使人識君臣父子之綱家知違邪歸正之路嗚呼盛哉不可以有加矣然郡守縣令為治無所用學者亦衆其陊桷蠧楹或仆於風雨頺垣斷甃半沒於蒿萊者相望至或取以為逆旅舍者有之幸而書生弟子有懷先王之厚德發憤於禮文殘缺之地將作而存之則執法之吏痛繩以文世且指為罪人矣此所謂古以為是而今以為非是也且浮圖氏特天竺之教爾今其長廊深殿繡栭綺疏極土木之麗以困民力又鬼神之祠旁午於天下皆耽耽髙堂金碧照映為之無益於國無補於民肆為之而執法者未嘗以為言天下未有以此獲罪者此所謂法以為不可而人以為可也今庠序榛蕪而過者不顧佛廬有一傾撓則左右睥睨咨嗟歎息若將下而壓已焉嗟乎使浮圖巫祝自為此可也使市井小人為此可也使富人大賈無知之人為此可也今公卿大夫往往為之恬不為怪矣此幾何不役使於淫昏之鬼乎班孟堅云夫移風昜俗使天下回心而鄉道類非俗吏所能為也此某所以譊譊懷不自巳之意於左右某所領邑蓋有學焉獨在寒波孤渚之上桑楮之間無垣無門無有講肄之位師儒之室而丹青憑附之質亦窘于風雨所謂俎豆管絃之地則牛羊游焉邑人儒服者裁五六輩父兄以子弟能力田樹桑者為材此豈土地人物頑鄙而不可剗磢如此直教養有所不至歟十步之內必有茂草萬家之邑豈無人焉鞠為園蔬牧兒蕘豎至於薪刈其下史臣書之以為戒恭以主上嚮意儒學方興辟雍設庠序陳禮樂隆雅頌之聲盛揖讓之容以風天下武康去天子之都裁二千里王化所被德音咫尺然但見長廊深殿皆荒率之教爾學舍頺弊鞠為茂草有識者誰能不慨縣令柔懦畏罪能言而不能行之此天子之不材吏先王之罪人也會詔修廢廟審上以屬眀公某敢再拜敬以禮義之事奉歸左右庶幾回鄒魯之風於筆端吹發士林之萌芽異時邑人簪紱交映絃誦相答至於帶經而鋤擔薪而歌者皆負國之重器史臣將書曰東西浙部使者以勸學厲賢聞故豈不粲然可觀哉伏惟不當深讓也上姜朝議論發冢獄書知府朝議執事某讀唐書循吏傳見田仁會為都督境有夙賊依山剽行人仁會發騎捕格夷之城門夜開道無寇跡逮為金吾有絲毫姦必發廷中謫罰日數百薛元賞為京兆尹都市多俠少年元賞到府三日收惡少杖死三十餘輩陳諸市此二君殺人不疑初若剛忍少恕然曾不失循吏名者何書曰辟以止辟乃辟蓋行辟者將以止辟故辟而不疑譬之牧羊百而一狼縱橫其間縱狼不除則羊且盡死而無餘骨百羊盡而狼欲未厭則一國之羊皆狼吻中物愛物者常不忍殺然此狼不殺果足以為愛物乎某愚有餘賤不可言輒因厥職願有獻於執事某事執事三月於兹矣知執事為良太守也修庠序如欲教其親子弟為上理財如視私帑中物禁民為非如去心腹間病庭少留訟而囹圄屢空也然某尚不能無疑者二三事爾前此有壞民冢破棺禠衣者又有白晝提金刃為羣盜傷人者嘗議緩其死此無傷也是乃仁術也故曰仁民而愛物之謂也然或曰仁者必有勇何也勇者勇於為義義者適事之宜而能斷者也君子犯義小人犯法不斷則亂亂則傷民而害物民傷而物受害為仁者若之何其坐觀也破冢之患自其殊休戚者視之事若小然求其親親之心則銜寃抱痛甚於刳臠其膚胔也羣盜提金刃嘯呼造人之庭當是時一家知幾人其命懸此四五夫之手亦殆矣今姑以其偶無甚傷為可恕此二事切於其身者而後知之然冢間之盜既往不可悔已獨賊囚在獄彼蓋自分死所寬之當遺患於人而不細况諸邑椎埋之姦未盡悛彼嗜於利知必死猶不怖今復示以生路則彼何憚而不為此祇以滋盜爾且去殺者仁政之盛也然必先能勝殘則殺不除而去如其不然則謂之惠姦此未昜行於今日至於誣告一事此某實懷憤悶不平敕云被殺被盜及因水火損敗而挾讐嫌妄指執人者從誣告法彼實被殺也實挾讐嫌也實妄指執人也今議者皆以為不然且毆人於十目所見之地又誣人者正其鬭徒而被誣者獨相去一里間未嘗相聞也逮母為他弟來而二子傷矣將扶致以歸始求被誣者一家借輿是誣人者一家皆嘗及鬭所較然知鬭之所由來為明白也獨其父云不知爾今市中朝有鬭者則一國之人暮皆知之豈有二子與人鬭一傷一且死又非在窮僻無人之處而倉卒及此經宿始以告官設令不親見其事則審之已熟矣今乃曰不知無是理也天下之親莫親於父子父子之間有屬於嫌而不可共議者雖或知之而辭以不知可也及其事有至此極者亦何情而紿其父今人有訟於官必謀之父兄以父兄為未盡又謀之親識以親識猶未也則更謀之市人謀之吏而後以聞今此人果誣父以聞是致其父於重罪不孝莫大於此茍謀於父而以聞則誣告明矣將何往而逃責耶必曰彼獨與父言未嘗言於官不應罪則今而後子欲誣人則使父以告父欲誣人則辭以得於子誣告之法不復用矣漢宣帝詔年八十非誣告傷人他不坐誣告之惡其可深嫉自古如此且法者天下之法爾天子不能自専以付廷尉而州郡則以付理曹掾負此責者可謂重矣然位卑身賤勢有以屈於人言不得行其志雖衆人亦蔑然下視之如無物嗚呼身可當此辱而法不可蔑視也執事素有髙誼淹留一州蓋無負於下者下之人實負執事不一某不果盡言之請試舉其略今執事下車如此其久也公家之事其大者行之當有條理而小者若一事偶未盡留意能自保無纎毫之缺乎某以為雖古良吏不能無缺也誠有之則拂心正色引義於左右前後以補執事之缺者果亦有其人乎無其人也其搖尾搨翼哀鳴乞憐欲僥幸執事一日之誤知者亦何暇及此自古人為善者有助未有孤立能以成事者執事為善之勢亦孤矣某願執事引善人自助以報上分寄之重後漢王渙為陳寵功曹當職割斷不避豪右寵風聲大行入為大司農和帝問曰在郡何以為理寵頓首謝曰臣任功曹王渙以簡賢選能主簿鐔顯以拾遺補缺臣奉宣詔㫖而已某願執事行之他日還朝以此謝某江東鄙細人也以拙自許故每轉喉輒觸人諱頃得此官凡二年當上終恐以拙招悔尤正復多病故又過所上期一年始自勉强以來執事憐其愚而貌接之甚溫某亦誠不欲雷同茍且緘默為自安策以負執事於聽其言與不聽惟所取舍如何爾未信而深言宜有罪上饒州安太守論朱逮獄書秦始皇兼吞之世専任刑罰囹圄成市天下愁怨相與潰叛漢髙帝初入關出民於密網中為摩其毒螫以膚肉之蕭相國鎮以無為而天下大喜所與約法特三章爾何其濶略也然必先曰殺人者死荀卿云殺人者不死傷人者不刑是惠暴而寬惡也殺人者不可不死雖治古皆然而百王之所同也此非特為匹夫衆仇棄罪至重而刑輕民無所畏亂莫大焉禮曰刑人於市與衆棄之衆之所棄者誰獨與之存哉朱逮殺人具獄上法當論死有司請致之法執事疑焉某所未喻繼請不獲命卒排而去之蔑然也今而後不敢復譊譊求效愚計矣孤憤未攄庶幾有以自解者故尚欲為執事盡言之小人固多怒喜鬭然怒不自作鬭必兩起至循其端而要其終則皆鬭也今石明之怒造端於朱逮而逮之鬭則明實起之既鬭也則皆謂之鬭矣律云鬭毆殺人者豈此之謂乎兵凶器也操兵者無善心石明之來意不利於朱逮明矣逮欲求脫死則更為計而已反以刃迎之者何也必知不能中明且死於明之手中之則死於法小人雖愚度能料此然一旦殺人若刺犬豕者其志非求脫死也直悍戇好鬭有不勝其怒爾律云雖因鬭而用兵刃殺者與同注云謂人以兵刃逼已因用兵刃拒而殺傷者豈此之謂乎且兵刃已逼已尚不得拒以刃况逮深居藩垣之內障以門户之固同處者數人而明特一夫爾去刃正復甚逺又安知必欲殺逮耶案云石明持兵呼殺此得於朱氏之黨耶果明之黨自伏有此言耶案云逮以從父祖在持兵備非常則石明初聞其父與逮鬭而持兵所以脫父之爭亦足為說矣皆鬭殺也而律獨以刃者斬議云謂鬭而用刃即有害心曾謂朱逮無害心乎今此不禁他日鬭者往往閉門而殺人矣開元間張公約與張楚立互相為殺楚既斷吭而公約自刜不死中書舍人崔龜從請以故殺人論公約死彼二人非有怨嫌忿爭之心而為此不得免惡其以兵相賊爾比之以兵鬭者宜何如哉某不肖於人事殊不通曉讀書又不能自表見而書獄豈所長今不幸從事於其間偶簡書之曉然與思慮之所及者正不得不守官爾執事以為非也操數寸之管即可論之朝廷而活之天子亦以性命千里付執事某何預焉使有司不失官守執事為上廣好生之德一舉而兩全之顧有不可哉某辱知薦之及日夜思所以答公議而無愧者自念不敢以市道事執事徒心非而口諾茍且為容恱也執事所以見録者非有左右為之容又非以其能順言阿意僕妾其態而嗟來之則執事亦必有以取之矣今既仰失纎芥意得一事為罷去名何啻濯汙於清泠中古人舍貴為賤舍富為貧正為此爾况升斗之粟反拂亂其平生亦足顧藉耶今日之去就惟在一言短書以謝不敏伏惟俯加裁察
