body:
  text: 東堂集巻八宋毛滂撰書上時相書某憔悴都城下冬一裘夏一葛凡四更裘葛矣客有來過某者輒見誚曰子趑趄筆硯間老之將至矣宦游二十年而不出州縣妻孥三十口而不飽糟糠將子之學不加進才不逮人以至此耶抑子與世寡諧曽無知子者以至此耶某告之曰學不加進才不逮人與世寡諧誠皆有之然不可謂無知我者客曰知子為誰某起立拱手而告之曰今丞相實知我客􅀈然而笑曰使今之執政侍從至於卿大夫僅有知子者尚當為子拔泥塗出毛羽顧一裘一葛憔悴都城下而當四年之淹者乎矧某官之門騏驥不亂涇渭自分人有䝉公一顧如被華衮矧公不愛官爵顧惟其人今朝廷之上日有除目離疏釋蹻而登本朝者相望隠漁釣臥巖石數枉旌車之招使子誠為公所知耶迺近在車塵馬足之間憔悴於逆旅主人之舍更四寒暑曽不得一命屬百執事之後子茍紿我以執政侍從卿大夫之間有知子者我尚當不子信迺直謂子敢辱丞相之知耶子之夸誕甚矣某更謝客曰子無乃重外者乎不求其人而求其官彼固有賢能不待次而舉者有歳月積累而致之者有適乏其人而僅得其次者庸可謂盡為公所知邪嗟乎知已道闊乆矣豈惟客有是言世莫不有是言也彼徒以能相致於祿仕為已知故士之交際之心第日游升沈之路有挈而進之則相告曰知人不當如是乎其有不得進則懟曰世果無知我者求之古人殆不如是世固有超絶士因人以拾取富貴者多矣亦有知之深而卒多困窮者考其相知之意或定於一座或判於一言終身遂以為知我升沈固有所不論也宰相執大柄以進退百官而分職不可缺一較短量長惟器是適而已祿於朝者豈皆人人可自號曰宰相知我也某既以此謝客因歎恨古人之所以望於人者其意嘗逺大閎闊而冠冕車馬所不得招而籠之故或進或退或浮或沈而知巳每在其間彼將亦以知我為重不以外物為果可必也而後世之人徒以其造詣狹陋至其去就之間亦已輕變矣伏惟某官道尊徳重色正氣和位三公祿萬鍾天下不以為泰而居廟堂之上四海猶吾一家一家猶吾一身其飢飽痛癢勞逸休戚之事凡人之所為自吾一身而知之於此發政施仁無不曲當人心者况天下人物輕重固已盡得於懸衡下任之無不稱其才無有尺寸長不見錄者若人皆以為知已竊妄意窺校恐非閣下意也某不肖陋儒讀書而不見道為文而不造理為吏無卓然之聲見達官貴人無俯仰周旋之容涉世甚疎而與人無欵曲環視此身無分可采獨空以平生歸依景慕之心徑欲求洒掃於門牆與厮役伍了不知其身無寸長也雖犬馬之迹甚疎閣下盖嘗賜以齒牙之論許以筆硯薄技不以衆人見遇乆矣紹聖之閒閣下折簡賜之曰常誦佳句於百僚上某此時適當東歸逺涉湖海所見士大夫多矣見輒出之以自夸故自都門而東至於呉中士大夫皆知之曰某人乃知毛某如此比復西來雖中間以罪戾自絶於門下然人或見謂曰子雖棄於衆人大丞相盖數稱子而都城士大夫聞之又皆曰大丞相乃知毛某如此某頃未得造閣下之門毎嘗自語曰學苦矣無以表見於世念一時鉅人高明博厚雅意人物可以托青雲後塵者無如相公儻辱公一言譽在飢當飽不願乎膏粱也在寒當温不願乎狐貉也在病當愈不願乎千金良藥也在困當亨不願乎萬鍾厚祿也孰謂卒獲所願如此以故某出則士大夫相指似曰此毛某也大丞相頗嘗知之入門妻孥輩亦相慰勉曰大丞相見知固當自重邪嗟乎使某有萬分䝉閣下之賜於清時不為沒沒無聞人則不特取一時士大夫重語至於千百年後亦必傳而知之曰此賢三公某人客也儻遂老死於飢寒不復自振起舊交故人尚當為某買三尺之石記其平生借無可稱道亦必曰嘗為賢三公某人所知異時墳荒石出路人過其墟而讀之至此語猶或竦然而遐想也是某今而後貴賤窮達死生盖已終累於閣下知巳而於貴賤窮達死生之間所得皆有餘而無遺恨若其貴之賤之則在閣下所以造命如何爾閣下幸置某於紳佩之間耶某固當勉不居衆人後必使之遂投老江湖之上魚鳥之羣某當退而求古人起居狀磨礪洗濯蘄不與漁樵同泯沒以孤見遇之意是出處雖異其答知已之賜死生以之重念某頃遭人言從吏訊也當此之時不自比數於人天清日白下照環堵獨箕坐弔影咄咄悲慨曰負公前日一言矣盖自分沈埋不敢復與一世争為人然二年杜門窮巷鄰里不通水火日夜洗心東嚮猶望誠悃有以感動閣下之神明比始有告某者曰子身雖辱而衆雖子薄大丞相尚稱子長而念之某初聞而喜既而疑曰三至足以疑慈母之心而某之迂闊又無可當我公意矧某面目可憎語言無味惡之者衆擠之者相望耶雖大丞相别識賢不肖如分黒白然人言亦不可不畏也逮得進見閣下於堂上所以拊存慰藉告之收錄之意懍懍也某退而始自喜賀收召魂魄洗濯垢辱申眉舒氣且欲復為人矣嗟乎閣下亦既賜某矣造次顛沛不足移某受知之心庶幾勉所未到期不在鳴吠之末至於貴賤窮通則非某敢自卜也伏惟廟堂一謦欬而功均造物方萬木東風雖獨病枿未覺盖嘗許以不為枯薪矣重上時相書某頃坐荒唐之言得罪見筆硯則正視惕息竊願少布腹心於下吏操牘而聲鳴益悲惟察其方寸憒憒恕其言不倫幸甚某去年冬盖嘗寓書門下纎芥上露矣某自托下客之籍十七八年矣天資固陋滯涸窮路此自某之分當爾門下豈欲其窮老齪齪汙門牆間哉某不幸與人異酸醎故孤危無援助未嘗習於當世公卿左右獨相公之門賢愚同歸寒逺不隔某所以得托其不肖之身如許其乆也今雖流落晼晚人不以為門下見遺不錄獨誚某無可錄為門下羞雖某亦以此負媿於心然願置兹事直以某天下之一夫途窮瀕死攀援叫呼於造物權衡間且小臣以疑似得罪於君父義不敢自明將一𤯝遂廢其平生某人人主師臣也平心正道可否於朝廷之上而任天下之責忍聞某之呻吟乎方今百官得其序萬物得其宜所望某人納某於萬物之數不使獨不遂其生幸甚某今年五十七嵗矣宦游更三十許年官不過從六品家無一金産子弟無一人有升斗之祿而四十口之家須某圭撮以活身某去年抱不測之罪雖思慮所不到夢寐所不及顧不敢分明賴主上寛仁幸赦之雖棄而不用猶得廩於太倉可謂僥倖此盖某人輔宣至徳將順美意所以賜某甚厚也某今月得俸三十千米六石麥豆半米之數以養無尺寸功而有祿如此為某計則亦不翅足矣然計某之口則食與衣猶若未足也念此退歸還顧蕭然家徒四壁獨有三兒將俾一兒賣藥二兒灌園歳求百金之入資以㣲禄老稚相與布衣蔬食庶幾乎濟也然尚妄意某之命未終窮顧光景之可念更求噴鳴於眄睞之地今之時多士充朝名一藝者咸見省錄某自束髪讀書勞苦矣是豈欲生無益於時死無聞於後哉今甚恥作一世無用人然日暮途逺豈須復能一躍跨邑而越都耶茲事已矣獨念無恃可歸但欲為稅駕之計某今雖月有所入尚未免裘褐菽水之憂則某婚嫁曽未畢而死䘮有未葬者度今日之力將不可支吾又况某少而學之奚暇復敢言其志哉某又蚤衰多病若年嵗之間責以十駕之用尚得勉鞭勒非敢有意於騰驤將勞苦其筋骨以求濟某之將歸也過此時不死亦憊矣後雖憐而收之不可復用也某雖欲貪戀棧豆力不能起矣某於諸公之門無姓名足跡人所共知獨恃門下以為命爾今憂愁約結而叫閽無所也然傾江湖以濯之不過煩一欬唾之恵是某終身之休戚四十口之飢飽寒煖在言與不言爾某今羇旅單外抱病無醫藥骨肉散居東西衣食不能相料理人不堪其憂而某亦聊復自寛者意天其或者不終見困相公決不忍一夫之失所也某昨以病眩不能乗馬無路進伏門下謹遣小兒持書詣馬首陳情又某本田舍家自父祖皆晝耕鋤夜誦書某不肖業之不敢墜然前此三十年間陸陸無所表見故世號儒師持文衡居顯次其欬唾可以為縫掖士重輕者無道某之姓名獨帶經漁樵負笈山林言不信於世者或見稱譽某坐此故學徒苦而身益困某盖嘗念之曰此學之不至耶將命之不偶耶已而竊自罵曰學不至爾於命何尤年長以來亦益自憫笑而厭苦所為幾欲投筆硯而返農圃大觀間某人方網羅天下人才至不遺片善寸長某蕭然拱把之餘乃辱在某人收拾長養之數且意將成就之某此時稍自信而喜曰命果不當尤而學亦可以少恕矣此後某更自刻苦益從諸生學問求探古人之淵源而欲咀其英華將攘臂於諸儒間蘄副某人期待也今又十五年同時諸生皆以振纓承華而世終不以某所學為可用貧病盖未嘗小間又數困辱無憀重為下吏羞始自愧歎學果不至命果終窮矣無以上報某人期待矣且痛且悔而改念欲亟返農圃則先人不腆之田不足了饘粥聊從州縣老吏學法律治朱墨强顏為餬口計庶幾或可也中間某人憐其困甚使得食小壘某猶激昂於簿書獄訟間欲有以報門下故奉行法令不敢不力誅鋤姦蠧不容不盡幸無所得罪於士民不至負朝廷使令矣今禍起於不思譴殆於終廢憔悴餘生坐臨坑谷却顧平時所學是豈獨無益也又竊恨擊壤之世不應有向隅之夫妄意廟堂或念之矣政恐輔相之尊臨機務之繁曽小物不足以槩懐也然道逢牛喘乃為丙丞相憂又疑所憂者或不在牛耶顧諸公之門素無某足跡儻不於某人之時一刮垢滅瘢則某名棲秋官之籍何時而已身將有盡而過則不磨矣竊以為囘天之力一轉錙銖之物宜若謦欬可濟也然某日暮途逺藉令得進能復幾許第使某不以罪故徐自退歸異時人或指似曰此倚表而叱牛者亦某人之客雖然某顏不厚矣某之進退亦定於今日重念某方恐懼循省不敢復言筆硯事故無文采惟裁恕而哀憐之幸甚又天下之事皆可學學之或皆可至經術文藝固有師吏亦有師無不可學者有不可學學亦不可至獨宰相之才爾是與時俱生自帝之賚上闗社稷之盛衰下繫蒼生之夀命是豈學而至也古人負王佐之才抱經綸之具者其氣盖已見於兒童之時其事業素已定於畎畝之間微約之中此豈學而後能也屬者相公爰立之初某自東呉走淮甸至于畿輔見縉紳士大夫咸舞手相賀曰某人相矣吾曹其喜固不勝言而閭巷之人田野之夫皆若其身有求而遂得之者莫不喜快踴躍則公之自喜宜如何也某荅曰縉紳大夫喜則有所依歸閭巷田野之人喜則有所告訴寒者喜得衣飢者喜得食屈者喜得伸歲時喜豐年夷狄喜寧疫癘喜不作盖相與安樂百年自今日始其喜固不可量公則何所喜也憂或有之以謂公喜富貴也此則公所素有若探懐中物無可喜者自古聖君賢相當積安乆治之世至隆極盛之時所以維持太平其君臣相與吁嗟儆戒懍乎安不忘危此憂則有之未見其喜也公方以憂天下之心任衆多之求顧雖萬事皆理之時豈無一夫失所之歎無則已有則為公憂非若尋常之人憂喜止於一身者也儻以一身求公之喜則其喜盖不可量矣以故某竊上為朝廷賀下為蒼生賀已而自賀特賀牘不至相公門者非但某以羇賤故不敢政以為喜不在相公爾伏惟相公道闗造物徳被生民光輝盛大何以名之某道旁小吏爾不當頌相公之美又適坐譴無憀方恐懼誡省深悔前所為尤不當夸文采有所自見前日主上流寛大之恩如某輩者得游自新之路矣伏念此皆廟堂元老翌宣至徳所及願一言以謝萬一於門下語復妄發干犯誅夷不勝戰悸之至又某去年冬嘗布悃愊干冒鈞聽待命徬徨不勝憂迫某托於杞逆旅自秋徂夏疾病無醫藥骨肉散居東西衣食不能相料理幸䝉恩得食宫祠祿坐念欲徑返山林顧家無一金之産可恃子弟皆布衣無有寸祿某所得廩餼稍薄而食口至衆生生之理未知所濟也某又晚節末路顧藉微官愛惜急景遲遲未能決去爾去年某以病眩䝉許留杞擬官顧憂患之餘聞弦昜驚不敢輒至國門無路赴愬於門下且小臣以疑似得罪於君父恐懼退伏無時自白非卵翼生成之地陶鎔變化之間誰有更生之力伏以某人道佐人主國之蓍龜人之司命上所信其言而不疑幸少哀某之狼狽如此恭念聖君寛仁未嘗以一𤯝廢人臣之終身然慶賞刑罰之出實輔成上之徳意此天下所共扳援叫呼以求濟者也非獨某而已某以不肖之身乆塵客館材質汚下不足備采擇數坎壈於時孤負恩私榮望已絶今尚復何所冀幸天其或者不終見困儻賴恩力復得一麾使老稚稍就飽煖雖平生鈆槧小技不足自効而簿書獄訟之事或得少行其志亦不空為一世人某區區之意纔如是庶幾回天之力傾江河以濯罪垢此亦不過出謦欬之恵是某餘生休戚繫言與不言爾某不勝愚憃歸投之情顧言不能窮也盖某不惟得罪以來不敢近筆硯亦自念門下十七八年牛馬走矣今不當更復弄文墨夸浮辭以凟神明之覽取疎外於百執事之間謹遣小兒詣馬首布危懇嗟乎某日暮途逺矣乃所望者如是而止矣敢望留鈞念幸甚又夫士君子結髪游學匿景未曜者決不欲泯泯但已也顧美官好爵取之難於升雲氣至一旦棄去乃輕於落涕唾亦何故哉是當有可以取有可以無取爾某聞霍光為大將軍秉政長史丙吉薦儒生王仲翁蕭望之等數人皆召見時大將軍有戒心吏民當見者皆露索去刀兵兩吏挾持望之獨不肯謁卒見乃説光以吐握致白屋之意於是光獨不除用望之而仲翁三歳間至光祿大夫給事中望之裁射䇿為郎補小苑東門候仲翁出入從蒼頭廬兒下車趨門傳呼甚寵顧謂望之曰不肯陸陸反抱闗為望之曰各從其志某讀史至此私自慨歎以為富如可求則望之豈志於抱闗者哉顧於此時視仲翁所夸者何翅涕唾此孟子所謂紾兄臂則得食摟東家處子則得妻盖好禮者所羞也某雖不及望之剛烈有氣然決不至學王仲翁以故西來刺字漫滅未嘗識諸公閽人之面宦游亦跌而不振不自恨也伏惟某官立誼秉志以安社稷為悦一咳唾繫國家安危斯無愧於大將軍者至於身為儒宗心游道真富貴不驕子孫象賢此將軍所愧於左右獨四方賔客口不道吐握之事而望之之言欲見於今日豈今之士非若古之士可用而吐握之禮將重屈而無小補耶某竊惑之某聞大冶無棄金大陶無棄土江海不却水王公不遺士某跋山川之岨犯寒暑之威戴平生不見王侯之容間闗求見於相公之門顧可遺乎某客此八閲月而數十登門書凡三上矣羇旅偪仄勢不可須臾矣士之進退去就亦於此可決矣幸相公見收則某幼而學之壯而欲行之者是豈無心於世者哉必棄捐不錄則抱闗擊柝某之志也某近作古風九首錄在異巻語雖不工亦可觀其所向背併用冒浼尊威伏惟左右憐其愚不攻其過幸甚又夫馬飾以黃金之羈紫玉之珂啖以甘露之芻而王良造父御之馬方延首高驤擢足軒跱見之者曰天下駿足也此非所謂知馬者也識於鹽車之下太行之坂駑駘之羣使之追奔電逐遺風此謂之知馬可也夫琴錯以象犀藉以翠錦絃以朱絲徽以白玉伯牙師襄鼓之而游魚出聽駟馬仰秣聞之者曰天下良桐也此非知琴者也收於釡錡之下煨燼之餘樵薪之間使之發雲和諧南風此謂之知琴可也故古人相士亦然或舉以肥或失之瘦要當拔之芻牧之間振之泥塗之中置之乎公卿之上此號為知士可也故遇縲紲於途晏平仲延為上客南冠而縶范文子知其為君子古人如是庶幾可以相天下士也此豈可為世俗道哉某學術不足以為己文采不足以應時在木則擁腫方馬則虺隤頗怪閣下異時欲撫以五絃䇿之千里置在琴馬之間見古人取士之意是豈某不肖所堪也某嘗謂自昔稱能任重大者某為吏當負弩前驅請見之日閣下退然若不足某衷竊歎曰使者勢尊於所部而閣下遇其屬不自為巉絶此不知使者為大是則其任使者事如舉毛羽爾已而聞乘軺車馳東西浙翕然以賢聞於逺近者果閣下某今獲再見於此則閣下既以為天子股肱大臣矣然望顏色則猶使常平時退然若不足也仕宦至此而不知冠冕為大是則天下事孰為大也茍有大事外物無大於我者是閣下必有以勝之矣伏惟某官閣下王佐之材為時挺特徘徊内相已有經綸將為國立基而開門納士豈惟搢紳所鄉可使山林亦來某溝壑之餘命門牆之舊物薄縁文字尚被使令慨念眄睞之有年妄引琴馬之非喻嗟乎閣下能知某於甚瘦之時不知某無以自振於終窮之日顧得求列於駿足良桐之間少副閣下所以期待之意哉雖然某聞古人或寄意於空琴或取道於老馬某也庶幾萬一得與二者為比尚可為閣下寄逺意取長途微以自塞責未知其可不可也謹書舊詩文一編閣下儒宗也某非敢以此求知舍是又無他技得自効於見知之地故輒冒及之上劉中書侍郎書鄉老為某言吾州嶮隘而僻陋故仕於朝無富貴人某曰然他日又告某曰鄉人持槖入侍者三數人矣顧吾州雖嶮隘豈溪山之秀有時發越綢繆於諸人乎某曰然屬者又云天子相劉公矣實吾鄉之人溪山之秀不其偉乎某曰不然宰相盖天子股肱大臣與國同體而繫四海蒼生之命者也豈吾州所得私而有之乃欲認為鄉之人乎是其生也必鍾五嶽之秀涵九河之潤受三江之清其山川光明雄傑之氣積歳五百而後一鍾於人此劉公得之故能與國同體為天子股肱大臣豈蕞然溪山之小秀所能孕育耶詩不云乎維嶽降神生甫及申鄉老曰如是之大不幾夸矣某曰視公之身猶以為小公雖大車駟馬臨廊廟之高然六尺之身起居飲食無以異於人者至天地之内寒燠亦有小戾萬物一不遂其生百官一不得其任則談笑之間必能使寒燠得其序萬物得其宜百官得其職是九州四海納於胷襟萬物出於掌握巍然已大而物小故能開物而成務者也不然則何以相天子撫四海乎鄉老不能荅某又告之曰此特聞公之大未聞公之小有甚於大者公以一身而任天下衆萬之求大者至為之雍容而不動繁者至為之閒暇而不迫應之不窮取之不竭然事有一不合於公論不近於人情公逡巡退托若不勝其任以盛徳偉業處禮絶之地而自視欿然若不足此亦小之至也唯其小固能成其大某嘗偶以此告鄉老然某道傍小吏爾不當稱頌宰相之才徳又適坐譴無憀方恐懼誡省投棄筆硯尤不當夸文采有所自見前日主上流寛大之恩某自管庫而得宫祠稍輕罪戾矣伏惟此皆廟堂元老翊宣至徳所及因敘所與鄉老言求謝萬一於門下
