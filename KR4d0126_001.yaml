body:
  text: 東堂集卷一宋毛滂撰賦恢復河湟賦并序崇寧壬午皇帝即位之三年舉用俊良歸河湟之地盡復神宗哲宗之政明年取西平復以為州縣升平故事無有遺恨於今古者羣臣上萬年之觴薦勳宗廟天下歡欣共戴皇帝蘄千萬年如一日草茅臣滂謹稽首北闕下獻聖主恢復河湟賦云洪惟元符庚辰皇帝升聞潜宫奄有四海時御六龍扶桑出日杲杲在東下臨萬國蓋靡有不照退托三年而言出乃雍爰登弼輔庶代天工何棟撓而鼎折方雲隂而氣蒙俄八風之顯宣倐五色之當中於是散清議之約結破羣邪之牢籠一之日剔蠧去惡二之日遂良顯忠鏡照妍媸龜灼祥凶了然見治道之所以然者其堯舜禹湯文武之業固已素定於淵衷地平天成仁洽德隆無一夫之失所意比屋之可封於是屬王猷於清淨付名器於至公遂成一王之典則遂尊九仞於熙豐皇帝乃眷西顧曰嗚呼噫嘻在昔泰陵長撫逺駕抗棱四裔布德中夏有事鬼方飲馬三河坐變椎髻其冠岌峩念恢拓之崇閎卒圯壞於么䯢嗟乎方當耕葱嶺之雲何忽阻玉門之獵肆驚鳥之還巢顧伏疹之在脅吾將何以西厭月窟東震日域而嗣守丕業也遺臣老將折衝萬里之士流落江湖身放名圯撫劔躑躅中夜而起皇帝曰吁方唘丹册開雲臺用以待爾往復而功無煩折箠將臣拜手曰惟陛下聖德丕冒海隅出日罔不率俾雖櫜弓卧鼓當使四夷而為𨽻豈染鍔刓刃獨謂三河之可髓維太嵗之癸未六師臨於湟水猶順風而疾呼無遺鏃而亡矢椎牛釃酒波屬雲委以迎王師如見兄姊工不下機農不輟耒露頂肘行東向而朝天子者矣於是緹衣韎韐携持萬里望觚棱之鬱葱識勾陳於太紫孰謂荷氊而被毳亦得昭景而飲醴籯金龜綬雨露泥泥遂開亭障於覆盂坐得山川於聚米唯是西平老羌據險負固尚假氣於游魂聊崛强於朝暮故介胄之士貔貅之衆相與虓闞而勃怒紛流涎而睥睨將膾其肝以益朝餔之哺嵗在甲申乃盡發五路之戍左攬繁弱之弦右接肅慎之羽帶干將而秉玉戚飇奮霆擊其往如霧皇帝慈仁寬大唯生是好唯殺是惡徘徊受降之旌丁寧出生之路聲與風翔而德從雲游大啓歸途之寬裕王師陟巇履險排揵陷扄凡十有三日肅然烟滅於蟻聚兹可謂之神速殆若從乎天雨巢清穴冷去若脫兔矣念彼遺死窮深僵骨寒沍如將飲其頭如已扼其嗉如創在領何敢反顧臣竊聞沃野千里厥田上上是為禹貢雍州之域在漢為州十九而蟬聫內屬者三十六國逮幽州之亂唐而西平河湟之地盡為贊普所盜而得此皇帝所以赫然􅍀然未嘗忘於頃刻顧為此羌憑凌險阻鎧胄精良種類健武來不齎糧集若風雨雖謀夫䇿士老兵宿將為世飛虎者聞師出之日猶逡巡􅌓眙計利鈍且十五年也惟皇帝沈幾先物神武雷斷知天與而必取故選將授兵而曽不泮奐也矧大臣魁壘蔚為棟幹制勝於兩楹成謀於几案實仰禀於聖畫乃克濟以廟算韙其壯哉夏折右臂唇亡齒寒猶寄命於頃刻漸羽毛之凋殘雖然烏止於一方其荒服君長殊鄰絶黨罔不矯足抗手以尊天可汗者矣惟我宋受命更八聖人今一百四十五年德在生民風流管絃其博厚髙明悠久無疆坤轉而乾旋變化開闔妙萬物而無方者逮皇帝得其大全煥乎其有文章巍巍乎其有成功宜肆覲東后告格皇天自古在昔婦人賤𨽻之言或載之雅頌信於後世以考其君臣之賢矧賤臣滂本江東之諸生漁獵文囿老於筆耕顧得解衣盤礴摹寫升平感茂陵之遺忠尚覬援筆而賦冀目覩陛下之告成擬秋興賦并序僕少多難初無宦情不知委曲以向物七年荷鍤灌園追蹤丈人自惟遭世清平朝廷有道君子在治貧賤恥矣妻孥糠豆日覺不贍前得郡掾曹故自勉以行時去先廬而將南泊郊寺而逢秋舍館髙明山水秀合夕飇入簾曉凉侵榻爬搔隱几星髮垂脰昔潘安仁三十有二始見二毛寓直散騎省而有江湖山藪之思僕少潘安仁八嵗時異事殊而其志不同顧頭獨蚤白耳今兹逺畏日之煩歊接蕭辰之清厲追數節物之變摹寫田家之樂驅除肺肝之欎滯作擬秋興賦以自見羲和䇿轡於丹衢兮雲崥崹而迢邈御絺綌以交箑兮膚漫瀾而汗渥企西風之來斯中悶然以求濯允天吏之周旋夏獨使人而心疸冬凌競而沍結景慘栗而窮短悵修夜之悠永眷布帛之餘暖至春則氣回於和物蠢而舉風亹亹而披離雲娟娟而容與弱草紛以無名希蘭芷而並藇軒微禽之啁啾滋乘居而匹處被生生之大德咸桀驁而自怙凛乎清哉旻天之窿穹蒼無痕而廓寥森松柏之徑氣傷凡木而先雕邈鷹鵰之蕭爽橫空闊而飄颻伊鳥雀之奔迫拆頭顱於霜骹鴈嗈嗈而懷歸燕索索而辭巢掃欎滌滯兮惟秋之有力古之人亦何為愴恨以悲而無聊田家之樂兮秋日歸吾田而經吾籬垣稻已實而䆉稏菊含英而敷腴雞肥酒熟薄稅既輸芋栗堆盤葵薤充厨紛舉酌以交勸翩既醉而相扶僕時有江南之役足將行而屢却絶城市之迫塞得紺園之虛泊溪山迎前竹柏森若晝則諸峯無雲軒昻磊落雨斷晚虹山氣綽約翠色潤活飛上簾箔方潦收而水清露下而蘋老鷗落園沙烟抱踈蓼僕方登臺而四望知天逺而無所至極庶幾躍九萬而升暘谷兮挾日車以效余力蹇淹留乎昆吾耿中正以照此下國意悠悠兮隨雲烟而泮奐目瞭瞭兮見飛翮之出沒既而曜靈晼晚崦嵫陸離蟬既咽而洊急葉已脫而復吹燈炯炯而出簾螢的的而投帷夜參半而不寐淡偃蹇而有懷彼娥娥之佳人居華隂之雲崖敬持南金以交歡又參差而願乖睇蒼茫而莫致秖奄奄而霧霾吁嗟兮僕將行乎四方汀濘不可以浮舟而世無驌驦又將家以休兮翳薈不可以為柱豆萁不可以為梁逝將去兹而棲遲兮步滋蘭之畹而襲此蕙纕飾以崑崙之璧兮又申以東海之夜光擷朝菌而不饑兮仰沆瀣而內涼攬浮雲之輪囷坐鵬翮而相羊驚白髮之侵凌省余年其未央詎星星之見髭或種種而未長獨引吭以思晨中耿介而激昻將䇿足以升髙則階何為而可致將引手以汲深則綆何為而可索又將必得仙芝為傔舍常何為客耶誠人力之可為將天理之不亮參苓桂芝則病者必畜賢良俊乂而治世所訪彼豐城之夜氣干斗牛而直上顧延平之未歸蓋已驚人之觀望為圭璋者必知其非石亦徘徊而待價鼓刀者意在鼎羮操築者卒成此大厦豈知神竒之不為臭腐兹又豈可以久假譬風雨寒暑之序焉蓋紛相轉以榮謝何必求服而驟進貪餒而妄食將淵泉而濯鱗將憑風雲而開翼忽來去之難把盡秋毫於帝德噫嘻僕其南征哉無東方之滑稽兮將不可以自薦彼封侯廟食兮孰敢誰何彼投筆而起者不幾於狷也拂外物之儻來詎趙孟之能賤亂曰風露既降凄以清兮壯懷劈摽撫以驚兮氣橫􅀈矇浮雲平兮赤心昜感白髮生兮蕭然夜榻一影并兮天潢洗月相對平兮孤吟聆響無人聲兮踈飇過竹翻簾旌兮五言古詩送徐天隱判官齊王未知瑟吳犬終怪雪越游售章甫念子當折閲一鳴豈無年百計但有舌西風吹曉波晨景散文纈嘈嘈雙櫓鳴萬里欲俄瞥江山真可人得酒慰愁絶咄咄無足云與子男兒别贈陳進士民生委所窮出仕增轗軻家山有蕨薇歸足瘳饑餓功名我豈敢動若手足縛太官五斗粟飽食慙且頗老胥抱文書俾我供吏課厭此將毋觀法在恐深坐舊書不得讀掩帙充枕卧朋游久益落蹭蹬自老大近乃得吾子聼語百憂破顔郎見清賞今子傾一座新詩已出人珠玉落咳唾諸生正業儒風雅久不作子意有是哉吾道便可賀生日案此題原本有脫誤夜光昭清泠璇源載圓折朝陽未羽儀五色先丹穴松柏出澗壑衆木皆禿屑方其一寸青意已傲氷雪東家嬉戲時俎豆輒羅列未應須兒啼英標固驚絶公為三朝老氣壓萬人傑經綸本帝賚遇合非力結舟成無長川雲族有旱霓東風吹扶桑曉色開寥泬平生回天手獨佇昆吾轍停鞭急節緩揮臂層隂决圖回掌中春摩拂厚土熱一身等大地萬物小靖蛚華嶽載不重河海振不泄黔黎託回命草木恃以茁造物相始終流年難老耋側聞宋鼎就未可羽力挈是乃為公象何但紀相烈坐觀滿不溢玉鉉無變滅寄曹子方使君使君未知我得自吞氊翁我未識使君已聞伯夷風十年詩卷裏未靣先從容頃我客東都寄聲謝老農繡衣南州來是爾使君公為爾掃菜色無襦當夜縫東都逆旅人零落如霜蓬一㕓願為氓歸勢鳥脫籠既登君子堂倒戈避詩鋒紫芝秀眉宇東野凛長松憐我骨硉兀槽櫪駢兒童秣以玉山禾不置凡馬中去年溪城月使君馬如龍呼我載後車詩月相朣朧朅來桑麻間午夢回村舂使君亦留犢往聼長安鐘相望渺雲海烟雪迷西東遙傳摛彩筆秀句爭考功那知古槐畔苦語如秋蛩一笑答雲山萬事付瘖聾吞舟亦失水蚍蜉登背胸拂鐘雖不錚綴履豈所工天髙白虎殿日永明光宫去參鵷鷺羣勿羡髙飛鴻纍蒙周開祖使君貶示佳章才拙思荒愧不能報謹勉次韻一萹少叙敬避老匠之意居士稱陸蓮香山本流亞舌端元和風吹倒兩鮑謝游戲筆硯間盤礴湖山下過眼盡詩材有欲天必借句源發肝膈輸㵼每不暇咳唾生江河奔放那可壩我詩沮洳爾欲過不足跨數煩見波瀾意作蹄涔嚇平生望洋眼癡膽不知怕亦識明月珠相投况非夜對月憶滿子權長風掠海來吹月散百錬青天豁四碧雲靄不容緣窗軒颯先秋露氣入簟扇空庭生夜凉蚊口不得擅人靜暮客去坐偃適自便清牽睡思醒明發醉膽健披風睨白月瞪視不為眩未甘景獨勝思出大句衒狂搜得無竒猛吐復自吮篇成若奴婢氣骨終凡賤置棄不復收嘆感退自旋起探君寄詩兀坐諷百遍駭哉劇雄徑百札洞一箭間逢騁新竒春雲弄晴霰古意終重厚九鼎掛一鉉吾嘗笑夫人語富則自願及嬰愛君念始自信惓惓閲女當求嬙慕士在獲彥鄙哉尋常者何用目識遍得逢誠幸多既别遂堪唁乖離時况久㑹合卜未先思之不可見飛魂不身戀秋城崔嵬髙圍我屹若圈安得擘風翅飛出不自殿巧為相見謀反覆竟未善惟當逺相要共借月為面相離茍同天舉目亦兩見又况相去間才止百里縣不知竟何如寄詩代請勸見雪明日與祝山人游東湖僧寺訪陳巨中教授留飲風吹飛雨乾散作栁花毬危簷下舞鵠老樹騰蟠虬烟空夜色垂膚寸凝酥柔曉屨踏晶瑩與君散清愁湖東十頃玉月落漫不收照我肝肺皎出語和鳴璆將我平生客步入青松幽此客氣如霜逼人作颼飀嚼氷論世事怒頰赤已浮盤中水晶鹽碧酒葡萄秋飲酒豈憂寒飲水猶不憂手冷慎勿炙置之鷫鸘裘過靜林寺與徑山老禪曳杖溪濵俯淺澗寒洌可照隨流而前即淵然清深為作數句以告同遊寒溪數寸爾下有萬里天烟雲自變怪寸碧殊湛然蘋風亦可人寧妨暫漪漣終觀鏡面平與君受媸妍有苔緑蒙茸孺子俯可搴前窺漸難量忽此清泠淵魚蝦亦無蹤但見空月圓陶翁步屧處獨俾支郎肩倚䇿心自知鷗鷺紛聫翩次韻葉權之二年錦衣城坐悵朋游落雙瞳不敢白但向湖山著頃當舍之去眼界垂落寞忽逢昔所傾人事豈容約西行追畫鷁北首望金雀斯人玉樹明映我蒹葭惡平生函牛鼎顧可作雞臛干將久在冶宜有當槖籥大器不匆匆一飛要寥廓佳哉妙五言珠琲相磊硌長城矗金墉銛鋒露霜鍔向我寧可當倒戈為之却我生已數竒世味寒氷薄兹行聊爾耳外物矧可略所喜得公游昏愚煩發藥不重千金裘為公了杯酌暑雨蒸溽奉王元規學士老火尚偃蹇稚金殊踧踖雨如甑笠汗但作氣蒸赫思君屢欲往露頂不可幘坐懷屋漏下蝸牛頗爭席屋漏人自佳泥沙卧圭璧我衰了無營飽睡夢書䇿家貧苦無書豈復有漂麥不了湯餅事可致萬錢客正須裹飯來濯足水三尺育闍黎房見秋蘭有花作南風吹露畦苦菜日夜花同榮有蔓草託質多長蛇邇來合蕭條凄風寄蒹葭禪房向幽寂雲日曖庭沙竹根逢小春紫蘭茁其芽造物惜鮮榮寧肯及幽葩偶出白帝恩未必黃鍾家芳馨半孤冷蕭艾終橫斜譬如隱君子悃愊初無華深藏不自獻清芬亦難遮陶翁抱踈韻對此心欣嘉離騷久相從濁酒不待賒紉衣濯滄浪援琴卧烟霞解武康縣印至垂虹亭作娟娟東堂月瑟瑟北窗風半夜渡龍尾隨我藕花中徑邀此花香追路溪城東溪山久俯仰臨别亦匆匆三年虎落檻一日鴰開籠何須見似人聊作逃虛空今宵花亦逺餘香歸故叢殷勤此風月隨我登長虹嵗寒而春遲閏正月猶有雪三日乃消今日方晴快東風果來否雪意不肯消初疑寒作威勢猛意反韶玲瓏開瓊花瑶草亦有苖細觀如可人玉立耿髙標華屋本無寒錦帳裘狐貂所憐小桃杏凍蕾抱寒條却看雨成花祇憂身當樵語花慎勿憂春久屬雲翹徐行意不淺晚發必後凋年年緑暗時逮此紅芳夭左提白玉壺右把黃金蕉往逐春未央不但永今朝曉來紅日暾花信到栁橋秋日書懷秋日吐微明寒葉墮半碧娟娟竹弄影冉冉香引脉窗明棐几淨水石涵虛白茶開睡足眼苔上懶行屐屋寒無燕雀豈獨少賔客顧我警露鶴佇此遼天翮相對雖不言孤髙比三益邇來世外心漸覺眼界窄兒時喜功名今念真戲劇平生翻羮手欲爛誰能炙豈待二頃田初無一㕓宅第當營糟丘努力期百尺頺然寄踈慵坐看駒過隙韓郎食不足苦心定誰惜那知落英繁吾食豈無夕舉手謝飛鳶一鼠何勞嚇次韻張臺卿桃花詩使君園中花造物勤管領佳人含朝酒風軟吹莫省正應武陵裔或寫瑶池影誰云六果下出家語實抱千嵗永得地倍穠華無人亦妍整舞困霞衣翩粧早燕脂冷玉堂摛藻筆一顧長光景誰識勸農心殷勤待遺秉原注崔實月令三月桃花盛時農人候時而種汪發彊中見遺佳篇筆勢髙妙且從僕求詩以歸輒為此數句落落湖邊松瀏瀏松下風泠然入君懷蕭颯詩脾中清露㵼筆端一掃浮埃空以遺愚參軍僅免按劍凶三年耳目昏此語豈易逢亦豈務炳烺邂逅乃自工歸囊一錢盡足用仍三冬他年太羮熟寧俟鹽酪供送僧覺歸上饒原注覺有妻子一日棄去為沙門上士垂暮年不受煩惱攻欲修沙門果坐怪鬚髮空言有摩尼珠自照迷妄蹤當來滯礙心如以巨物摏妻子昔所愛今斷如潰癰欲作大醫王遍救瘖與聾長安坐寂寞饑腹聼午鐘行歸洗黃塵誓將掃青松一蠡渡長淮東望迦葉峯我走名利場未可談從容軟語感屢發為我清心胸上士無住著此别何由逢贈别講僧若水道人永嘉老口作智者語坐揮鐵如意寶藏發深貯行住自如如當亦無住所踏雪來東山了不憚修阻孤雲亦何心東風復吹去索詩讃行色我敢靳不與道人已得道逢魔猶齟齬古氣生面目清流見幽㠗泠泠微妙音松風雜寒雨九旬談妙用况乃超佛祖東歸花木繁啾唧鳥雀聚道人具眼目要當反聾瞽萬事付一笑鉢飯飽亭午聊以答道人瓶巾過水滸留别邵公言公言雅知我良勝我自知往年得為僚稅駕清江湄覺君有勝致真率仍天資定交傾蓋間快語明肝脾我生七不堪百謫將安之官長笑不罵兒童容遨嬉掾舍等禪房竹樹含幽姿其間有閒味共此非君誰駕言寫豫憂欲致車已脂往披五老雲下採蒼山芝翛然送日月萬慮忽若遺朅來兩溪上邂逅寬所思微風送白蘋藻荇搖寒漪水清不受釣魚細安可騎亦復可憐人鷗鷺相委蛇君豈鷗鷺羣鵷鸞往追隨所遭即定分固有何庸麾我生儻可用豈惜山英移榮華如食薺貧賤亦嘗飴顧今適當還捃拾聊充饑從君借蓑笠破雨收江蘺贈禧上人此寺昔荒寒蠧黑相撐支世尊窘風雨鐘磬出茅茨吾祖過而慨開槖為營之一旦黃金宫突兀清江湄其徒則以安其道猶逺而吾游童且白僅乃見此禧譬如蒿艾中蔚然得江蘺昻藏老鶴骨徑瘦寒松枝宴坐了無營孤香對逶迤海濤走窗檻江雲翔屋楣全收眼界勝闃與人境辭吾方迫逺游未可分清怡原注清怡禧軒名廣鑑大師觀上人為靈芝數百衆故乞從檀施乞米求豫詩送行為作一首豫昔為武康縣令觀師吾邑人也靈芝有良田嵗比萬户侯平生不力耕以德作鋤耰不許倉箱豐但知鉢盂秋木魚一呼飯千屐如水流靈芝道亦然飽汝即罷休但憂汝易飽未飽非所憂後生真可畏見此觀比邱昔常為我民今乃從我游得道於靈芝胸中羅珍羞豈特求自飽將副餒者求裹鉢忽何之西風送輕舟處處靈芝田多稼如雲浮初以非種種今當不收收誰施復誰乞大塊同一漚姑且置是事吾言亦謬悠羡觀一身輕翛然逐飛鷗盛暑謁劉公逹伏金避老火遁日乾商霖天地豈不寬八荒一釡鬵此身沍寒鄉骨冷勢陸沉忽疑同然灰終得空汗襟聞有不熱符莫致癸與壬平生習雲水兩足便幽尋佩紳接軫處念往汗益浸乃獨款公關熱行犯訶吟忘公鼎軸家謂是緇帷林有風靜險躁無愠煩鳴琴置我弟子間豈不容魯參公如天下雨焦卷聼雷音謦咳走旱魃噫缺停流金胸中三絶編寧獨自洗心坐使人意消煩促變清深南山當朝隮暫卷乃至今萬物抱暍意油然徯層隂昨夜陪諸公飲今尚委頓未能起坐聞孫守出送陳祠部供帳溪上見招不果往戲作小詩寄之孫公金作骨何獨無燥濕雄姿逼龍虎風雨坐嶪岌黃堂爛繡筵春甕融玉汁銀臺三見跋醉眼夢欲入公張兩瞳電照我毛髮立平明郭西門鐘鼓仍盛集我方擁黃紬勢作蚯蚓蟄乃知千里姿追趂何翅十春溪葡萄碧飲渴誰當吸願君苦留客墮翠應可拾未用奏伊凉舞紅催玉粒琳老所居植竹發筍而草茁其傍作詩見寄為賦一首春風吹琅玕夏長蒼龍孫未見拂雲梢已引鞭驥根包藏霜雪姿隱忍苔蘚痕其傍茁小草同出東帝恩恩深草先髙抱籜殊末掀嵗寒兩何如一笑凝詩魂猗猗亭夜月猗猗亭下竹娥娥竹上月微風靜蘭路水石相映發盈前嬋娟子秀色粲玉骨褰衣往從之露泣苔侵襪溪上溪光照秋房娟然卧流萍水仙弄幽姿寄余汀洲情眷懷玉色子弄波濯塵纓夜寒有佳意屬此泠然清案此詩永樂大典原本闕佚今從宋詩紀事采補
